  {id:91,tp:"Etica",c:"#ef4444",text:"O 'vies de atribuicao egoista' (self-serving bias) no planejador financeiro manifesta-se quando ele:",opts:["Atribui os bons resultados da carteira do cliente as proprias recomendacoes e os maus resultados a fatores externos como condicoes de mercado","Recomenda produtos de maior comissao conscientemente, sabendo que nao sao os mais adequados ao cliente","Pede ao cliente que assine termos de ciencia sobre todos os riscos para se proteger juridicamente","Apresenta projecoes excessivamente otimistas para convencer o cliente a aceitar suas recomendacoes"],ans:0,exp:"O self-serving bias e uma forma insidiosa de conflito cognitivo: o planejador inconscientemente interpreta os resultados de forma que confirme sua propria competencia. Isso impede o aprendizado com erros e pode levar a recomendacoes sistematicamente enviesadas ao longo do tempo."},
  {id:92,tp:"Etica",c:"#ef4444",text:"O planejador financeiro que percebe estar desenvolvendo dependencia excessiva de um cliente especifico — checando mensagens ansiosamente, aceitando pedidos que violam sua politica, cedendo a qualquer demanda — deve:",opts:["Reconhecer o padrao como um problema etico e de saude profissional, buscar supervisao ou consultoria de pares e estabelecer limites claros no relacionamento","Entender que e normal ter clientes mais proximos e que a dedicacao extra e sinal de excelencia no atendimento","Transferir o cliente para outro profissional imediatamente sem qualquer explicacao para proteger ambas as partes","Aumentar os honorarios para o cliente especifico para compensar o tempo extra dedicado a ele"],ans:0,exp:"A dependencia excessiva de um cliente e um sinal de alerta etico que pode comprometer a objetividade das recomendacoes e a saude profissional do planejador. A supervisao reflexiva e fundamental para identificar esses padroes antes que causem dano ao cliente ou ao profissional."},
  {id:93,tp:"Motivacao e mudanca",c:"#a78bfa",text:"O 'paradoxo da mudanca' na entrevista motivacional sugere que:",opts:["Quanto mais o planejador tenta convencer o cliente a mudar, mais o cliente resiste — paradoxalmente, aceitar e validar a ambivalencia do cliente frequentemente gera mais abertura para a mudanca","A mudanca de comportamento financeiro e impossivel sem intervencao psicologica profissional especializada","Clientes que resistem fortemente a mudancas nunca conseguem muda-las, independentemente da abordagem usada","O planejador deve insistir repetidamente nas mesmas recomendacoes ate que o cliente finalmente aceite"],ans:0,exp:"A psicologia da resistencia mostra que a pressao direta para mudar frequentemente aumenta a resistencia (reactance psicologica). A entrevista motivacional e baseada exatamente nesse paradoxo: ao aceitar e explorar a ambivalencia sem pressao, o planejador cria espaco para que a propria motivacao do cliente emerja."},
  {id:94,tp:"Motivacao e mudanca",c:"#a78bfa",text:"O modelo transteorico de mudanca identifica o estagio de 'manutencao'. O que caracteriza este estagio e qual e o papel do planejador?",opts:["O cliente ja implementou a mudanca ha mais de 6 meses e o planejador deve ajuda-lo a consolidar novos habitos, antecipar situacoes de risco de recaida e desenvolver estrategias de enfrentamento","O cliente esta apenas comecando a considerar a mudanca e precisa de muita informacao e motivacao para avancar","O cliente implementou a mudanca recentemente (menos de 6 meses) e ainda e muito vulneravel a recaida","O cliente recaiu no comportamento anterior e precisa recomecar todo o processo de mudanca do zero"],ans:0,exp:"Na manutencao, o novo comportamento ja esta consolidado (mais de 6 meses), mas a recaida ainda e possivel em situacoes de estresse ou tentacao. O papel do planejador e reforcar os progressos, identificar situacoes de risco (bonus inesperado, crise emocional) e co-criar planos de contingencia para proteger as mudancas conquistadas."},
  {id:95,tp:"Aplicacao integrada",c:"#fb7185",text:"Um casal procura o planejador com objetivos financeiros opostos: ela quer guardar intensamente para aposentadoria antecipada; ele quer gastar em viagens e experiencias agora. O planejador identifica que ela tem script de 'vigilancia financeira' e ele tem script de 'adoracao do dinheiro'. A abordagem mais adequada e:",opts:["Facilitar um dialogo estruturado sobre os valores profundos de cada um, identificar onde ha sobreposicao de objetivos (ex: seguranca E experiencias) e co-construir um plano que honre ambos os scripts de forma balanceada","Adotar a posicao da esposa por ser mais tecnicamente responsavel e apresentar ao marido os dados sobre a importancia da aposentadoria","Elaborar planos financeiros completamente separados para cada conjuge, sem pontos de contato ou integracao","Recomendar que ambos faca terapia de casal focada em financas antes de qualquer planejamento formal"],ans:0,exp:"O conflito financeiro em casal frequentemente reflete diferenca em scripts e valores — nao irresponsabilidade. O planejador deve facilitar o dialogo, identificar valores compartilhados (seguranca + experiencias = 'aposentadoria antecipada E viagens estrategicas agora') e construir um plano que honre ambas as perspectivas."},
  {id:96,tp:"Aplicacao integrada",c:"#fb7185",text:"Um herdeiro recebe R$2 milhoes inesperadamente e quer investir tudo em criptoativos 'para multiplicar rapido'. O planejador identifica sobrecarga emocional, inexperiencia com grandes somas e vies de 'windfall effect' (dinheiro facil merece risco maior). A sequencia de intervencao mais adequada e:",opts:["Validar a emocao da heranca, educar sobre o windfall effect e o risco de concentracao, propor um periodo de espera antes de grandes decisoes e apresentar opcoes diversificadas gradualmente","Negar o pedido imediatamente e apresentar apenas opcoes de renda fixa conservadora para proteger o patrimonio","Aceitar o pedido pois e dinheiro do cliente e sua autonomia deve ser respeitada integralmente sem questionamentos","Encaminhar para especialista em criptoativos sem fazer nenhuma intervencao psicologica ou comportamental"],ans:0,exp:"O windfall effect (herancas, premios, bonus inesperados) ativa a contabilidade mental que trata 'dinheiro facil' com menos cuidado. O planejador deve: (1) Validar emocionalmente; (2) Educar sobre o vies; (3) Sugerir periodo de espera (tipicamente 6-12 meses); (4) Propor abordagem gradual e diversificada. Respeitar autonomia nao significa omitir orientacao."},
  {id:97,tp:"Aplicacao integrada",c:"#fb7185",text:"Ao longo de 6 meses de atendimento, o planejador percebe que sempre concorda com o cliente, nunca apresenta dados que contradizem as expectativas dele e sente desconforto ao mencionar riscos relevantes. Esse padrao configura:",opts:["'Vies de agrado' (people-pleasing bias) do planejador, que compromete a qualidade do servico e constitui falha etica — o cliente nao recebe as informacoes de que necessita para tomar decisoes informadas","Excelencia no atendimento centrado no cliente, pois o planejador esta adaptando o servico as preferencias e ao estilo do cliente","Excesso de empatia afetiva que pode ser corrigido com treinamento em comunicacao assertiva basica","Comportamento normal no inicio do relacionamento que tende a se corrigir naturalmente ao longo do tempo"],ans:0,exp:"O people-pleasing bias e um problema etico serio: o planejador que evita conflito priva o cliente de informacoes essenciais para boas decisoes. O dever fiduciario inclui apresentar informacoes desconfortaveis de forma empatica mas honesta. A supervisao reflexiva e fundamental para identificar esse padrao antes que cause dano."},
  {id:98,tp:"Aplicacao integrada",c:"#fb7185",text:"Um cliente de 65 anos, recem-aposentado, demonstra sinais de 'sindrome de identidade pos-aposentadoria': perda de proposito, ansiedade, gastar compulsivamente para preencher o tempo. O planejador deve:",opts:["Abordar a transicao de identidade com empatia, explorar o que o cliente quer que sua aposentadoria signifique, e so entao ajustar o plano financeiro para suportar essa nova fase de vida","Recomendar imediatamente que o cliente retorne ao trabalho em meio periodo para recuperar a identidade profissional","Ajustar imediatamente a carteira para perfil mais conservador e reduzir o acesso a recursos liquidos do cliente","Encaminhar o cliente para psiquiatra imediatamente por suspeita de transtorno de ansiedade generalizada"],ans:0,exp:"A aposentadoria e uma transicao de identidade profunda — o cliente perde nao apenas uma rotina, mas uma fonte de significado, status e relacionamentos. O planejador que ignora essa dimensao e trabalha apenas os numeros perdera o cliente ou tera um plano nao implementado. A dimensao de proposito e central no planejamento de aposentadoria comportamental."},
  {id:99,tp:"Aplicacao integrada",c:"#fb7185",text:"Um planejador percebe que um cliente prospero mas ansioso sobre financas corresponderia melhor a qual intervencao prioritaria?",opts:["Antes de qualquer otimizacao tecnica, explorar a origem da ansiedade financeira (possivelmente um script de vigilancia) e trabalhar a percepcao de seguranca — pois sem isso nenhum plano tecnico ira reduzir a ansiedade","Apresentar imediatamente um relatorio completo mostrando que a situacao financeira e excelente em todos os indicadores","Recomendar meditacao e exercicios de respiracao para reduzir a ansiedade antes das reunioes de planejamento","Aumentar a alocacao em renda fixa para reduzir a volatilidade da carteira e assim diminuir a ansiedade do cliente"],ans:0,exp:"A ansiedade financeira em clientes prosperos frequentemente tem raiz em scripts (vigilancia financeira, trauma de escassez passada) e nao em dados objetivos. Apresentar mais dados positivos nao resolve — muitas vezes aumenta a ansiedade por expor a distancia entre o que o cliente 'deveria' sentir e o que realmente sente. A abordagem deve comecar pela exploracao empatica da origem."},
  {id:100,tp:"Aplicacao integrada",c:"#fb7185",text:"Qual das seguintes afirmacoes melhor descreve o papel do planejador financeiro no paradigma da 'psicologia do planejamento financeiro' do Modulo 8 CFP?",opts:["Um profissional tecnicamente competente que integra dimensoes comportamentais, emocionais e relacionais ao planejamento — atuando como coach financeiro que ajuda o cliente a tomar melhores decisoes alinhadas aos seus proprios valores e objetivos de vida","Um terapeuta financeiro que prioriza o tratamento psicologico das questoes emocionais antes de qualquer planejamento tecnico","Um especialista exclusivamente tecnico que utiliza modelos quantitativos para otimizar a alocacao de ativos do cliente","Um profissional de vendas que usa tecnicas psicologicas para aumentar o engajamento do cliente com os produtos recomendados"],ans:0,exp:"O Modulo 8 representa uma evolucao do papel do planejador: de tecnico especializado para profissional que integra competencia tecnica com inteligencia emocional, compreensao comportamental e habilidades relacionais. O objetivo final e sempre ajudar o cliente a tomar melhores decisoes para uma vida financeira alinhada ao que genuinamente importa para ele — nao apenas maximizar numeros."}
];

// ── EMBARALHAMENTO FISHER-YATES ────────────────────────────────────────
function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp;
  }
  return arr;
}

// Embaralha as alternativas de cada questão preservando o gabarito
function buildShuffled(raw){
  return raw.map(function(q){
    var correctText=q.opts[q.ans];
    var shuffled=shuffle(q.opts.slice());
    var newAns=shuffled.indexOf(correctText);
    return {id:q.id,tp:q.tp,c:q.c,text:q.text,opts:shuffled,ans:newAns,exp:q.exp};
  });
}

var QS=buildShuffled(RAW);
var TOTAL=QS.length;

// ── ESTADO E STORAGE ────────────────────────────────────────────────────
var STORAGE_KEY='cfp_m8_100_v1';
var state={};
var curView='all', curTopic='';

function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}
function loadState(){try{var r=localStorage.getItem(STORAGE_KEY);if(r)state=JSON.parse(r);}catch(e){state={};}}

// ── STATS ───────────────────────────────────────────────────────────────
function updateStats(){
  var n=Object.keys(state).length;
  var c=Object.values(state).filter(function(a){return a.ok;}).length;
  var p=n>0?Math.round(c/n*100):0;
  document.getElementById('na').textContent=n;
  document.getElementById('nc').textContent=c;
  document.getElementById('ne').textContent=n-c;
  var pe=document.getElementById('np');
  pe.textContent=n>0?p+'%':'—';
  pe.style.color=p>=70?'#10b981':p>=50?'#f59e0b':'#3b82f6';
  document.getElementById('pb').style.width=Math.round(n/TOTAL*100)+'%';
}

// ── FILTRO ──────────────────────────────────────────────────────────────
function getVisible(){
  return QS.filter(function(q){
    var a=state[q.id];
    var tok=!curTopic||q.tp===curTopic;
    if(curView==='pend') return !a&&tok;
    if(curView==='err') return a&&!a.ok&&tok;
    return tok;
  });
}

// ── RENDER ──────────────────────────────────────────────────────────────
function render(){
  var ql=document.getElementById('ql');
  if(!ql) return;
  ql.innerHTML='';
  var vis=getVisible();
  if(vis.length===0){
    var p=document.createElement('p');
    p.className='empty';
    p.textContent='Nenhuma questao nesta categoria.';
    ql.appendChild(p);
    return;
  }
  vis.forEach(function(q){
    var a=state[q.id];
    var done=!!a;
    var card=document.createElement('div');
    card.className='qc';

    var meta=document.createElement('div');
    meta.className='qm';
    var bdg=document.createElement('span');
    bdg.className='bdg';
    bdg.style.background=q.c+'22';
    bdg.style.color=q.c;
    bdg.textContent=q.tp;
    var qn=document.createElement('span');
    qn.className='qn';
    qn.textContent='Q'+q.id+'/'+TOTAL;
    meta.appendChild(bdg); meta.appendChild(qn);

    var qt=document.createElement('p');
    qt.className='qt';
    qt.textContent=q.text;

    var os=document.createElement('div');
    os.className='os';
    os.id='O'+q.id;

    q.opts.forEach(function(opt,i){
      var btn=document.createElement('button');
      btn.className='op';
      if(done){
        if(i===q.ans) btn.classList.add('ok');
        else if(i===a.sel) btn.classList.add('no');
        else btn.classList.add('dm');
        btn.disabled=true;
      }
      var lt=document.createElement('span');
      lt.className='lt';
      lt.textContent='ABCD'[i];
      btn.appendChild(lt);
      btn.appendChild(document.createTextNode(opt));
      (function(qi,si){btn.addEventListener('click',function(){pick(qi,si);});})(q.id,i);
      os.appendChild(btn);
    });

    var fb=document.createElement('div');
    fb.className='fb';
    fb.id='F'+q.id;
    if(done){
      fb.classList.add(a.ok?'fbok':'fbno');
      fb.style.display='block';
      var strong=document.createElement('strong');
      strong.textContent=a.ok?'Correto! ':'Incorreto. ';
      fb.appendChild(strong);
      fb.appendChild(document.createTextNode(q.exp));
    }

    card.appendChild(meta);
    card.appendChild(qt);
    card.appendChild(os);
    card.appendChild(fb);
    ql.appendChild(card);
  });
}

// ── RESPOSTA ────────────────────────────────────────────────────────────
function pick(qid,sel){
  if(state[qid]) return;
  var q=null;
  for(var i=0;i<QS.length;i++){if(QS[i].id===qid){q=QS[i];break;}}
  if(!q) return;
  var ok=sel===q.ans;
  state[qid]={sel:sel,ok:ok};
  saveState();

  document.querySelectorAll('#O'+qid+' .op').forEach(function(btn,i){
    btn.disabled=true;
    btn.className='op';
    if(i===q.ans) btn.classList.add('ok');
    else if(i===sel&&!ok) btn.classList.add('no');
    else btn.classList.add('dm');
  });

  var fb=document.getElementById('F'+qid);
  fb.className='fb '+(ok?'fbok':'fbno');
  fb.innerHTML='';
  var strong=document.createElement('strong');
  strong.textContent=ok?'Correto! ':'Incorreto. ';
  fb.appendChild(strong);
  fb.appendChild(document.createTextNode(q.exp));
  fb.style.display='block';
  updateStats();
}

// ── FILTROS ─────────────────────────────────────────────────────────────
function setView(v,btn){
  curView=v; curTopic='';
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById('tsel').value='';
  render();
}
function setTopic(v){
  curTopic=v; curView='all';
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on');});
  document.getElementById('btn-all').classList.add('on');
  render();
}

// ── INIT ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',function(){
  loadState();

  var topics=[...new Set(RAW.map(function(q){return q.tp;}))];
  var tsel=document.getElementById('tsel');
  topics.forEach(function(t){
    var o=document.createElement('option');
    o.value=t; o.textContent=t;
    tsel.appendChild(o);
  });
  tsel.addEventListener('change',function(){setTopic(this.value);});

  document.getElementById('btn-all').addEventListener('click',function(){setView('all',this);});
  document.getElementById('btn-pend').addEventListener('click',function(){setView('pend',this);});
  document.getElementById('btn-err').addEventListener('click',function(){setView('err',this);});

  document.getElementById('btn-reset').addEventListener('click',function(){
    document.getElementById('modal').classList.add('show');
  });
  document.getElementById('modal-cancel').addEventListener('click',function(){
    document.getElementById('modal').classList.remove('show');
  });
  document.getElementById('modal-confirm').addEventListener('click',function(){
    state={};
    saveState();
    document.getElementById('modal').classList.remove('show');
    curView='all'; curTopic='';
    document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on');});
    document.getElementById('btn-all').classList.add('on');
    document.getElementById('tsel').value='';
    updateStats();
    render();
  });
  document.getElementById('modal').addEventListener('click',function(e){
    if(e.target===this) this.classList.remove('show');
  });

  updateStats();
  render();
});
</script>

</body>
