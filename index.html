<script>
// ─── BANCO DE QUESTÕES (respostas corretas sempre em ans:0 antes do embaralhamento) ───
var RAW=[
  // ── FUNDAMENTOS ────────────────────────────────────────────────────────
  {id:1,tp:"Fundamentos",c:"#3b82f6",text:"Richard Thaler, Premio Nobel de 2017, e mais associado a contribuicao de:",opts:["Criar o conceito de contabilidade mental e popularizar a economia comportamental com aplicacoes praticas","Desenvolver a Teoria da Perspectiva com Kahneman","Propor o conceito de mercados eficientes em versao comportamental","Desenvolver o modelo CAPM ajustado por fatores comportamentais"],ans:0,exp:"Thaler e o grande nome da economia comportamental aplicada. Suas contribuicoes incluem a contabilidade mental, o efeito dotacao, o conceito de nudge (com Sunstein) e o programa SMarT."},
  {id:2,tp:"Fundamentos",c:"#3b82f6",text:"O conceito de 'racionalidade limitada' (bounded rationality) de Herbert Simon sugere que os individuos:",opts:["Tomam decisoes que satisfazem um criterio minimo aceitavel ('satisficing') em vez de otimizar, devido a limitacoes cognitivas","Sao completamente irracionais e nao conseguem tomar boas decisoes","Sao racionais apenas em decisoes de alto valor financeiro","Tomam decisoes mais racionais quando tem mais opcoes disponiveis"],ans:0,exp:"Simon cunhou 'bounded rationality': agentes decidem com informacao incompleta e capacidade cognitiva finita. Em vez de otimizar, buscam solucoes 'suficientemente boas' (satisficing). Base das financas comportamentais."},
  {id:3,tp:"Fundamentos",c:"#3b82f6",text:"A distincao entre 'Econs' e 'Humanos' de Thaler e Sunstein refere-se a:",opts:["O agente economico racional idealizado versus o ser humano real, com vieses e racionalidade limitada","Economistas profissionais versus leigos em financas","Investidores institucionais versus investidores individuais","Profissionais quantitativos versus analistas qualitativos"],ans:0,exp:"'Econs' sao perfeitamente racionais — agentes hipoteticos da teoria classica. 'Humanos' sao como realmente somos: impulsivos, influenciaveis pelo contexto e propensos a vieses. O planejamento eficaz deve ser desenhado para humanos."},
  {id:4,tp:"Fundamentos",c:"#3b82f6",text:"O campo das financas comportamentais e interdisciplinar porque integra:",opts:["Economia, psicologia cognitiva, neurociencia, sociologia e antropologia","Apenas economia e matematica financeira","Exclusivamente psicologia clinica e psicanalise","Direito financeiro, contabilidade e psicologia organizacional"],ans:0,exp:"Financas comportamentais integram: psicologia cognitiva (vieses e heuristicas), neurociencia (bases cerebrais da decisao), sociologia (influencias sociais) e antropologia (crencas culturais sobre dinheiro)."},
  {id:5,tp:"Fundamentos",c:"#3b82f6",text:"O principio do 'paternalismo libertario', base filosofica dos nudges, sustenta que:",opts:["E possivel influenciar comportamentos em direcao a melhores resultados sem eliminar a liberdade de escolha","O Estado deve determinar as melhores escolhas para os cidadaos, eliminando mas opcoes","A liberdade de escolha deve ser absoluta e qualquer influencia e antietica","Incentivos financeiros sao sempre mais eficazes do que nudges"],ans:0,exp:"'Libertarian paternalism': paternalista porque orienta para melhores escolhas; libertario porque preserva a liberdade de escolher diferente. O design de opcoes sempre influencia — melhor faze-lo conscientemente a favor do cliente."},
  {id:6,tp:"Fundamentos",c:"#3b82f6",text:"As heuristicas, no contexto das financas comportamentais, sao definidas como:",opts:["Atalhos cognitivos que simplificam decisoes, uteis no cotidiano mas que podem gerar erros sistematicos em contextos financeiros complexos","Formulas matematicas para calcular o retorno esperado de ativos de risco","Estrategias otimas de alocacao de carteira baseadas em dados historicos","Regras juridicas de responsabilidade profissional do planejador financeiro"],ans:0,exp:"Heuristicas sao simplificacoes que ajudam a decidir rapidamente. Embora uteis, podem gerar vieses quando aplicadas em contextos que exigem analise mais rigorosa, como decisoes financeiras complexas de longo prazo."},
  {id:7,tp:"Fundamentos",c:"#3b82f6",text:"Daniel Kahneman descreve dois sistemas de pensamento. O Sistema 2 caracteriza-se por ser:",opts:["Lento, deliberado, analitico e com alto custo cognitivo — ativado para problemas complexos","Rapido, automatico e intuitivo — responsavel pela maioria das decisoes cotidianas","Exclusivamente emocional e desvinculado de dados ou logica","Ativo apenas em situacoes de alto risco financeiro e sem alternativas claras"],ans:0,exp:"O Sistema 2 e lento, deliberado e analitico. Requer esforco consciente e e ativado para problemas que o Sistema 1 nao consegue resolver automaticamente. Nas financas, decisoes de planejamento de longo prazo deveriam envolver o Sistema 2, mas frequentemente o Sistema 1 domina."},

  // ── VIESES COGNITIVOS ────────────────────────────────────────────────────
  {id:8,tp:"Vieses cognitivos",c:"#10b981",text:"O 'efeito dotacao' (endowment effect), demonstrado por Thaler, mostra que:",opts:["As pessoas atribuem mais valor a um objeto pelo simples fato de possuilo, mesmo que seu valor de mercado seja o mesmo","Investidores superalocam em ativos de maior dividend yield","Carteiras herdadas tendem a ter retornos superiores a carteiras construidas ativamente","Clientes valorizam mais produtos recomendados pelo planejador do que os escolhidos por conta propria"],ans:0,exp:"O efeito dotacao cria apego irracional pela posse. No planejamento financeiro, explica a relutancia em vender acoes herdadas inadequadas ao perfil, manter imoveis que deveriam ser vendidos, ou resistir a mudancas de carteira tecnicamente justificadas."},
  {id:9,tp:"Vieses cognitivos",c:"#10b981",text:"O 'vies de retrospectiva' (hindsight bias) e perigoso para o planejador porque:",opts:["Leva a acreditar que eventos passados eram previsiveis, criando falsa capacidade preditiva e comprometendo a avaliacao honesta de decisoes anteriores","Faz subestimar retornos futuros com base em retornos passados recentes","Faz o cliente superestimar perdas passadas e subestimar ganhos ja realizados","E o unico vies que afeta exclusivamente profissionais, nao clientes leigos"],ans:0,exp:"O hindsight bias ('eu sabia que isso ia acontecer') impede o aprendizado genuino com erros. Decisoes devem ser avaliadas com base nas informacoes disponiveis no momento — nao com beneficio do retrospecto."},
  {id:10,tp:"Vieses cognitivos",c:"#10b981",text:"A 'paralisia por excesso de opcoes' (choice overload) implica que:",opts:["Oferecer muitas opcoes pode levar a procrastinacao e inacao — como a queda na adesao a planos de previdencia com muitos fundos","Clientes com mais opcoes tomam decisoes mais qualificadas e diversificadas","Clientes sempre preferem o maximo de opcoes para exercer autonomia","O paradoxo da escolha afeta apenas decisoes de consumo, nao de investimento"],ans:0,exp:"Em planos de previdencia, a taxa de adesao cai a medida que o numero de fundos aumenta. O planejador pode usar arquitetura de escolhas para reduzir a complexidade, apresentando no maximo 3-5 opcoes curadas ao cliente."},
  {id:11,tp:"Vieses cognitivos",c:"#10b981",text:"O 'vies de projecao' (projection bias) leva o investidor a:",opts:["Assumir que suas preferencias e tolerancia ao risco atuais permanencerao iguais no futuro, subestimando como elas mudarao","Projetar retornos futuros apenas com base em retornos passados recentes","Atribuir ao mercado suas proprias expectativas de retorno","Superestimar crescimento de investimentos em setores que pessoalmente conhece e usa"],ans:0,exp:"O projection bias faz o investidor montar a carteira assumindo que vai sentir no futuro o que sente hoje. Quem monta a carteira num momento de bonanca subestima como reagira emocionalmente a uma queda de 30%."},
  {id:12,tp:"Vieses cognitivos",c:"#10b981",text:"O fenomeno do 'money illusion' (ilusao monetaria) descreve a tendencia de:",opts:["Pensar em termos nominais em vez de reais, ignorando o efeito da inflacao — como celebrar aumento salarial de 5% quando a inflacao e 8%","Confundir valores em moedas estrangeiras com valores na moeda local","Superestimar o valor de dinheiro fisico em relacao a saldos digitais e investimentos","Subestimar o custo de oportunidade de manter dinheiro parado na conta corrente"],ans:0,exp:"A ilusao monetaria leva a decisoes equivocadas por desconsiderar a inflacao. Exemplos: celebrar 'ganho' de 8% ao ano quando a inflacao e 9%, ou sentir que o salario aumentou quando o reajuste foi abaixo da inflacao."},
  {id:13,tp:"Vieses cognitivos",c:"#10b981",text:"O 'base rate neglect' (negligencia da taxa base) ocorre quando:",opts:["O investidor da peso excessivo a informacoes especificas e vividas, ignorando probabilidades estatisticas gerais que deveriam orientar a decisao","O investidor ignora completamente dados historicos ao tomar decisoes de investimento","O investidor aplica a mesma taxa historica de retorno para projetar resultados futuros invariavelmente","O investidor negligencia a taxa de administracao de fundos ao comparar retornos liquidos"],ans:0,exp:"A negligencia da taxa base e manifestacao do vies de representatividade. Exemplo: ao ouvir historia empolgante sobre uma startup, o investidor ignora que 90% das startups fracassam. O caso especifico e vivido domina a informacao estatistica geral."},
  {id:14,tp:"Vieses cognitivos",c:"#10b981",text:"O 'excesso de otimismo' (optimism bias) se diferencia do overconfidence porque:",opts:["O excesso de otimismo e a crenca de que eventos positivos sao mais provaveis para si do que para outros; o overconfidence e a superestimacao da propria competencia em tarefas especificas","Sao sinonimos — descrevem a mesma distorcao cognitiva sem diferenca pratica","O excesso de otimismo e exclusivo de investidores novatos; o overconfidence afeta apenas especialistas","O excesso de otimismo leva a inacao; o overconfidence leva a negociacao excessiva"],ans:0,exp:"O optimism bias: 'coisas ruins acontecem com os outros, nao comigo'. O overconfidence: superestimacao da propria habilidade em tarefas especificas. Ambos podem coexistir e tem implicacoes distintas para o planejamento."},
  {id:15,tp:"Vieses cognitivos",c:"#10b981",text:"O 'vies de afeto' (affect heuristic) ocorre quando:",opts:["A reacao emocional a uma empresa ou ideia influencia a avaliacao de risco e retorno — quem gosta percebe alto retorno E baixo risco simultaneamente, violando a relacao risco-retorno","O investidor toma decisoes com base exclusivamente em analise quantitativa e dados objetivos","Emocoes positivas sempre levam a melhores decisoes de investimento no longo prazo","O planejador usa as emocoes do cliente estrategicamente para recomendar produtos mais adequados"],ans:0,exp:"A affect heuristic cria inconsistencia logica: quem ama uma marca tende a percebe-la como de alto retorno e baixo risco ao mesmo tempo. Investidores sobrealocam em ativos de que 'gostam', sem analise objetiva."},
  {id:16,tp:"Vieses cognitivos",c:"#10b981",text:"A 'fadiga de decisao' (decision fatigue) e relevante para o planejamento porque:",opts:["A qualidade das decisoes financeiras se deteriora ao longo de reunioes longas, tornando o cliente mais impulsivo ou excessivamente avesso ao risco por exaustao cognitiva","Clientes com mais dinheiro tendem a tomar decisoes piores por terem muitas opcoes disponiveis","Apenas planejadores financeiros estao sujeitos a fadiga de decisao, nao seus clientes","Clientes mais jovens sofrem mais de fadiga de decisao do que clientes mais velhos"],ans:0,exp:"Decidir bem e um recurso que se esgota ao longo do dia e da reuniao. Reunioes muito longas levam o cliente a deferir decisoes ou fazer escolhas impulsivas. Planejadores devem abordar as decisoes mais importantes no inicio das reunioes."},
  {id:17,tp:"Vieses cognitivos",c:"#10b981",text:"Um investidor compra acoes de empresa que 'parece solida', sem analisar fundamentos. Depois que a empresa vai bem, diz: 'Eu sempre soube que seria assim.' Quais dois vieses estao presentes?",opts:["Representatividade (julgou pela aparencia) e hindsight bias (acredita que sempre soube)","Efeito manada e ancoragem no preco historico da acao","Overconfidence e vies de confirmacao sobre os setores preferidos","Disponibilidade e efeito dotacao sobre a posicao atual na carteira"],ans:0,exp:"Representatividade: julgou a empresa por esteriotipo superficial. Hindsight bias: apos o bom resultado, reescreve a historia como se sempre tivesse sido obvio. Esses dois vieses frequentemente coexistem e se reforcam mutuamente."},
  {id:18,tp:"Vieses cognitivos",c:"#10b981",text:"O 'vies de self-attribution' (atribuicao egoista) manifesta-se quando o investidor:",opts:["Atribui os ganhos a propria habilidade e os prejuizos a fatores externos como o mercado ou o governo","Busca informacoes que confirmem suas crencas previas sobre determinado ativo","Superestima a propria capacidade de prever movimentos de curto prazo do mercado","Mantem posicoes perdedoras por tempo excessivo para evitar realizar a perda"],ans:0,exp:"O self-attribution bias alimenta o overconfidence: o investidor aprende que e 'bom' porque atribui os acertos a si mesmo e os erros ao mercado. Isso impede o aprendizado genuino e leva a assuncao de riscos crescentes."},
  {id:19,tp:"Vieses cognitivos",c:"#10b981",text:"O 'vies de familiaridade' (familiarity bias) leva o investidor a:",opts:["Preferir ativos que conhece — acoes da propria empresa empregadora, marcas que consome — resultando em diversificacao inadequada","Rejeitar qualquer ativo que nao tenha pelo menos 5 anos de historico de retorno documentado","Confiar mais em recomendacoes de amigos do que de especialistas financeiros certificados","Ignorar ativos estrangeiros por desconhecer as regulacoes de outros paises"],ans:0,exp:"O vies de familiaridade e uma das causas mais comuns de concentracao de risco. Funcionarios que investem excessivamente em acoes da propria empresa (home bias profissional) ou investidores que ignoram diversificacao internacional sao exemplos classicos."},
  {id:20,tp:"Vieses cognitivos",c:"#10b981",text:"O fenomeno de 'narrow framing' (enquadramento estreito) ocorre quando o investidor:",opts:["Avalia cada investimento isoladamente em vez de como parte de um portfolio integrado, levando a decisoes subotimas","Foca apenas em retornos de curto prazo sem considerar objetivos de longo prazo","Compara seus retornos apenas com o benchmark mais proximo sem considerar risco","Rejeita opcoes de investimento que nao compreende completamente"],ans:0,exp:"O narrow framing leva a avaliar o risco de cada ativo de forma isolada, e nao no contexto do portfolio completo. Isso faz o investidor rejeitar ativos com volatilidade individual alta mesmo quando eles reduzem o risco total da carteira por baixa correlacao."},

  // ── TEORIA DA PERSPECTIVA ────────────────────────────────────────────────
  {id:21,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"Na Teoria da Perspectiva, o 'ponto de referencia' e central porque:",opts:["Determina se uma situacao e percebida como ganho ou perda — e essa percepcao, nao o valor absoluto, orienta a decisao","Define o valor absoluto de um ativo com base no preco de mercado justo calculado pelo planejador","Estabelece o benchmark de retorno minimo exigido pelo investidor para aceitar qualquer ativo","Representa o valor patrimonial inicial antes de qualquer investimento ou contribuicao"],ans:0,exp:"Tudo e relativo ao ponto de referencia. O mesmo resultado pode ser percebido como ganho ou perda dependendo do referencial adotado. O preco de compra, o valor maximo ja atingido ou uma expectativa podem funcionar como referencia."},
  {id:22,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"A funcao valor da Teoria da Perspectiva e concava para ganhos e convexa para perdas. Isso implica que:",opts:["Para ganhos, tende a aversao ao risco (prefere ganho certo menor); para perdas, tende a propensao ao risco (prefere arriscar a aceitar perda certa)","O investidor e sempre avesso ao risco, tanto para ganhos quanto para perdas em qualquer magnitude","Perdas e ganhos sao percebidos com a mesma intensidade emocional em todos os cenarios","O investidor e neutro ao risco para pequenos valores e avesso ao risco apenas para grandes valores"],ans:0,exp:"A assimetria da funcao valor e central na Teoria da Perspectiva. Para ganhos: preferimos R$500 garantidos a 50% de chance de R$1.000. Para perdas: preferimos arriscar 50% de chance de perder R$1.000 a aceitar perder R$500 com certeza. Isso explica o efeito disposicao."},
  {id:23,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"O 'efeito certeza' (certainty effect) da Teoria da Perspectiva mostra que as pessoas:",opts:["Supervalorizam resultados certos em relacao a resultados provaveis, mesmo quando a matematica favorece a aposta probabilistica","Sempre preferem a opcao de maior retorno esperado, independentemente da probabilidade","Sao indiferentes entre certeza e probabilidade quando os valores esperados matematicos sao exatamente iguais","Tomam decisoes sempre mais racionais quando os resultados sao certos do que quando sao probabilisticos"],ans:0,exp:"O efeito certeza explica a preferencia por ganhos garantidos mesmo quando o valor esperado da aposta e maior. Exemplo: preferir R$900 certos a 90% de chance de R$1.000 (mesmo valor esperado). Tambem explica a popularidade de produtos com capital garantido."},
  {id:24,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"Para maximizar o bem-estar percebido do cliente na comunicacao de resultados financeiros, o planejador deve:",opts:["Segregar perdas em parcelas menores e combinar multiplos ganhos em um unico resultado (integracao de ganhos)","Sempre apresentar resultados de forma integrada para simplificar a analise e evitar confusao","Integrar perdas e ganhos sempre que o resultado liquido final for positivo e favoravel ao cliente","Apresentar resultados de forma neutra, sem considerar aspectos psicologicos de integracao ou segregacao"],ans:0,exp:"Thaler demonstrou: (1) Integrar perdas — uma perda unica de R$2.000 doi menos que duas de R$1.000; (2) Segregar ganhos — dois ganhos de R$1.000 geram mais prazer que um unico de R$2.000. Conhecer isso ajuda a comunicar resultados de forma mais eficaz."},
  {id:25,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"Um cliente tem ganho de R$8.000 em uma conta e perda de R$8.000 em outra. Esta muito mais angustiado com a perda do que satisfeito com o ganho. Qual principio explica isso diretamente?",opts:["Aversao a perda — perdas pesam emocionalmente 1,5 a 2,5 vezes mais do que ganhos equivalentes","Efeito certeza — o ganho parece mais incerto do que a perda percebida","Efeito disposicao — o cliente quer realizar o ganho e manter a perda indefinidamente","Contabilidade mental — o cliente contabiliza as contas de forma completamente separada"],ans:0,exp:"A aversao a perda (loss aversion) e o principio central da Teoria da Perspectiva. A dor de uma perda e 1,5 a 2,5x mais intensa que o prazer de um ganho equivalente. Clientes que perdem o sono com perdas nominais estao manifestando aversao a perda intensa."},
  {id:26,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"O 'efeito disposicao' e definido como a tendencia de:",opts:["Vender ativos com ganho muito rapidamente (para 'garantir' o lucro) e manter ativos com perda por tempo excessivo (esperando recuperacao)","Diversificar excessivamente a carteira para reduzir o risco especifico de cada ativo individual","Concentrar todos os investimentos em ativos de renda fixa apos qualquer experiencia de perda","Rebalancear automaticamente a carteira a cada trimestre independentemente das condicoes de mercado"],ans:0,exp:"O efeito disposicao e uma das consequencias mais estudadas da aversao a perda. O investidor 'realiza' ganhos cedo para sentir o prazer, e mantem perdedores indefinidamente para nao confirmar a perda. Isso sistematicamente prejudica os retornos de longo prazo."},
  {id:27,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"A 'contabilidade mental' leva o investidor a erros financeiros porque:",opts:["Trata recursos de diferentes origens (salario, bonus, heranca) como fungeis de formas distintas, levando a decisoes subotimas que ignoram o valor real equivalente do dinheiro","Calcula mentalmente o rendimento real descontando a inflacao de forma equivocada e imprecisa","Registra mentalmente todas as despesas para controle orcamentario pessoal informal","Avalia os investimentos considerando apenas o retorno absoluto sem considerar o risco assumido"],ans:0,exp:"Na contabilidade mental, o dinheiro 'ganho facil' (como um bonus ou premio de loteria) costuma ser tratado com menos cuidado do que o salario mensal, embora os valores sejam financeiramente equivalentes. Isso pode levar a gastos irracionais e estrategias de investimento incoerentes."},

  // ── EMOCOES E DECISAO ─────────────────────────────────────────────────
  {id:28,tp:"Emocoes e decisao",c:"#f59e0b",text:"O modelo de 'inteligencia emocional' aplicado ao planejamento financeiro sugere que o planejador mais eficaz:",opts:["Reconhece e regula suas proprias emocoes, identifica as emocoes do cliente e usa esse entendimento para guiar o planejamento de forma construtiva","Consegue suprimir completamente suas proprias emocoes durante o atendimento para manter objetividade tecnica","Expressa abertamente suas opinioes emocionais sobre as decisoes do cliente para criar empatia genuina","Foca exclusivamente nas emocoes do cliente, ignorando os aspectos tecnicos do planejamento financeiro"],ans:0,exp:"A inteligencia emocional (Goleman) envolve autoconsciencia (reconhecer os proprios vieses), autorregulacao, empatia (identificar o estado emocional do cliente) e habilidade social. Nao e suprimir emocoes, mas usa-las com inteligencia."},
  {id:29,tp:"Emocoes e decisao",c:"#f59e0b",text:"Pesquisas em neurociencia (Damasio) mostram que pacientes com dano nas regioes cerebrais responsaveis pelas emocoes:",opts:["Paradoxalmente, tem dificuldade em tomar boas decisoes, pois emocoes fornecem 'marcadores somaticos' essenciais para orientar escolhas","Tomam decisoes financeiras superiores por serem puramente racionais e sem interferencias emocionais","Demonstram o modelo ideal de decisor economico — o homo economicus real e funcional","Tomam decisoes mais rapidas, porem com menor qualidade e consistencia final"],ans:0,exp:"Damasio mostrou que a ausencia de resposta emocional nao torna as pessoas mais racionais — as paralisa. Emocoes funcionam como 'marcadores somaticos' que sinalizam opcoes boas e ruins com base em experiencias passadas."},
  {id:30,tp:"Emocoes e decisao",c:"#f59e0b",text:"Durante forte queda de mercado, varios clientes ligam em panico. A sequencia correta de resposta do planejador e:",opts:["Primeiro validar emocionalmente (acolher o medo), depois contextualizar no plano de longo prazo, e so entao discutir possiveis ajustes — se necessario","Apresentar imediatamente dados historicos mostrando que o mercado sempre se recuperou historicamente","Transferir a carteira para renda fixa imediatamente para acalmar o cliente e depois readequar gradualmente","Lembrar o cliente das clausulas contratuais e da politica de investimentos assinada anteriormente"],ans:0,exp:"Sequencia correta: (1) Validacao emocional — 'Entendo que isso e preocupante'; (2) Contextualizacao — 'Veja como seu plano foi estruturado para momentos assim'; (3) Analise conjunta se necessario. Comecar com dados quando o cliente esta em panico aumenta a resistencia."},
  {id:31,tp:"Emocoes e decisao",c:"#f59e0b",text:"A 'fadiga de decisao' implica que o planejador deve estruturar suas reunioes para:",opts:["Abordar as decisoes mais importantes e dificeis no inicio da reuniao, quando a capacidade decisoria esta mais alta","Abordar os assuntos mais faceis primeiro para criar momentum positivo antes das decisoes dificeis","Distribuir igualmente todos os temas ao longo de toda a reuniao para manter o ritmo uniforme","Fazer reunioes o mais longas possivel para aproveitar ao maximo o tempo disponivel com o cliente"],ans:0,exp:"A fadiga de decisao (Baumeister) mostra que decidir bem e um recurso que se esgota ao longo do dia e da reuniao. As decisoes mais importantes devem ser tomadas com o cliente 'descansado' cognitivamente — portanto no inicio, nao ao final."},
  {id:32,tp:"Emocoes e decisao",c:"#f59e0b",text:"O 'vies de afeto' aplicado a decisoes de investimento pode levar o cliente a:",opts:["Perceber alto retorno E baixo risco em ativos de que gosta emocionalmente, violando a relacao fundamental risco-retorno","Ser mais disciplinado em ativos de que gosta, pois os monitora com mais atencao e cuidado","Diversificar mais ao investir em multiplos setores que admira e acompanha de perto","Ser mais conservador em setores de que gosta para 'nao perder o que tem' e proteger a posicao"],ans:0,exp:"A affect heuristic cria a ilusao de que ativos emocionalmente atraentes sao simultaneamente seguros e rentaveis — violando a relacao risco-retorno. Investidores sobrealocam em empresas que 'amam', concentrando risco sem perceber."},
  {id:33,tp:"Emocoes e decisao",c:"#f59e0b",text:"O ciclo emocional classico do investidor, na sequencia correta apos o pico de mercado, e:",opts:["Euforia → Complacencia → Ansiedade → Negacao → Panico → Depressao → Esperanca → Otimismo","Otimismo → Euforia → Panico → Recuperacao → Novo otimismo sem fases intermediarias","Medo → Cautela → Otimismo → Euforia → Panico → Recuperacao direta e rapida","Complacencia → Euforia → Ansiedade → Otimismo → Panico → Depressao → Recuperacao"],ans:0,exp:"O ciclo emocional do investidor segue: otimismo (antes do pico) → euforia (no pico) → complacencia → ansiedade → negacao → panico (no fundo) → depressao → esperanca → otimismo. O planejador deve identificar em qual fase o cliente se encontra para calibrar a comunicacao."},
  {id:34,tp:"Emocoes e decisao",c:"#f59e0b",text:"A teoria do arrependimento (regret theory) sugere que muitos investidores evitam agir porque:",opts:["Temem sentir arrependimento caso a decisao tomada resulte em desfecho negativo, levando a inacao ou escolhas excessivamente conservadoras","Desejam maximizar o retorno esperado e aguardam a oportunidade matematicamente ideal","Preferem delegar todas as decisoes ao planejador para evitar qualquer responsabilidade pessoal","Aguardam sempre o momento tecnicamente ideal de mercado para entrar ou sair de posicoes"],ans:0,exp:"A regret theory mostra que o medo do arrependimento futuro — 'e se eu fizer isso e der errado?' — leva muitos investidores a inacao ou escolhas excessivamente conservadoras. O planejador pode atenuar isso enquadrando a decisao de nao agir tambem como uma escolha sujeita a arrependimento."},

  // ── SCRIPTS FINANCEIROS ───────────────────────────────────────────────
  {id:35,tp:"Scripts financeiros",c:"#06b6d4",text:"O conceito de 'transmissao intergeracional de comportamentos financeiros' sugere que:",opts:["Padroes de comportamento financeiro — saudaveis e disfuncionais — tendem a ser transmitidos por observacao, modelagem e mensagens explicitas e implicitas da familia","Filhos de pais ricos sempre se tornam financeiramente bem-sucedidos por heranca e exemplo positivo","A educacao financeira formal quebra completamente os padroes herdados da familia de origem","Apenas traumas severos como falencia ou pobreza extrema sao transmitidos entre geracoes"],ans:0,exp:"A transmissao intergeracional ocorre por multiplos canais: observacao direta dos pais, mensagens explicitas e implicitas sobre dinheiro, experiencias familiares coletivas. O planejador que entende esse contexto pode trabalhar padroes que de outra forma pareceriam irracionais."},
  {id:36,tp:"Scripts financeiros",c:"#06b6d4",text:"Uma cliente bem-sucedida sistematicamente faz aportes e depois resgata para gastos desnecessarios, em ciclo repetitivo. O pai dizia: 'Dinheiro nao e para gente como a gente.' Esse padrao e mais consistente com:",opts:["Autossabotagem financeira enraizada em script de indignidade — crenca inconsciente de que nao merece acumular riqueza","Vies do presente combinado com falta de planejamento financeiro estruturado","Efeito disposicao aplicado a poupanca — 'realiza' a poupanca antes que ela cresza","Overconfidence — acredita que sempre conseguira recompor o que resgatou rapidamente"],ans:0,exp:"Autossabotagem financeira frequentemente tem raizes em scripts de indignidade. Frases ouvidas na infancia ('dinheiro nao e pra gente', 'rico e ladrao') podem criar padroes que persistem na vida adulta como sabotagem repetitiva de objetivos financeiros."},
  {id:37,tp:"Scripts financeiros",c:"#06b6d4",text:"Um jovem Millennial prioriza experiencias sobre acumulacao patrimonial e tem menor apego a propriedade imobiliaria. O planejador deve:",opts:["Respeitar os valores geracionais e construir um plano que alinhe experiencias com metas de longo prazo, adaptado ao estilo de vida do cliente","Convencer o cliente de que a abordagem Millennial e financeiramente irresponsavel e que deve adotar padroes das geracoes anteriores","Ignorar as preferencias geracionais e focar exclusivamente em dados tecnicos de acumulacao otima","Classificar o cliente como impulsivo e recomendar perfil conservador para protege-lo de si mesmo"],ans:0,exp:"Cada geracao tem relacao distinta com dinheiro e propriedade. O planejamento centrado no cliente exige respeitar e incorporar esses valores. Um plano que ignora os valores do cliente raramente e seguido, independentemente de sua qualidade tecnica."},
  {id:38,tp:"Scripts financeiros",c:"#06b6d4",text:"O 'dinheiro como tabu social' — dificuldade de falar abertamente sobre financas — impacta o planejamento de qual forma?",opts:["Negativamente — impede o planejamento sucessorio, dificulta decisoes financeiras em casal e retarda a busca por ajuda profissional","Positivamente — o sigilo protege o patrimonio de influencias externas negativas e inveja","Neutro — o comportamento financeiro e completamente independente da disposicao de falar sobre dinheiro","Positivamente em familias de alta renda e negativamente apenas nas familias de baixa renda"],ans:0,exp:"O tabu sobre dinheiro tem consequencias praticas serias: casais nao discutem metas e descobrem incompatibilidades em crises; pais nao conversam sobre heranca com filhos, gerando conflitos sucessorios; pessoas evitam buscar ajuda profissional por vergonha. O planejador deve criar um espaco seguro para o cliente falar sobre dinheiro."},
  {id:39,tp:"Scripts financeiros",c:"#06b6d4",text:"O script de 'adoracao do dinheiro' (money worship) inclui paradoxalmente:",opts:["A crenca de que mais dinheiro resolve todos os problemas E que dinheiro deve ser gasto para gerar prazer imediato — criando ciclos de perseguicao e consumo","A crenca de que dinheiro e importante E a crenca contraditoria de que dinheiro corromperia o carater pessoal","A crenca de que poupar e virtuoso mas que investir e arriscado e moralmente questionavel","A crenca de que o dinheiro e algo sujo mas absolutamente necessario para sobreviver no mundo moderno"],ans:0,exp:"O script de adoracao do dinheiro contem duas crencas aparentemente contraditorias: (1) mais dinheiro resolveria todos os problemas; (2) dinheiro existe para ser gasto e desfrutado. Essa tensao cria ciclos de perseguicao por mais dinheiro seguidos de gastos que dissipam o acumulado."},
  {id:40,tp:"Scripts financeiros",c:"#06b6d4",text:"O Money Script Inventory (MSI) de Klontz identifica quatro scripts. Qual descricao corresponde ao script de 'Status Financeiro'?",opts:["A crenca de que o valor pessoal e social do individuo esta diretamente atrelado ao seu patrimonio e ao nivel de consumo que consegue demonstrar","A crenca de que dinheiro e algo negativo, sujo ou moralmente problematico, levando a evitar pensar sobre financas","A crenca de que mais dinheiro automaticamente traria felicidade plena e resolucao de todos os problemas","A crenca de que financas devem ser mantidas em absoluto sigilo e nunca discutidas nem com a familia"],ans:0,exp:"O script de status financeiro associa o valor pessoal ao patrimonio e ao consumo visivel. Isso pode levar a gastos excessivos para 'manter as aparencias', endividamento para financiar um estilo de vida incompativel com a renda e dificuldade de reduzir o padrao de vida mesmo quando necessario."},

  // ── NUDGES ────────────────────────────────────────────────────────────
  {id:41,tp:"Nudges",c:"#f97316",text:"Qual das seguintes intervencoes NAO e um nudge segundo a definicao de Thaler e Sunstein?",opts:["Proibir o resgate de previdencia antes de 60 anos sob pena de tributacao severa e multas contratuais","Posicionar frutas na altura dos olhos em uma cantina enquanto itens menos saudaveis ficam menos acessiveis","Enviar lembretes automaticos de pagamento de fatura do cartao para evitar multas por atraso","Mostrar ao cliente quanto pagou de taxas no ultimo ano antes de ele assinar a renovacao do contrato"],ans:0,exp:"Nudges influenciam sem restringir. A tributacao severa por resgate antecipado nao e um nudge — e um desincentivo economico real que altera as opcoes disponiveis. As demais alternativas sao nudges classicos: mudanca de contexto, lembrete oportuno e informacao saliente."},
  {id:42,tp:"Nudges",c:"#f97316",text:"O conceito de 'default inteligente' no planejamento financeiro refere-se a:",opts:["Definir a opcao padrao como a escolha mais alinhada ao bem-estar de longo prazo do cliente, explorando o status quo bias a seu favor","Fundos de investimento com gestao passiva que seguem indices de referencia como padrao","Software de planejamento financeiro que usa inteligencia artificial para rebalancear carteiras automaticamente","A estrategia de manter os investimentos do cliente inalterados em periodos de alta volatilidade"],ans:0,exp:"O default e a opcao que prevalece quando o usuario nao age. Como a maioria aceita o default por inercia, definir o default correto e uma das ferramentas mais poderosas: adesao automatica a previdencia, rebalanceamento automatico, renovacao automatica de seguros."},
  {id:43,tp:"Nudges",c:"#f97316",text:"A estrategia de 'compromisso antecipado' (pre-commitment device) funciona porque:",opts:["Usa a tendencia de valorizar mais o presente para comprometer recursos futuros agora, quando a tentacao e menor — reduzindo o conflito com o 'eu futuro'","Cria obrigacao legal que impede o cliente de fazer escolhas erradas ou impulsivas no futuro","Aumenta a responsabilidade juridica do planejador em relacao as decisoes tomadas pelo cliente","Elimina completamente o vies do presente ao tornar as escolhas futuras totalmente irreversiveis"],ans:0,exp:"Dispositivos de pre-compromisso permitem que o 'eu presente' proteja o 'eu futuro' de impulsos previsiveis. Funcionam porque o momento do compromisso (quando a tentacao e baixa) e separado do momento da tentacao. Exemplos: debito automatico em investimentos, fundos com carencia."},
  {id:44,tp:"Nudges",c:"#f97316",text:"A estrategia 'Save More Tomorrow' (SMarT) de Thaler e Benartzi neutraliza simultaneamente:",opts:["Vies do presente (o aumento e adiado para o futuro) e aversao a perda (o aumento e sobre o reajuste salarial, portanto a renda liquida nunca diminui, apenas cresce menos)","Aversao ao risco e efeito manada em momentos de volatilidade do mercado de acoes","Ancoragem no preco historico e efeito de enquadramento na apresentacao de retornos","Overconfidence nos retornos esperados e vies de confirmacao sobre os produtos escolhidos"],ans:0,exp:"O SMarT e elegante por neutralizar dois vieses ao mesmo tempo: o vies do presente (sacrificio adiado) e a aversao a perda (o aumento ocorre sobre o reajuste salarial — a renda liquida nunca diminui). Resultou em aumento dramatico das taxas de poupanca nos estudos originais."},
  {id:45,tp:"Nudges",c:"#f97316",text:"A 'escassez de atencao' como principio de nudge sugere que:",opts:["Informacoes apresentadas de forma saliente e oportuna tem impacto comportamental muito maior do que as mesmas informacoes enterradas em relatorios longos e complexos","Clientes com menos recursos financeiros prestam menos atencao a seus investimentos e decisoes","Nudges so sao eficazes quando o cliente esta com atencao plena e focada durante toda a reuniao","A quantidade de informacao deve ser maximizada para que o cliente tome melhores decisoes financeiras"],ans:0,exp:"A escassez de atencao sustenta a saliencia como nudge: a mesma informacao tem impacto radicalmente diferente dependendo de como e quando e apresentada. Mostrar a taxa real paga antes de renovar um contrato, ou o saldo projetado na aposentadoria antes de um resgate, sao exemplos de nudges por saliencia oportuna."},
  {id:46,tp:"Nudges",c:"#f97316",text:"O conceito de 'arquitetura de escolhas' implica que o planejador financeiro, ao apresentar opcoes ao cliente:",opts:["Sempre atua como um arquiteto de escolhas, mesmo sem perceber — portanto deve faze-lo conscientemente a favor do bem-estar do cliente","Deve apresentar todas as opcoes disponiveis sem nenhuma ordem ou destaque para preservar a neutralidade","Pode manipular as escolhas do cliente desde que o resultado final seja financeiramente otimo","Deve transferir totalmente a responsabilidade de escolha para o cliente, sem nenhuma orientacao ou influencia"],ans:0,exp:"Thaler e Sunstein argumentam que qualquer apresentacao de opcoes e uma forma de arquitetura de escolhas — nao existe 'neutralidade'. Portanto, o planejador deve projetar essa arquitetura conscientemente para favorecer as escolhas que servem melhor ao cliente, nao deixar acontecer ao acaso."},

  // ── BEM-ESTAR FINANCEIRO ─────────────────────────────────────────────
  {id:47,tp:"Bem-estar financeiro",c:"#84cc16",text:"A pesquisa de Killingsworth, Kahneman e Mellers (2023) sobre renda e felicidade concluiu que:",opts:["Para a maioria, a felicidade continua crescendo com a renda alem de US$75.000, mas pessoas ja infelizes por outras razoes nao se tornam significativamente mais felizes com renda alta","A felicidade nao tem relacao alguma com renda acima de US$75.000 para nenhum grupo demografico","O efeito da renda sobre a felicidade e completamente explicado pelo status social relativo, nao pela renda absoluta","Felicidade e renda tem correlacao negativa acima de US$100.000 anuais em todas as demografias estudadas"],ans:0,exp:"A sintese de 2023 reconciliou estudos anteriores. A relacao renda-felicidade e positiva e continua para a maioria, mas com heterogeneidade importante: para pessoas infelizes por razoes alem das financeiras, mais dinheiro nao resolve. Isso reforca a abordagem holistica do planejamento financeiro."},
  {id:48,tp:"Bem-estar financeiro",c:"#84cc16",text:"No modelo do CFPB, qual e um fator CONTEXTUAL (nao comportamental) do bem-estar financeiro?",opts:["Acesso a produtos e servicos financeiros adequados e condicoes do mercado de trabalho","Autocontrole financeiro e capacidade de resistir a impulsos de consumo","Conhecimento e habilidades financeiras adquiridas pelo individuo ao longo da vida","Capacidade de planejamento e definicao de metas financeiras de longo prazo"],ans:0,exp:"O CFPB distingue fatores que o individuo controla (comportamentais: autocontrole, conhecimento, planejamento) dos contextuais (condicoes do mercado de trabalho, acesso a credito adequado, sistemas de protecao social). O planejador eficaz reconhece barreiras contextuais e adapta as recomendacoes."},
  {id:49,tp:"Bem-estar financeiro",c:"#84cc16",text:"Evidencias sobre divida e bem-estar psicologico mostram que:",opts:["A presenca de dividas problematicas esta associada a maiores indices de ansiedade, depressao e conflitos conjugais, independentemente do valor absoluto da divida","Apenas dividas de alto valor (acima de R$100 mil) afetam significativamente o bem-estar psicologico","Dividas de consumo sao psicologicamente neutras desde que as parcelas caibam no orcamento mensal","O impacto psicologico da divida e exclusivamente financeiro, sem consequencias mensuravelmente para saude mental"],ans:0,exp:"Pesquisas de saude publica mostram associacoes robustas entre endividamento problematico e deterioracao da saude mental. O estresse financeiro cronico afeta o sono, os relacionamentos e a capacidade de tomar boas decisoes — criando um ciclo vicioso que o planejador deve abordar holisticamente."},
  {id:50,tp:"Bem-estar financeiro",c:"#84cc16",text:"A 'prosperidade subjetiva' (subjective financial wellbeing) e importante para o planejamento porque:",opts:["A percepcao que o cliente tem de sua situacao financeira — independentemente dos dados objetivos — influencia seu comportamento, saude mental e disposicao de seguir o plano","Substitui completamente metricas objetivas como patrimonio e renda, sendo o unico indicador relevante","E facilmente mensuravel por questionarios padronizados, completamente objetivos e universalmente validos","Tem alta correlacao com o patrimonio liquido, sendo portanto redundante com metricas objetivas ja coletadas"],ans:0,exp:"A prosperidade subjetiva nao e redundante com dados objetivos: clientes com boa situacao tecnica podem sentir-se financeiramente inseguros, e vice-versa. Essa percepcao afeta diretamente comportamentos (propensao a investir, a buscar seguros) e bem-estar geral."},

  // ── RELACIONAMENTO ─────────────────────────────────────────────────────
  {id:51,tp:"Relacionamento",c:"#ec4899",text:"A tecnica de 'perguntas abertas' e valorizada no planejamento financeiro porque:",opts:["Estimula o cliente a elaborar, refletir e revelar informacoes, valores e emocoes que perguntas de 'sim/nao' nao alcancariam","Permite ao planejador controlar melhor o tempo e a direcao da reuniao de forma mais eficiente","Facilita o preenchimento de questionarios de suitability de forma mais objetiva e padronizada","E exigida pela regulacao da CVM para coleta de informacoes de perfil de investidor e API"],ans:0,exp:"Perguntas abertas ('O que o dinheiro significa para voce?', 'Como se sentiria se nao conseguisse se aposentar quando planejou?') revelam o que questionarios fechados escondem: valores, medos, sonhos, crencas sobre dinheiro. Sao a base da coleta qualitativa essencial para o planejamento centrado no cliente."},
  {id:52,tp:"Relacionamento",c:"#ec4899",text:"A tecnica de 'reflective listening' (escuta reflexiva) no atendimento ao cliente consiste em:",opts:["Repetir ou parafrasear o que o cliente disse para demonstrar compreensao e verificar se o entendimento esta correto, criando espaco para aprofundamento","Mostrar ao cliente graficos que refletem a performance historica de sua carteira e seu crescimento","Refletir sobre as decisoes do cliente depois da reuniao para preparar relatorios mais precisos e completos","Mostrar ao cliente como suas decisoes financeiras se refletem em seu orcamento mensal e anual"],ans:0,exp:"O reflective listening e central na entrevista motivacional. Ao parafrasear o que o cliente disse, o planejador demonstra escuta ativa, verifica o entendimento e abre espaco para o cliente aprofundar ou corrigir. Isso constroi confianca e revela informacoes mais profundas."},
  {id:53,tp:"Relacionamento",c:"#ec4899",text:"O 'efeito de atribuicao fundamental' no atendimento significa que o planejador pode incorrer no erro de:",opts:["Atribuir os problemas financeiros do cliente exclusivamente a falhas de carater, ignorando fatores contextuais como crises, doencas ou desemprego","Atribuir os problemas financeiros do cliente a fatores externos quando na verdade sao completamente comportamentais","Atribuir seus proprios sucessos profissionais a sorte em vez de a propria competencia e dedicacao","Atribuir ao cliente a responsabilidade por escolhas de investimento que foram recomendadas pelo proprio planejador"],ans:0,exp:"O fundamental attribution error leva a julgar o comportamento dos outros como reflexo de seu carater. Um planejador que ve o cliente endividado como 'irresponsavel' sem investigar o contexto comete esse erro. A abordagem empatica exige considerar fatores comportamentais E contextuais."},
  {id:54,tp:"Relacionamento",c:"#ec4899",text:"A 'alianca de trabalho' (working alliance) entre planejador e cliente prediz a adesao ao plano financeiro porque:",opts:["A qualidade do vinculo colaborativo — acordo sobre objetivos, sobre metodos e qualidade do relacionamento — e um dos maiores preditores de resultado, independentemente da tecnica usada","O contrato formal assinado entre planejador e cliente cria obrigacao legal que garante a adesao ao plano","A parceria entre o planejador e a instituicao financeira garante os melhores produtos para o cliente","O alinhamento tecnico entre o plano financeiro e as expectativas regulatorias da CVM garante o resultado"],ans:0,exp:"Adaptado da psicologia clinica, o conceito de alianca de trabalho mostra que a qualidade do relacionamento planejador-cliente prediz a adesao ao plano, a abertura para discutir problemas e a disposicao para implementar mudancas dificeis. Um plano tecnicamente perfeito mal implementado e inferior a um bom plano bem implementado."},
  {id:55,tp:"Relacionamento",c:"#ec4899",text:"Quando um casal apresenta visoes opostas sobre objetivos financeiros, o planejador deve:",opts:["Mediar o dialogo, identificar os valores e objetivos de cada um e buscar um plano consensual que respeite ambos os conjuges","Adotar a posicao do conjuge com maior renda, pois e quem tem mais capacidade de influenciar o plano","Elaborar planos financeiros completamente separados para cada conjuge, sem integracao entre eles","Priorizar exclusivamente os objetivos de investimento e ignorar os aspectos relacionais do casal"],ans:0,exp:"Conflitos sobre dinheiro em casal sao comuns e frequentemente refletem diferencas em valores e scripts financeiros. O planejador deve atuar como mediador, facilitando o dialogo e a construcao de um plano que respeite ambos os conjuges."},

  // ── ETICA E VIESES DO PLANEJADOR ────────────────────────────────────────
  {id:56,tp:"Etica",c:"#ef4444",text:"O 'conflito de interesses cognitivo' no planejamento financeiro ocorre quando:",opts:["O planejador, sem perceber, favorece recomendacoes que inconscientemente servem a seus proprios interesses, mesmo sem intencao consciente de prejudicar o cliente","O planejador tem conflito de interesse financeiro obvio, como comissao por venda de produtos especificos","O planejador atende clientes com objetivos financeiros conflitantes entre si simultaneamente","O planejador discorda eticamente dos objetivos do cliente e nao consegue representa-lo adequadamente"],ans:0,exp:"O conflito cognitivo e mais sutil que o financeiro explicito porque e involuntario. O planejador pode acreditar genuinamente que age no melhor interesse do cliente enquanto vieses inconscientes distorcem suas recomendacoes. Reconhecer essa possibilidade e parte da competencia etica."},
  {id:57,tp:"Etica",c:"#ef4444",text:"O conceito de 'fiduciario comportamental' vai alem do fiduciario regulatorio porque:",opts:["O fiduciario comportamental reconhece que agir no melhor interesse do cliente exige tambem mitigar ativamente os vieses que levam o cliente a agir contra seus proprios objetivos de longo prazo","Exige que o planejador gerencie os recursos do cliente diretamente, sem nenhuma intermediacao financeira","E apenas um conceito academico sem nenhuma aplicacao pratica no planejamento financeiro real","E uma certificacao adicional que pode ser obtida apos a obtencao da certificacao CFP"],ans:0,exp:"O fiduciario regulatorio estabelece obrigacao de agir no melhor interesse financeiro. O fiduciario comportamental vai alem: quando o cliente, sob influencia de vieses e emocoes, pede acoes que prejudicam seus objetivos (como vender tudo no panico), o planejador tem o dever de ser honesto sobre esses riscos."},
  {id:58,tp:"Etica",c:"#ef4444",text:"A pratica de 'supervisao reflexiva' para planejadores financeiros consiste em:",opts:["Um processo regular de reflexao sobre o proprio atendimento — identificando padroes, vieses pessoais e reacoes emocionais a clientes — para melhorar continuamente a qualidade do servico","Revisar tecnicamente os portfolios dos clientes a cada trimestre para garantir aderencia ao plano","Submeter as recomendacoes financeiras a revisao de um supervisor antes de apresenta-las ao cliente","Gravar as reunioes com clientes para analise posterior de conformidade regulatoria obrigatoria"],ans:0,exp:"A supervisao reflexiva e adaptada da psicologia clinica. Para planejadores envolve refletir: 'Como me sinto em relacao a este cliente? Estou evitando algum assunto dificil? Meus vieses estao influenciando minhas recomendacoes?' Essa pratica aumenta a autoconsciencia e a qualidade do atendimento."},
  {id:59,tp:"Etica",c:"#ef4444",text:"A 'suitability comportamental' vai alem da suitability regulatoria porque:",opts:["Considera nao apenas a tolerancia ao risco declarada, mas tambem o comportamento emocional real do cliente diante de perdas e volatilidade de mercado","Exige a aplicacao de questionarios muito mais longos e detalhados antes de qualquer recomendacao","Substitui completamente a analise tecnica por avaliacao psicologica exclusiva do perfil emocional","E exigida apenas para clientes com patrimonio acima de R$1 milhao pelos reguladores brasileiros"],ans:0,exp:"A suitability regulatoria captura a tolerancia ao risco em condicoes neutras, mas o comportamento real em momentos de crise frequentemente difere do perfil declarado. A suitability comportamental busca antecipar como o cliente se comportara emocionalmente sob estresse de mercado."},
  {id:60,tp:"Etica",c:"#ef4444",text:"Sobre os limites eticos do uso de nudges no aconselhamento financeiro, e correto afirmar que:",opts:["O uso de nudges pode ser antietico quando manipula o cliente em beneficio do planejador ou da instituicao, em vez do interesse do proprio cliente","Nudges sao sempre eticos, pois por definicao preservam a liberdade de escolha do cliente","Nudges so sao eticos quando aprovados previamente pelos orgaos reguladores como a CVM","O planejador nunca deve usar nudges, pois qualquer influencia interfere inaceitavelmente na autonomia"],ans:0,exp:"Nudges preservam a liberdade de escolha, mas isso nao os torna automaticamente eticos. Quando usados para direcionar o cliente a produtos que beneficiam o planejador, tornam-se manipulacao. O padrao etico exige que o nudge esteja alinhado ao bem-estar do cliente e seja transparente."},

  // ── MOTIVACAO E MUDANCA ──────────────────────────────────────────────
  {id:61,tp:"Motivacao e mudanca",c:"#a78bfa",text:"Os quatro principios da entrevista motivacional (Parceria, Aceitacao, Compaixao, Evocacao) implicam que o planejador deve:",opts:["Trabalhar em parceria, aceitando a autonomia do cliente, demonstrando compaixao genuina e evocando a motivacao interna do cliente — em vez de impor solucoes externas","Estabelecer metas financeiras especificas para o cliente antes da primeira reuniao de diagnostico","Usar dados e argumentos racionais para convencer o cliente da melhor escolha financeira tecnicamente","Aceitar incondicionalmente todas as decisoes financeiras do cliente, mesmo as claramente prejudiciais ao seu bem-estar"],ans:0,exp:"Os quatro principios da IM garantem que a mudanca comportamental parta do cliente. Parceria: colaborador, nao especialista autoritario. Aceitacao: respeito pela autonomia. Compaixao: priorizar o bem-estar do cliente. Evocacao: evocar motivacao ja presente — nao criar artificialmente. Especialmente eficaz com clientes ambivalentes."},
  {id:62,tp:"Motivacao e mudanca",c:"#a78bfa",text:"Para um cliente em estagio de 'contemplacao' (reconhece o problema mas ainda nao agiu), a intervencao mais eficaz e:",opts:["Explorar a ambivalencia ('quero mudar, mas...'), fortalecer os pros da mudanca e abordar as barreiras percebidas — sem pressionar para acao imediata","Apresentar um plano financeiro detalhado com metas e prazos especificos para implementacao imediata","Ignorar a ambivalencia e focar diretamente nos aspectos tecnicos do planejamento financeiro","Encaminhar o cliente para terapia psicologica antes de iniciar qualquer planejamento financeiro"],ans:0,exp:"O modelo transteorico identifica: Pre-contemplacao, Contemplacao, Preparacao, Acao, Manutencao. Na contemplacao, pressionar para acao prematura aumenta a resistencia. Explorar a ambivalencia com empatia e o caminho mais eficaz — nao o plano tecnico imediato."},
  {id:63,tp:"Motivacao e mudanca",c:"#a78bfa",text:"Em situacoes de viuvez recente, o planejador deve EVITAR:",opts:["Pressionar o cliente a reorganizar imediatamente toda a carteira e o planejamento sucessorio enquanto esta emocionalmente abalado e vulneravel","Dar tempo ao cliente para processar o luto antes de tomar decisoes financeiras irreversiveis e complexas","Identificar as urgencias financeiras imediatas separando-as claramente das decisoes de longo prazo","Oferecer suporte empatico e, se necessario, envolver outros familiares ou profissionais de saude mental"],ans:0,exp:"Decisoes financeiras tomadas nos primeiros meses apos viuvez sao frequentemente arrependidas. O planejador etico deve: priorizar o bem-estar emocional, cuidar apenas das urgencias imediatas, criar um periodo de estabilizacao antes de grandes decisoes e coordenar com outros profissionais quando necessario."},
  {id:64,tp:"Motivacao e mudanca",c:"#a78bfa",text:"O comprometimento publico (public commitment) aumenta a probabilidade de o cliente seguir o plano financeiro porque:",opts:["Ativa o desejo de consistencia entre o que se diz e o que se faz, reduzindo a dissonancia cognitiva entre o compromisso assumido e qualquer comportamento desviante posterior","Cria obrigacao legal entre cliente e planejador que garante o cumprimento das metas estabelecidas","Aumenta o retorno esperado da carteira por meio da pressao social do grupo de referencia do cliente","Elimina completamente o vies do presente ao tornar o futuro imediato e de alta relevancia emocional"],ans:0,exp:"Pesquisas de Cialdini mostram que as pessoas tem forte impulso de agir de forma consistente com compromissos que fizeram publicamente. Quando o cliente verbaliza suas metas para o planejador (ou para familiares), a dissonancia entre o compromisso assumido e o comportamento desviante funciona como freio natural."},
  {id:65,tp:"Motivacao e mudanca",c:"#a78bfa",text:"Em qual situacao o planejador financeiro estaria EXTRAPOLANDO sua funcao, exigindo encaminhamento a profissional de saude mental?",opts:["Identificar que o cliente usa gastos compulsivos como principal mecanismo de enfrentamento de ansiedade severa, sintoma de transtorno de ansiedade generalizada nao tratado","Explorar as crencas e scripts financeiros do cliente herdados da familia de origem","Validar as emocoes do cliente durante uma crise de mercado e oferecer suporte empatico","Usar tecnicas de escuta ativa e entrevista motivacional para ajudar o cliente a identificar metas"],ans:0,exp:"O planejador esta equipado para trabalhar crencas sobre dinheiro, emocoes relacionadas a financas e motivacao para mudanca. Mas quando os sintomas apontam para um transtorno mental nao tratado (ansiedade generalizada, depressao, TOC, jogo patologico), o encaminhamento a profissional de saude mental e necessario e etico."},

  // ── APLICACAO INTEGRADA ──────────────────────────────────────────────
  {id:66,tp:"Aplicacao integrada",c:"#fb7185",text:"Uma cliente de 58 anos, esgotada profissionalmente, quer se aposentar ja mas teme ficar sem dinheiro. O planejador identifica que ela tem recursos suficientes, mas com margem menor do que o ideal. Qual abordagem integra melhor os aspectos tecnicos e psicologicos?",opts:["Validar o esgotamento e o medo, apresentar diferentes cenarios com trade-offs claros e co-construir a decisao alinhada aos valores e tolerancia ao risco real da cliente","Dizer imediatamente que ela pode se aposentar, pois os recursos sao suficientes, e apresentar o plano tecnico detalhado","Dizer que nao pode se aposentar ainda e propor que trabalhe mais 3 anos para atingir a margem de seguranca ideal","Encaminhar a cliente para terapia psicologica antes de retomar o planejamento financeiro formal"],ans:0,exp:"O caso integra: burnout (emocional), recursos suficientes mas com margem menor (tecnico), medo de outliving assets (psicologico), qualidade de vida vs. seguranca (valores). A abordagem ideal valida emocionalmente, apresenta cenarios concretos com trade-offs e envolve a cliente na decisao."},
  {id:67,tp:"Aplicacao integrada",c:"#fb7185",text:"Um jovem de 28 anos quer 'investir melhor', mas tem R$40 mil em dividas de cartao de credito a 18% ao mes. O principal desafio do planejador e:",opts:["Identificar o vies cognitivo que faz o cliente nao perceber que pagar divida a 18% ao mes e matematicamente superior a qualquer investimento, e ajuda-lo a reorganizar as prioridades sem julgamento moral","Calcular a melhor carteira de renda variavel para maximizar o retorno dos aportes mensais disponiveis","Recusar o atendimento ate que o cliente quite todas as dividas e tenha situacao financeira minimamente organizada","Focar exclusivamente no planejamento do financiamento do carro novo, pois e a decisao mais urgente"],ans:0,exp:"O cliente apresenta contabilidade mental (trata 'investimentos' e 'dividas' como categorias separadas) e possivelmente vies do presente. O planejador deve apresentar a matematica sem julgamento moral: 'Quitar essa divida e equivalente a um investimento com retorno garantido de 18% ao mes — nenhum fundo oferece isso.'"},
  {id:68,tp:"Aplicacao integrada",c:"#fb7185",text:"Um cliente recem-divorciado busca reorganizar as financas. Alem das questoes tecnicas, qual dimensao psicologica o planejador deve considerar prioritariamente?",opts:["Reconhecer que o cliente pode estar em luto e que o processo emocional de aceitacao afeta sua capacidade de tomar boas decisoes financeiras neste momento delicado","Pressionar pela resolucao rapida dos aspectos tecnicos para minimizar perdas financeiras durante o processo de divorcio","Recomendar imediatamente um portfolio mais conservador, pois clientes divorciados tem menor tolerancia ao risco","Evitar tocar em assuntos emocionais para manter o profissionalismo e a objetividade da relacao"],ans:0,exp:"Transicoes de vida (divorcio, viuvez, aposentadoria, demissao) sao periodos de alta vulnerabilidade emocional que comprometem a capacidade decisoria. O planejador deve reconhecer o estado emocional do cliente, priorizar acoes urgentes e respeitar o tempo de processamento emocional."},
  {id:69,tp:"Aplicacao integrada",c:"#fb7185",text:"Qual sequencia correta o planejador deve seguir ao identificar um cliente com script de 'status financeiro' que esta se endividando para manter aparencias?",opts:["Explorar empaticamente a origem do script (historia familiar com dinheiro e status), depois mostrar as consequencias objetivas do padrao atual, e entao co-construir alternativas que preservem a identidade do cliente sem o endividamento","Confrontar diretamente o cliente sobre o comportamento irresponsavel para gerar consciencia imediata do problema","Apresentar imediatamente um plano de corte de gastos detalhado para equilibrar o orcamento rapidamente","Encaminhar para terapia psicologica pois o problema e exclusivamente emocional e fora do escopo do planejamento"],ans:0,exp:"Scripts financeiros nao se mudam por confrontacao direta — isso tende a aumentar a resistencia. A abordagem empatica (explorar a origem), informativa (mostrar consequencias objetivas) e colaborativa (co-construir alternativas) e muito mais eficaz e etica."},
  {id:70,tp:"Aplicacao integrada",c:"#fb7185",text:"Um investidor experiente demonstra simultaneamente: vender vencedores rapidamente, manter perdedores por anos, atribuir ganhos a habilidade propria e perdas ao mercado, e buscar apenas noticias positivas sobre suas posicoes. Quantos vieses distintos estao presentes?",opts:["Quatro vieses distintos: efeito disposicao, self-attribution bias, vies de confirmacao e possivelmente overconfidence como base de todos","Apenas um — o overconfidence explica todos esses comportamentos de forma unificada e suficiente","Dois — aversao a perda e vies de confirmacao, sendo os demais apenas manifestacoes desses dois","Tres — efeito disposicao, vies de confirmacao e efeito manada sao os determinantes principais"],ans:0,exp:"O cenario apresenta: (1) Efeito disposicao — vende vencedores cedo e mantem perdedores; (2) Self-attribution bias — atribui ganhos a habilidade e perdas ao mercado; (3) Vies de confirmacao — busca apenas noticias positivas; (4) Overconfidence — base que sustenta os outros tres. O planejador deve abordar cada vies especificamente."},

  // ── 30 NOVAS QUESTÕES ─────────────────────────────────────────────────
  {id:71,tp:"Fundamentos",c:"#3b82f6",text:"O modelo do 'homo economicus' e criticado pelas financas comportamentais porque:",opts:["Presupoe racionalidade plena, preferencias estaveis e maximizacao da utilidade — premissas que experimentos empiricos sistematicamente refutam","Ignora completamente o papel dos mercados financeiros nas decisoes individuais de investimento","Superestima o impacto das emocoes nas decisoes financeiras de longo prazo dos individuos","Assume que todos os individuos tem acesso igual a informacao e tecnologia no mercado financeiro"],ans:0,exp:"O homo economicus e um agente hipoteticamente racional, mas Kahneman e Tversky demonstraram experimentalmente que decisoes reais violam sistematicamente os axiomas da teoria da utilidade esperada. Essa evidencia empirica e o fundamento das financas comportamentais como campo cientifico."},
  {id:72,tp:"Vieses cognitivos",c:"#10b981",text:"O 'vies de ancoragem' no planejamento financeiro ocorre quando o cliente:",opts:["Supervaloriza a primeira informacao recebida — como o preco de compra original de um ativo — ao tomar decisoes subsequentes sobre esse ativo","Busca exclusivamente informacoes que confirmem sua visao inicial sobre determinado produto financeiro","Segue o comportamento de outros investidores sem realizar analise independente dos fundamentos","Prefere manter a carteira atual sem mudancas por medo de errar em qualquer novo investimento"],ans:0,exp:"A ancoragem faz o investidor usar o preco de compra (ou qualquer outra ancora) como referencia inapropriada para decisoes futuras. O planejador deve ajudar o cliente a avaliar o ativo pelo seu valor atual e perspectivas, nao pelo preco historico de aquisicao."},
  {id:73,tp:"Vieses cognitivos",c:"#10b981",text:"O 'vies de disponibilidade' leva o investidor a:",opts:["Superestimar a probabilidade de eventos que sao facilmente recordados por serem recentes, intensos ou amplamente noticiados","Subestimar eventos raros por nao terem exemplos imediatamente disponiveis na memoria recente","Ignorar completamente eventos que ocorreram ha mais de um ano por nao os considerar relevantes","Preferir ativos com historico de retorno de pelo menos dez anos documentados e acessiveis"],ans:0,exp:"O vies de disponibilidade faz com que eventos facilmente recordaveis — como uma queda recente de mercado amplamente noticiada — sejam superestimados em termos de probabilidade. O cerebro usa a facilidade de lembrar como proxy equivocado de frequencia real."},
  {id:74,tp:"Vieses cognitivos",c:"#10b981",text:"O 'vies de status quo' no planejamento financeiro manifesta-se quando o cliente:",opts:["Resiste a mudancas na carteira mesmo quando ha evidencia clara de que a mudanca seria benifica ao seu perfil e objetivos","Prefere sempre manter o maior nivel de risco possivel para maximizar os retornos de longo prazo","Busca constantemente novas oportunidades de investimento sem analisar o portfolio existente","Questiona cada recomendacao do planejador antes de implementar qualquer alteracao na estrategia"],ans:0,exp:"O vies do status quo e a resistencia a mudancas por medo do desconhecido ou por inercia. O custo emocional de agir parece maior do que o custo de manter a situacao atual, mesmo que a inacao seja objetivamente prejudicial aos objetivos do cliente."},
  {id:75,tp:"Vieses cognitivos",c:"#10b981",text:"O fenomeno do 'excesso de negociacao' (overtrading), frequentemente observado em investidores com overconfidence, resulta em:",opts:["Maiores custos de transacao e piores retornos liquidos, pois a negociacao frequente gera friccao sem adicionar alfa suficiente para compensar","Melhores retornos por aproveitamento de mais oportunidades de curto prazo identificadas pelo investidor","Carteiras mais diversificadas por expor o investidor a um maior numero de ativos diferentes","Reducao do risco total da carteira por meio de rebalanceamentos mais frequentes e precisos"],ans:0,exp:"Pesquisas de Barber e Odean (2000) demonstraram que investidores que negociam mais frequentemente obtem retornos significativamente piores — os homens, que negociam mais que as mulheres, exibem esse padrao de forma ainda mais marcante. O excesso de confianca gera atividade excessiva que erode os retornos."},
  {id:76,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"A 'ponderacao de probabilidades' na Teoria da Perspectiva mostra que as pessoas:",opts:["Superestimam probabilidades muito baixas (como ganhar na loteria ou sofrer um acidente raro) e subestimam probabilidades moderadas e altas","Avaliam todas as probabilidades de forma linear e proporcional ao seu valor matematico real","Ignoram completamente eventos com probabilidade abaixo de 5% por considera-los improvisivelmente raros","Tomam decisoes exclusivamente com base nas probabilidades objetivas sem distorcao perceptual"],ans:0,exp:"A funcao de ponderacao de probabilidades da Teoria da Perspectiva e nao-linear: superestimamos eventos raros (o que explica a popularidade de loterias e seguros de baixa probabilidade) e subestimamos eventos de probabilidade media-alta. Isso tem implicacoes diretas para decisoes de seguro e gestao de riscos."},
  {id:77,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"O conceito de 'hedonic adaptation' (adaptacao hedonica) e relevante para o planejamento financeiro porque:",opts:["Mostra que o bem-estar proporcionado por conquistas financeiras (compra de imovel, aumento de salario) tende a ser temporario, pois as pessoas se adaptam ao novo nivel e retornam ao nivel de felicidade basal","Demonstra que ganhos financeiros sempre geram bem-estar permanente e duradouro ao longo do tempo","Indica que o investidor nao sente mais nenhuma emocao apos viver experiencias financeiras intensas","Sugere que clientes mais ricos sao automaticamente mais felizes por terem superado a adaptacao"],ans:0,exp:"A adaptacao hedonica (Brickman e Campbell) explica por que a 'corrida dos ratos' financeira nao gera felicidade duradoura. Conquistas financeiras geram prazer, mas o individuo se adapta ao novo nivel. O planejador deve ajudar o cliente a definir objetivos alem de numeros — conectados a experiencias e relacionamentos que tem hedonic durability maior."},
  {id:78,tp:"Emocoes e decisao",c:"#f59e0b",text:"O 'vies de arrependimento antecipado' (anticipated regret) difere da aversao a perda porque:",opts:["Envolve uma comparacao contrafactual — 'o que poderia ter sido se eu tivesse agido diferente' — enquanto a aversao a perda foca na dor da perda absoluta em si","A aversao a perda e mais intensa do que o arrependimento antecipado em todos os contextos estudados","O arrependimento antecipado afeta apenas decisoes de compra de seguros, nao de investimento","Sao sinonimos na literatura de financas comportamentais sem distincao pratica relevante"],ans:0,exp:"O arrependimento antecipado e fundamentalmente comparativo e contrafactual: o investidor sofre pela diferenca entre o que ocorreu e o que poderia ter ocorrido. A aversao a perda foca na magnitude absoluta da perda. Ambos coexistem e se reforcam mutuamente nas decisoes financeiras reais."},
  {id:79,tp:"Emocoes e decisao",c:"#f59e0b",text:"Pesquisas mostram que o estado de humor momentaneo do investidor pode afetar sua tolerancia ao risco. Em momentos de bom humor, a tendencia e:",opts:["Aumentar a disposicao para assumir riscos e subestimar probabilidades de eventos negativos no futuro proximo","Aumentar a aversao ao risco e buscar protecao e seguranca para a carteira existente","Manter a tolerancia ao risco exatamente no nivel do perfil declarado no questionario de suitability","Reduzir a atividade de negociacao por maior satisfacao com o status quo da carteira atual"],ans:0,exp:"Estados de animo positivos tendem a aumentar o otimismo e a disposicao para assumir riscos, enquanto estados negativos aumentam a cautela. Isso reforca a importancia do planejador nao basear decisoes importantes apenas em reunioes pontuais — o humor do dia pode distorcer o perfil real do cliente."},
  {id:80,tp:"Emocoes e decisao",c:"#f59e0b",text:"O conceito de 'ansiedade financeira' no contexto do planejamento comportamental se refere a:",opts:["Estado emocional cronico de preocupacao com financas que pode comprometer a qualidade de vida, o sono e os relacionamentos, mesmo em clientes tecnicamente bem estruturados","Reacao normal e temporaria a eventos financeiros negativos como demissao ou queda de mercado","Transtorno clinico exclusivo que deve ser tratado apenas por psicologos e psiquiatras especializados","Preocupacao excessiva apenas com dividas de alto valor, tipicamente acima de R$100 mil"],ans:0,exp:"A ansiedade financeira pode afetar clientes independentemente da situacao objetiva. Clientes com script de vigilancia financeira frequentemente experimentam ansiedade cronica mesmo com patrimonio solido. O planejador que identifica esse padrao deve aborda-lo com empatia antes de qualquer intervencao tecnica."},
  {id:81,tp:"Scripts financeiros",c:"#06b6d4",text:"Um planejador descobre que seu cliente nunca fala sobre suas financas, guarda extratos sem abrir e evita qualquer conversa sobre investimentos com a familia. Segundo o MSI de Klontz, o script mais provavel e:",opts:["Vigilancia financeira — crenca de que financas devem ser mantidas em absoluto sigilo e nunca discutidas","Adoracao do dinheiro — acredita que dinheiro deve ser acumulado silenciosamente sem ostentacao","Evitacao financeira — sente ansiedade e vergonha ao lidar com qualquer assunto financeiro","Status financeiro — prefere nao revelar sua situacao financeira para nao ser julgado pelos outros"],ans:0,exp:"A vigilancia financeira e caracterizada pelo sigilo excessivo sobre financas e pela crenca de que dinheiro nao deve ser discutido abertamente. Embora inclua comportamentos prudentes como poupar, o sigilo extremo pode dificultar o planejamento familiar e a busca por ajuda profissional qualificada."},
  {id:82,tp:"Scripts financeiros",c:"#06b6d4",text:"O conceito de 'trauma financeiro' refere-se a:",opts:["Experiencias de perda financeira severa — falencia, pobreza extrema, roubos significativos — que deixam marcas psicologicas duradouras e moldam comportamentos de hipercautela ou evitacao","Qualquer experiencia negativa com dinheiro ao longo da vida adulta, independentemente de sua intensidade","Exclusivamente a experiencia de falencia formal de uma empresa ou pessoa fisica declarada em juizo","O impacto psicologico de grandes perdas no mercado financeiro acima de 50% do patrimonio total"],ans:0,exp:"Traumas financeiros sao experiencias que excedem a capacidade de adaptacao e deixam marcas psicologicas persistentes. Um cliente que cresceu em pobreza extrema, viveu uma falencia familiar ou foi vitima de fraude pode desenvolver padroes de hipercautela, evitacao ou autossabotagem que persistem mesmo quando a situacao financeira melhora significativamente."},
  {id:83,tp:"Scripts financeiros",c:"#06b6d4",text:"A educacao financeira tradicional, focada apenas em conteudo tecnico, frequentemente falha porque:",opts:["Ignora os scripts financeiros, crencas e padroes comportamentais que determinam se o individuo realmente aplica o conhecimento adquirido no dia a dia","E muito complexa e tecnica para a maioria das pessoas absorver sem formacao previa em matematica","Nao considera as diferencas entre produtos financeiros disponiveis nos diferentes momentos da vida","E baseada em modelos internacionais que nao refletem a realidade do mercado financeiro brasileiro"],ans:0,exp:"O 'knowledge-intention-behavior gap' mostra que saber o que e certo financeiramente nao e suficiente para agir de forma correta. Scripts, emocoes e vieses determinam o comportamento real. O planejamento comportamental integra conteudo tecnico COM trabalho nas crencas e padroes que bloqueiam a aplicacao do conhecimento."},
  {id:84,tp:"Scripts financeiros",c:"#06b6d4",text:"Um cliente de 40 anos tem excelente renda, mas nunca consegue acumular patrimonio — sempre encontra uma 'emergencia' para gastar tudo. Ao explorar sua historia, o planejador descobre que seu pai dizia: 'Rico e ladrao'. O diagnostico mais provavel e:",opts:["Script de evitacao financeira combinado com autossabotagem — crenca inconsciente de que acumular riqueza seria moralmente errado ou perigoso","Vies do presente particularmente intenso combinado com falta de disciplina financeira","Overconfidence — acredita que sempre conseguira gerar renda suficiente para compensar os gastos","Efeito dotacao invertido — nao sente apego por dinheiro e o libera facilmente para qualquer fim"],ans:0,exp:"O script de evitacao financeira que associa riqueza a desonestidade ('rico e ladrao') pode criar um boicote inconsciente ao proprio sucesso financeiro. O individuo inconscientemente encontra formas de gastar o que acumula para nao se tornar 'um ladrao' — mesmo sem perceber essa conexao."},
  {id:85,tp:"Nudges",c:"#f97316",text:"O 'efeito de enquadramento' (framing effect) tem aplicacao direta na comunicacao do planejador porque:",opts:["A mesma informacao financeira, apresentada de formas diferentes, pode levar o cliente a decisoes opostas — portanto a forma de comunicar e tao importante quanto o conteudo","A apresentacao grafica dos dados sempre gera melhor compreensao do que dados numericos puros","Clientes preferem informacoes positivas e o planejador deve sempre enquadrar dados de forma otimista","O enquadramento afeta apenas clientes leigos, nao profissionais do mercado financeiro experientes"],ans:0,exp:"O framing effect mostra que 'taxa de sobrevivencia de 90%' e '10% de mortalidade' sao matematicamente identicos mas percebidos de forma muito diferente. O planejador que apresenta retornos como 'ganho de 8% ao ano' versus 'ganho de 8% acima da inflacao de 9%' obtera reacoes distintas do mesmo cliente."},
  {id:86,tp:"Nudges",c:"#f97316",text:"A tecnica de 'implementation intention' (intencao de implementacao) aumenta a adesao a planos financeiros porque:",opts:["Transforma metas abstratas em planos concretos de 'quando X acontecer, farei Y' — ligando a intencao a pistas contextuais especificas que ativam o comportamento desejado","Cria contratos legais entre cliente e planejador que obrigam o cumprimento das metas estabelecidas","Aumenta a complexidade do plano para que o cliente se sinta mais comprometido com o processo","Utiliza recompensas financeiras imediatas para cada meta alterna que o cliente consegue cumprir"],ans:0,exp:"Pesquisas de Gollwitzer mostram que 'vou poupar R$500 no dia 5 de cada mes, assim que receber o salario' e muito mais eficaz do que 'vou poupar mais'. A intencao de implementacao cria um plano especifico com pista contextual (receber o salario) que ativa automaticamente o comportamento desejado."},
  {id:87,tp:"Bem-estar financeiro",c:"#84cc16",text:"O 'estresse financeiro cronico' difere do estresse financeiro agudo porque:",opts:["E persistente, desgasta os recursos cognitivos e emocionais ao longo do tempo e compromete a capacidade de tomar boas decisoes — diferente do estresse pontual gerado por um evento especifico","E sempre mais intenso do que o estresse agudo e requer tratamento medico especializado imediato","Afeta apenas individuos com dividas e nao afeta pessoas com patrimonio positivo e boa renda","E reversivel apenas com melhora objetiva da situacao financeira, sem qualquer intervencao psicologica"],ans:0,exp:"O estresse financeiro cronico, ao contrario do agudo, e um estado persistente que esgota o 'bandwidth' cognitivo (Mullainathan e Shafir). Pessoas em situacao de escassez financeira cronica tomam piores decisoes nao por falta de inteligencia, mas porque o estresse consome os recursos mentais disponiveis para raciocinar bem."},
  {id:88,tp:"Bem-estar financeiro",c:"#84cc16",text:"A pesquisa sobre 'bandwidth cognitivo' (Mullainathan e Shafir, 2013) tem implicacao direta para o planejamento porque:",opts:["A escassez financeira consome recursos cognitivos e emocionais que prejudicam a tomada de decisao em todas as areas da vida — incluindo as proprias decisoes financeiras","Clientes com maior renda tem automaticamente maior capacidade cognitiva disponivel para decisoes complexas","O numero de decisoes financeiras disponivel deve ser maximizado para exercitar o cerebro do cliente","Apenas clientes em situacao de extrema pobreza experimentam reducao do bandwidth cognitivo"],ans:0,exp:"Mullainathan e Shafir demonstraram que a preocupacao com escassez — financeira, de tempo ou de qualquer recurso — monopoliza recursos cognitivos que seriam usados para outras funcoes. Isso explica decisoes aparentemente irracionais de pessoas em dificuldades financeiras: nao e falta de carater, e falta de bandwidth."},
  {id:89,tp:"Relacionamento",c:"#ec4899",text:"A 'empatia cognitiva' diferencia-se da 'empatia afetiva' no contexto do atendimento financeiro porque:",opts:["A empatia cognitiva e a capacidade de compreender intelectualmente a perspectiva e o estado emocional do cliente sem necessariamente compartilhar a emocao, o que permite manter a objetividade do planejador","A empatia afetiva e necessariamente superior e mais eficaz para o planejamento financeiro em todos os casos","A empatia cognitiva nao e uma habilidade que pode ser desenvolvida — ou se tem ou nao se tem naturalmente","Sao sinonimos no contexto do planejamento financeiro, sem diferenca pratica relevante"],ans:0,exp:"A empatia cognitiva (entender a perspectiva do outro) permite ao planejador manter a objetividade necessaria enquanto se conecta com o cliente. A empatia afetiva (sentir o que o outro sente) pode levar o planejador a ser excessivamente influenciado pelas emocoes do momento, comprometendo recomendacoes tecnicas necessarias."},
  {id:90,tp:"Relacionamento",c:"#ec4899",text:"O 'efeito de primazia e recencia' na comunicacao financeira sugere que o planejador deve:",opts:["Posicionar as informacoes mais importantes no inicio E no final da reuniao — pois essas posicoes sao lembradas com maior facilidade do que o meio da conversa","Apresentar as informacoes mais tecnicas primeiro para estabelecer credibilidade e depois abordar aspectos emocionais","Fazer reunioes curtas com um unico tema para evitar que qualquer informacao se perca por efeito de recencia","Registrar por escrito todo o conteudo para eliminar completamente o efeito de primazia e recencia"],ans:0,exp:"Pesquisas de memoria mostram que lembramos melhor o que foi dito primeiro (primazia) e por ultimo (recencia) do que o que esta no meio. O planejador deve estruturar reunioes colocando as mensagens-chave no inicio e recapitulando-as claramente ao final, deixando o meio para conteudo de suporte tecnico."},
