onal por dinheiro e o libera facilmente para qualquer fim"],"ans":0,"exp":"O script de evitacao financeira que associa riqueza a desonestidade ('rico e ladrao') pode criar um boicote inconsciente ao proprio sucesso financeiro. O individuo inconscientemente encontra formas de gastar o que acumula para nao se tornar 'um ladrao' — mesmo sem perceber essa conexao."},{"id":85,"tp":"Nudges","c":"#f97316","text":"O 'efeito de enquadramento' (framing effect) tem aplicacao direta na comunicacao do planejador porque:","opts":["A mesma informacao financeira, apresentada de formas diferentes, pode levar o cliente a decisoes completamente opostas entre si","A apresentacao grafica em graficos e tabelas sempre gera melhor compreensao do que dados numericos puros e isolados","Clientes preferem receber apenas informacoes positivas e o planejador deve enquadrar todos os dados de forma otimista","O enquadramento afeta apenas clientes leigos sem experiencia, nao afetando profissionais do mercado financeiro experientes"],"ans":0,"exp":"O framing effect mostra que 'taxa de sobrevivencia de 90%' e '10% de mortalidade' sao matematicamente identicos mas percebidos de forma muito diferente. O planejador que apresenta retornos como 'ganho de 8% ao ano' versus 'ganho de 8% acima da inflacao de 9%' obtera reacoes distintas do mesmo cliente."},{"id":86,"tp":"Nudges","c":"#f97316","text":"A tecnica de 'implementation intention' (intencao de implementacao) aumenta a adesao a planos financeiros porque:","opts":["Transforma metas abstratas em planos concretos de 'quando X acontecer, farei Y' — ligando a intencao a pistas contextuais especificas","Cria contratos legais formais entre cliente e planejador que obrigam juridicamente o cumprimento das metas estabelecidas","Aumenta propositalmente a complexidade do plano para que o cliente se sinta mais comprometido com todo o processo","Utiliza recompensas financeiras imediatas e tangives para cada meta especifica que o cliente consegue cumprir com sucesso"],"ans":0,"exp":"Pesquisas de Gollwitzer mostram que 'vou poupar R$500 no dia 5 de cada mes, assim que receber o salario' e muito mais eficaz do que 'vou poupar mais'. A intencao de implementacao cria um plano especifico com pista contextual que ativa automaticamente o comportamento desejado."},{"id":87,"tp":"Bem-estar financeiro","c":"#84cc16","text":"O 'estresse financeiro cronico' difere do estresse financeiro agudo porque:","opts":["E persistente, desgasta os recursos cognitivos e emocionais ao longo do tempo e compromete a capacidade de tomar boas decisoes","E sempre mais intenso do que o estresse agudo e requer tratamento medico especializado e urgente imediatamente","Afeta apenas individuos com dividas ativas e nao afeta pessoas com patrimonio positivo e renda estavel adequada","E reversivel exclusivamente com melhora objetiva da situacao financeira, sem nenhuma intervencao psicologica adicional"],"ans":0,"exp":"O estresse financeiro cronico, ao contrario do agudo, e um estado persistente que esgota o 'bandwidth' cognitivo (Mullainathan e Shafir). Pessoas em situacao de escassez financeira cronica tomam piores decisoes nao por falta de inteligencia, mas porque o estresse consome os recursos mentais disponiveis."},{"id":88,"tp":"Bem-estar financeiro","c":"#84cc16","text":"A pesquisa sobre 'bandwidth cognitivo' (Mullainathan e Shafir, 2013) tem qual implicacao direta para o planejamento?","opts":["A escassez financeira consome recursos cognitivos que prejudicam a tomada de decisao em todas as areas da vida, incluindo as proprias decisoes financeiras","Clientes com maior renda e patrimonio tem automaticamente maior capacidade cognitiva disponivel para decisoes complexas","O numero de decisoes financeiras disponibilizadas ao cliente deve ser maximizado para exercitar o cerebro e treinar a capacidade","Apenas clientes em situacao de extrema pobreza absoluta experimentam a reducao significativa do bandwidth cognitivo"],"ans":0,"exp":"Mullainathan e Shafir demonstraram que a preocupacao com escassez — financeira, de tempo ou de qualquer recurso — monopoliza recursos cognitivos. Isso explica decisoes aparentemente irracionais de pessoas em dificuldades financeiras: nao e falta de carater, e falta de bandwidth cognitivo disponivel."},{"id":89,"tp":"Relacionamento","c":"#ec4899","text":"A 'empatia cognitiva' diferencia-se da 'empatia afetiva' no contexto do atendimento financeiro porque:","opts":["A empatia cognitiva e compreender intelectualmente a perspectiva e o estado emocional do cliente sem necessariamente compartilhar a emocao","A empatia afetiva e necessariamente superior e mais eficaz em todas as situacoes de planejamento financeiro real","A empatia cognitiva e uma habilidade inata que nao pode ser desenvolvida — ou se tem naturalmente ou nao se tem","Sao sinonimos perfeitos no contexto do planejamento financeiro, sem nenhuma diferenca pratica ou teorica relevante"],"ans":0,"exp":"A empatia cognitiva (entender a perspectiva do outro) permite ao planejador manter a objetividade necessaria enquanto se conecta com o cliente. A empatia afetiva (sentir o que o outro sente) pode levar o planejador a ser excessivamente influenciado pelas emocoes do momento, comprometendo recomendacoes tecnicas necessarias."},{"id":90,"tp":"Relacionamento","c":"#ec4899","text":"O 'efeito de primazia e recencia' na comunicacao financeira sugere que o planejador deve:","opts":["Posicionar as informacoes mais importantes no inicio E no final da reuniao — pois essas posicoes sao mais lembradas do que o meio","Apresentar as informacoes mais tecnicas e complexas primeiro, para estabelecer credibilidade, e depois abordar aspectos emocionais","Fazer reunioes muito curtas com um unico tema para evitar qualquer perda de informacao por efeito de recencia ou primazia","Registrar por escrito todo o conteudo discutido para eliminar completamente o efeito de primazia e recencia da memoria"],"ans":0,"exp":"Pesquisas de memoria mostram que lembramos melhor o que foi dito primeiro (primazia) e por ultimo (recencia) do que o que esta no meio. O planejador deve estruturar reunioes colocando as mensagens-chave no inicio e recapitulando-as claramente ao final, deixando o meio para conteudo de suporte tecnico."},{"id":91,"tp":"Etica","c":"#ef4444","text":"O 'vies de atribuicao egoista' (self-serving bias) no planejador financeiro manifesta-se quando ele:","opts":["Atribui os bons resultados da carteira do cliente as proprias recomendacoes e os maus resultados a fatores externos de mercado","Recomenda conscientemente e deliberadamente produtos de maior comissao, sabendo que nao sao os mais adequados ao cliente","Pede ao cliente que assine termos de ciencia sobre todos os riscos para se proteger juridicamente de eventuais reclamacoes","Apresenta projecoes excessivamente otimistas e irrealistas para convencer o cliente a aceitar suas recomendacoes facilmente"],"ans":0,"exp":"O self-serving bias e uma forma insidiosa de conflito cognitivo: o planejador inconscientemente interpreta os resultados de forma que confirme sua propria competencia. Isso impede o aprendizado com erros e pode levar a recomendacoes sistematicamente enviesadas ao longo do tempo."},{"id":92,"tp":"Etica","c":"#ef4444","text":"O planejador que percebe estar desenvolvendo dependencia excessiva de um cliente especifico — checando mensagens ansiosamente, aceitando pedidos que violam sua politica — deve:","opts":["Reconhecer o padrao como um problema etico e de saude profissional, buscar supervisao ou consultoria de pares e estabelecer limites claros","Entender que e completamente normal ter clientes mais proximos e que a dedicacao extra e sinal de excelencia no atendimento","Transferir o cliente imediatamente para outro profissional sem nenhuma explicacao para proteger ambas as partes envolvidas","Aumentar os honorarios cobrados do cliente especifico para compensar adequadamente o tempo extra dedicado a ele"],"ans":0,"exp":"A dependencia excessiva de um cliente e um sinal de alerta etico que pode comprometer a objetividade das recomendacoes e a saude profissional do planejador. A supervisao reflexiva e fundamental para identificar esses padroes antes que causem dano ao cliente ou ao profissional."},{"id":93,"tp":"Motivacao e mudanca","c":"#a78bfa","text":"O 'paradoxo da mudanca' na entrevista motivacional sugere que:","opts":["Quanto mais o planejador tenta convencer o cliente a mudar, mais o cliente resiste — paradoxalmente, aceitar a ambivalencia gera mais abertura para a mudanca","A mudanca de comportamento financeiro e completamente impossivel sem intervencao psicologica profissional especializada e de longo prazo","Clientes que resistem fortemente a mudancas nunca conseguem realiza-las, independentemente da abordagem ou tecnica usada pelo planejador","O planejador deve insistir repetidamente nas mesmas recomendacoes e argumentos tecnicos ate que o cliente finalmente as aceite e implemente"],"ans":0,"exp":"A psicologia da resistencia mostra que a pressao direta para mudar frequentemente aumenta a resistencia (reactance psicologica). A entrevista motivacional e baseada exatamente nesse paradoxo: ao aceitar e explorar a ambivalencia sem pressao, o planejador cria espaco para que a propria motivacao do cliente emerja naturalmente."},{"id":94,"tp":"Motivacao e mudanca","c":"#a78bfa","text":"O estagio de 'manutencao' no modelo transteorico de mudanca caracteriza-se por:","opts":["A mudanca ja implementada ha mais de seis meses, com o planejador ajudando a consolidar habitos e antecipar situacoes de risco de recaida","O cliente apenas comecando a considerar a mudanca e precisando de muita informacao e motivacao externa para avancar","A implementacao recente da mudanca (menos de seis meses), com o cliente ainda muito vulneravel a recaida rapida","O cliente tendo recaido no comportamento anterior e precisando recomecar completamente todo o processo de mudanca"],"ans":0,"exp":"Na manutencao, o novo comportamento ja esta consolidado (mais de seis meses), mas a recaida ainda e possivel em situacoes de estresse ou tentacao. O papel do planejador e reforcar os progressos, identificar situacoes de risco e co-criar planos de contingencia para proteger as mudancas conquistadas."},{"id":95,"tp":"Aplicacao integrada","c":"#fb7185","text":"Um casal tem objetivos financeiros opostos: ela quer guardar intensamente para aposentadoria antecipada; ele quer gastar em experiencias agora. Ela tem script de vigilancia; ele, de adoracao do dinheiro. A abordagem mais adequada e:","opts":["Facilitar dialogo estruturado sobre os valores profundos de cada um, identificar sobreposicoes e co-construir um plano que honre ambos os scripts","Adotar a posicao da esposa por ser mais tecnicamente responsavel e apresentar ao marido os dados sobre a importancia da aposentadoria","Elaborar planos financeiros completamente separados para cada conjuge, sem pontos de contato, integracao ou objetivos compartilhados","Recomendar que ambos realizem terapia de casal focada especificamente em financas antes de qualquer planejamento formal"],"ans":0,"exp":"O conflito financeiro em casal frequentemente reflete diferenca em scripts e valores — nao irresponsabilidade. O planejador deve facilitar o dialogo, identificar valores compartilhados e construir um plano que honre ambas as perspectivas de forma balanceada e sustentavel."},{"id":96,"tp":"Aplicacao integrada","c":"#fb7185","text":"Um herdeiro recebe R$2 milhoes inesperadamente e quer investir tudo em criptoativos. O planejador identifica sobrecarga emocional e 'windfall effect'. A sequencia de intervencao mais adequada e:","opts":["Validar a emocao da heranca, educar sobre o windfall effect e o risco de concentracao, propor periodo de espera e apresentar opcoes diversificadas","Negar o pedido imediatamente e apresentar apenas opcoes de renda fixa conservadora para proteger integralmente o patrimonio","Aceitar o pedido integralmente pois e dinheiro do cliente e sua autonomia deve ser respeitada absolutamente sem questionamentos","Encaminhar para especialista em criptoativos sem nenhuma intervencao psicologica ou comportamental adicional do proprio planejador"],"ans":0,"exp":"O windfall effect (herancas, premios, bonus inesperados) ativa a contabilidade mental que trata 'dinheiro facil' com menos cuidado. O planejador deve: (1) Validar emocionalmente; (2) Educar sobre o vies; (3) Sugerir periodo de espera; (4) Propor abordagem gradual e diversificada."},{"id":97,"tp":"Aplicacao integrada","c":"#fb7185","text":"Um planejador percebe que ao longo de seis meses sempre concordou com o cliente e nunca apresentou dados que contradizem suas expectativas. Esse padrao configura:","opts":["'Vies de agrado' (people-pleasing bias) do planejador, que compromete a qualidade do servico e constitui falha etica grave","Excelencia no atendimento centrado no cliente, pois o planejador esta adaptando o servico as preferencias e ao estilo do cliente","Excesso de empatia afetiva que pode ser facilmente corrigido com treinamento em comunicacao assertiva basica","Comportamento normal e esperado no inicio do relacionamento que naturalmente se corrige sozinho com o tempo e experiencia"],"ans":0,"exp":"O people-pleasing bias e um problema etico serio: o planejador que evita conflito priva o cliente de informacoes essenciais para boas decisoes. O dever fiduciario inclui apresentar informacoes desconfortaveis de forma empatica mas honesta. A supervisao reflexiva e fundamental para identificar esse padrao."},{"id":98,"tp":"Aplicacao integrada","c":"#fb7185","text":"Um cliente de 65 anos, recem-aposentado, demonstra perda de proposito e ansiedade e passa a gastar compulsivamente para preencher o tempo. O planejador deve:","opts":["Abordar a transicao de identidade com empatia, explorar o que o cliente quer que sua aposentadoria signifique e so entao ajustar o plano financeiro","Recomendar imediatamente que o cliente retorne ao trabalho em regime de meio periodo para recuperar a identidade profissional","Ajustar imediatamente a carteira para perfil mais conservador e reduzir drasticamente o acesso a recursos liquidos do cliente","Encaminhar imediatamente o cliente para psiquiatra por suspeita de transtorno de ansiedade generalizada grave"],"ans":0,"exp":"A aposentadoria e uma transicao de identidade profunda — o cliente perde nao apenas uma rotina, mas uma fonte de significado, status e relacionamentos. O planejador que ignora essa dimensao e trabalha apenas os numeros perdera o cliente ou tera um plano nao implementado."},{"id":99,"tp":"Aplicacao integrada","c":"#fb7185","text":"Um cliente prospero mas com ansiedade cronica sobre financas. Qual intervencao o planejador deve priorizar?","opts":["Explorar a origem da ansiedade financeira antes de qualquer otimizacao tecnica, pois sem isso nenhum plano tecnico ira reduzir a ansiedade","Apresentar imediatamente um relatorio completo mostrando que a situacao financeira e excelente em todos os indicadores quantitativos","Recomendar meditacao e exercicios de respiracao para reduzir a ansiedade do cliente antes de cada reuniao de planejamento","Aumentar a alocacao em renda fixa e reduzir a volatilidade da carteira para assim diminuir objetivamente a ansiedade do cliente"],"ans":0,"exp":"A ansiedade financeira em clientes prosperos frequentemente tem raiz em scripts (vigilancia financeira, trauma de escassez passada) e nao em dados objetivos. Apresentar mais dados positivos nao resolve — muitas vezes aumenta a ansiedade. A abordagem deve comecar pela exploracao empatica da origem."},{"id":100,"tp":"Aplicacao integrada","c":"#fb7185","text":"Qual afirmacao melhor descreve o papel do planejador financeiro no paradigma da 'psicologia do planejamento financeiro' do Modulo 8 CFP?","opts":["Profissional tecnicamente competente que integra dimensoes comportamentais, emocionais e relacionais ao planejamento como coach financeiro","Terapeuta financeiro que prioriza o tratamento psicologico das questoes emocionais antes de qualquer planejamento tecnico","Especialista exclusivamente tecnico que utiliza modelos quantitativos para otimizar a alocacao de ativos do cliente","Profissional de vendas que usa tecnicas psicologicas para aumentar o engajamento do cliente com os produtos recomendados"],"ans":0,"exp":"O Modulo 8 representa uma evolucao do papel do planejador: de tecnico especializado para profissional que integra competencia tecnica com inteligencia emocional, compreensao comportamental e habilidades relacionais. O objetivo final e sempre ajudar o cliente a tomar melhores decisoes para uma vida financeira alinhada ao que genuinamente importa para ele."}];

// Fisher-Yates com seed (embaralhamento estavel entre recarregamentos)
function seededShuffle(arr, seed) {
var a = arr.slice();
var s = seed;
for (var i = a.length - 1; i > 0; i–) {
s = (s * 1664525 + 1013904223) & 0x7fffffff;
var j = s % (i + 1);
var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
}
return a;
}

// Embaralhar as alternativas de cada questao usando o seed
function buildShuffled(rawQuestions, seed) {
var result = [];
for (var i = 0; i < rawQuestions.length; i++) {
var q = rawQuestions[i];
var correctText = q.opts[q.ans];
var shuffledOpts = seededShuffle(q.opts, seed * (q.id + 1));
var newAns = -1;
for (var j = 0; j < shuffledOpts.length; j++) {
if (shuffledOpts[j] === correctText) { newAns = j; break; }
}
result.push({
id: q.id, tp: q.tp, c: q.c,
text: q.text, opts: shuffledOpts,
ans: newAns, exp: q.exp
});
}
return result;
}

// Extrair temas unicos sem spread operator
function getUniqueTopics(questions) {
var seen = {};
var topics = [];
for (var i = 0; i < questions.length; i++) {
var t = questions[i].tp;
if (!seen[t]) { seen[t] = true; topics.push(t); }
}
return topics;
}

// Registrar resposta
function pick(qid, sel) {
if (state[qid]) return;
var q = null;
for (var i = 0; i < QS.length; i++) {
if (QS[i].id === qid) { q = QS[i]; break; }
}
if (!q) return;
var ok = (sel === q.ans);
state[qid] = { sel: sel, ok: ok };
saveState();

var btns = document.querySelectorAll(’#O’ + qid + ’ .op’);
for (var i = 0; i < btns.length; i++) {
btns[i].disabled = true;
btns[i].className = ‘op’;
if (i === q.ans) btns[i].classList.add(‘ok’);
else if (i === sel && !ok) btns[i].classList.add(‘no’);
else btns[i].classList.add(‘dm’);
}

var fb = document.getElementById(‘F’ + qid);
fb.className = ’fb ’ + (ok ? ‘fbok’ : ‘fbno’);
fb.innerHTML = ‘’;
var strong = document.createElement(‘strong’);
strong.textContent = ok ? ’Correto! ’ : ’Incorreto. ’;
fb.appendChild(strong);
fb.appendChild(document.createTextNode(q.exp));
fb.style.display = ‘block’;
updateStats();
}
