<script>
// Banco de questoes (alternativas em ans:0 antes do shuffle)
var RAW=[{"id":1,"tp":"Fundamentos","c":"#3b82f6","text":"Richard Thaler, Premio Nobel de 2017, e mais associado a contribuicao de:","opts":["Criar o conceito de contabilidade mental e popularizar a economia comportamental com aplicacoes praticas em politica publica","Desenvolver a Teoria da Perspectiva junto com Daniel Kahneman e Amos Tversky ao longo dos anos 1970 e publicar o artigo seminal de 1979","Propor o conceito de mercados eficientes em sua versao comportamental e adaptativa ao longo dos anos 1980 e 1990","Desenvolver o modelo CAPM ajustado por multiplos fatores comportamentais e psicologicos observados no mercado financeiro"],"ans":0,"exp":"Thaler e o grande nome da economia comportamental aplicada. Suas contribuicoes incluem a contabilidade mental, o efeito dotacao, o conceito de nudge (com Sunstein) e o programa SMarT."},{"id":2,"tp":"Fundamentos","c":"#3b82f6","text":"O conceito de 'racionalidade limitada' (bounded rationality) de Herbert Simon sugere que os individuos:","opts":["Tomam decisoes que satisfazem um criterio minimo aceitavel ('satisficing') em vez de otimizar, devido a limitacoes cognitivas e informacionais","Sao agentes perfeitamente racionais que invariavelmente maximizam a utilidade esperada em todas as suas decisoes economicas e financeiras","Tomam decisoes significativamente mais racionais e precisas quando tem acesso a mais opcoes e informacoes disponiveis ao mesmo tempo","Sao completamente irracionais em todas as decisoes financeiras e sao incapazes de tomar decisoes consistentes ao longo do tempo"],"ans":0,"exp":"Simon cunhou 'bounded rationality': agentes decidem com informacao incompleta e capacidade cognitiva finita. Em vez de otimizar, buscam solucoes 'suficientemente boas' (satisficing). Base das financas comportamentais."},{"id":3,"tp":"Fundamentos","c":"#3b82f6","text":"A distincao entre 'Econs' e 'Humanos' usada por Thaler e Sunstein no livro Nudge refere-se a:","opts":["O agente economico racional idealizado pela teoria classica versus o ser humano real, com vieses cognitivos e racionalidade limitada","Economistas profissionais com formacao academica versus leigos sem conhecimento tecnico em financas","Investidores institucionais com acesso privilegiado a informacoes versus investidores individuais de varejo","Profissionais que usam modelos quantitativos de mercado versus analistas com abordagem qualitativa"],"ans":0,"exp":"'Econs' sao perfeitamente racionais — agentes hipoteticos da teoria classica. 'Humanos' sao como realmente somos: impulsivos, influenciaveis pelo contexto e propensos a vieses. O planejamento eficaz deve ser desenhado para humanos."},{"id":4,"tp":"Fundamentos","c":"#3b82f6","text":"O campo das financas comportamentais e interdisciplinar porque integra conhecimentos de:","opts":["Economia, psicologia cognitiva, neurociencia, sociologia e antropologia para explicar decisoes financeiras reais","Apenas economia e matematica financeira, combinando modelos quantitativos e teorias de otimizacao","Exclusivamente psicologia clinica e psicanalise aplicadas ao comportamento do consumidor financeiro","Direito financeiro, contabilidade, compliance e psicologia organizacional das instituicoes financeiras"],"ans":0,"exp":"Financas comportamentais integram: psicologia cognitiva (vieses e heuristicas), neurociencia (bases cerebrais da decisao), sociologia (influencias sociais) e antropologia (crencas culturais sobre dinheiro)."},{"id":5,"tp":"Fundamentos","c":"#3b82f6","text":"O principio do 'paternalismo libertario', base filosofica dos nudges segundo Thaler e Sunstein, sustenta que:","opts":["E possivel influenciar comportamentos em direcao a melhores resultados sem eliminar a liberdade individual de escolha","O Estado e os planejadores devem determinar as melhores escolhas financeiras para os cidadaos e clientes","A liberdade de escolha deve ser absoluta e incondicional, sendo qualquer forma de influencia antiética","Incentivos financeiros e penalidades pecuniarias sao sempre mais eficazes do que nudges comportamentais"],"ans":0,"exp":"'Libertarian paternalism': paternalista porque orienta para melhores escolhas; libertario porque preserva a liberdade de escolher diferente. O design de opcoes sempre influencia — melhor faze-lo conscientemente a favor do cliente."},{"id":6,"tp":"Fundamentos","c":"#3b82f6","text":"As heuristicas, no contexto das financas comportamentais, sao definidas como:","opts":["Atalhos cognitivos que simplificam decisoes, uteis no cotidiano mas que podem gerar erros sistematicos em contextos complexos","Formulas matematicas avancadas para calcular o retorno esperado ajustado ao risco de um portfolio","Estrategias otimas de alocacao de ativos baseadas exclusivamente em dados historicos e backtesting","Regras juridicas e regulatorias de responsabilidade profissional do planejador financeiro certificado"],"ans":0,"exp":"Heuristicas sao simplificacoes que ajudam a decidir rapidamente. Embora uteis, podem gerar vieses quando aplicadas em contextos que exigem analise mais rigorosa, como decisoes financeiras complexas de longo prazo."},{"id":7,"tp":"Fundamentos","c":"#3b82f6","text":"Daniel Kahneman descreve o Sistema 2 de pensamento. Qual caracteristica melhor o define?","opts":["Lento, deliberado e analitico — exige esforco cognitivo consciente e e ativado para problemas complexos","Rapido, automatico e intuitivo — responsavel pela maioria das decisoes cotidianas sem esforco consciente","Exclusivamente emocional e completamente desvinculado de dados, logica ou raciocinio analitico","Ativo somente em situacoes de risco financeiro extremo, quando todas as outras heuristicas falham"],"ans":0,"exp":"O Sistema 2 e lento, deliberado e analitico. Requer esforco consciente e e ativado para problemas que o Sistema 1 nao consegue resolver automaticamente. Nas financas, decisoes de planejamento de longo prazo deveriam envolver o Sistema 2."},{"id":8,"tp":"Vieses cognitivos","c":"#10b981","text":"O 'efeito dotacao' (endowment effect), demonstrado experimentalmente por Thaler, mostra que:","opts":["As pessoas atribuem mais valor a um objeto pelo simples fato de possuilo, mesmo que seu valor de mercado seja identico","Investidores superalocam em ativos de maior dividend yield por perceberem o dividendo como 'bonus gratuito'","Carteiras herdadas de familiares tendem a ter retornos significativamente superiores a carteiras construidas ativamente","Clientes valorizam mais os produtos financeiros recomendados pelo planejador do que os que eles proprios escolheriam"],"ans":0,"exp":"O efeito dotacao cria apego irracional pela posse. No planejamento financeiro, explica a relutancia em vender acoes herdadas inadequadas ao perfil, manter imoveis que deveriam ser vendidos, ou resistir a mudancas de carteira tecnicamente justificadas."},{"id":9,"tp":"Vieses cognitivos","c":"#10b981","text":"O 'vies de retrospectiva' (hindsight bias) e especialmente perigoso para o planejador financeiro porque:","opts":["Leva a acreditar que eventos passados eram previsiveis, criando falsa capacidade preditiva e comprometendo a avaliacao honesta de decisoes anteriores","Faz o investidor subestimar retornos futuros com base em retornos passados que parecem excessivamente altos e nao representativos","Faz o cliente superestimar perdas passadas ja realizadas e subestimar consistentemente os ganhos efetivamente obtidos na carteira","Afeta unicamente profissionais financeiros experientes e seniores, poupando completamente os clientes leigos de seus efeitos nocivos"],"ans":0,"exp":"O hindsight bias ('eu sabia que isso ia acontecer') impede o aprendizado genuino com erros. Decisoes devem ser avaliadas com base nas informacoes disponiveis no momento — nao com beneficio do retrospecto."},{"id":10,"tp":"Vieses cognitivos","c":"#10b981","text":"A 'paralisia por excesso de opcoes' (choice overload) tem implicacao direta para o planejamento porque:","opts":["Oferecer muitas opcoes pode levar o cliente a procrastinar ou nao investir, como ocorre com planos de previdencia com muitos fundos","Clientes mais sofisticados sempre tomam decisoes melhores quando tem acesso a um maior numero de opcoes disponiveis","Clientes preferem ter o maximo de alternativas possivel para exercer plenamente sua autonomia financeira","O fenomeno afeta apenas decisoes de consumo cotidiano e nao se aplica a decisoes de investimento de longo prazo"],"ans":0,"exp":"Em planos de previdencia, a taxa de adesao cai a medida que o numero de fundos aumenta. O planejador pode usar arquitetura de escolhas para reduzir a complexidade, apresentando no maximo 3-5 opcoes curadas ao cliente."},{"id":11,"tp":"Vieses cognitivos","c":"#10b981","text":"O 'vies de projecao' (projection bias) leva o investidor a cometer qual erro especifico?","opts":["Assumir que suas preferencias e tolerancia ao risco atuais serao iguais no futuro, subestimando como elas mudarao com o tempo","Projetar retornos futuros usando unicamente os retornos passados mais recentes como referencia exclusiva","Atribuir ao mercado as suas proprias expectativas de retorno, como se o mercado 'pensasse igual a ele'","Superestimar o crescimento de investimentos nos setores e empresas que pessoalmente conhece e usa no dia a dia"],"ans":0,"exp":"O projection bias faz o investidor montar a carteira assumindo que vai sentir no futuro o que sente hoje. Quem monta a carteira num momento de bonanca subestima como reagira emocionalmente a uma queda de 30%."},{"id":12,"tp":"Vieses cognitivos","c":"#10b981","text":"O fenomeno do 'money illusion' (ilusao monetaria) descreve a tendencia de:","opts":["Pensar em termos nominais em vez de reais, ignorando o efeito da inflacao — como celebrar aumento de 5% quando a inflacao e de 8%","Confundir o valor nominal de moedas estrangeiras com o poder de compra real da moeda local corrente","Superestimar o valor psicologico de dinheiro fisico em papel em relacao a saldos digitais e investimentos","Subestimar o custo de oportunidade de manter dinheiro parado em conta corrente sem nenhuma remuneracao"],"ans":0,"exp":"A ilusao monetaria leva a decisoes equivocadas por desconsiderar a inflacao. Exemplos: celebrar 'ganho' de 8% ao ano quando a inflacao e 9%, ou sentir que o salario aumentou quando o reajuste foi abaixo da inflacao."},{"id":13,"tp":"Vieses cognitivos","c":"#10b981","text":"O 'base rate neglect' (negligencia da taxa base) ocorre tipicamente quando:","opts":["O investidor da peso excessivo a informacoes especificas e vividas, ignorando probabilidades estatisticas gerais que deveriam orientar a decisao","O investidor ignora completamente qualquer dado historico quantitativo ao tomar todas as suas decisoes de investimento de curto prazo","O investidor aplica mecanicamente e sem critica a mesma taxa historica de retorno passada para projetar invariavelmente todos os resultados futuros","O investidor sistematicamente negligencia as taxas de administracao dos fundos ao comparar apenas os retornos brutos dos produtos disponniveis"],"ans":0,"exp":"A negligencia da taxa base e manifestacao do vies de representatividade. Exemplo: ao ouvir historia empolgante sobre uma startup, o investidor ignora que 90% das startups fracassam. O caso especifico e vivido domina a informacao estatistica geral."},{"id":14,"tp":"Vieses cognitivos","c":"#10b981","text":"O 'excesso de otimismo' (optimism bias) se diferencia do overconfidence porque:","opts":["O excesso de otimismo e a crenca de que eventos positivos sao mais provaveis para si do que para outros; o overconfidence e a superestimacao da propria competencia","Sao sinonimos perfeitos na literatura academica e pratica, descrevendo exatamente a mesma distorcao cognitiva sem qualquer diferenca","O excesso de otimismo afeta exclusivamente investidores novatos sem experiencia; o overconfidence afeta apenas especialistas experientes","O excesso de otimismo inevitavelmente leva a inacao e paralisia decisional; o overconfidence leva invariavelmente a negociacao excessiva"],"ans":0,"exp":"O optimism bias: 'coisas ruins acontecem com os outros, nao comigo'. O overconfidence: superestimacao da propria habilidade em tarefas especificas. Ambos podem coexistir e tem implicacoes distintas para o planejamento."},{"id":15,"tp":"Vieses cognitivos","c":"#10b981","text":"O 'vies de afeto' (affect heuristic) ocorre especificamente quando:","opts":["A reacao emocional a uma empresa influencia a avaliacao de risco e retorno, levando a perceber alto retorno E baixo risco simultaneamente","O investidor toma todas as suas decisoes exclusivamente com base em analise quantitativa e dados objetivos de mercado","Emocoes positivas de qualquer natureza sempre e invariavelmente conduzem a melhores decisoes de investimento","O planejador usa estrategicamente as emocoes do cliente para recomendar os produtos mais adequados ao perfil"],"ans":0,"exp":"A affect heuristic cria inconsistencia logica: quem ama uma marca tende a percebe-la como de alto retorno e baixo risco ao mesmo tempo. Investidores sobrealocam em ativos de que 'gostam', sem analise objetiva."},{"id":16,"tp":"Vieses cognitivos","c":"#10b981","text":"A 'fadiga de decisao' (decision fatigue) e relevante para o planejamento financeiro porque:","opts":["A qualidade das decisoes se deteriora ao longo de reunioes longas, tornando o cliente mais impulsivo ou avesso ao risco por exaustao cognitiva","Clientes com maior patrimonio e renda tendem a tomar decisoes sistematicamente piores por terem mais opcoes financeiras disponiveis","Apenas os planejadores financeiros sao sujeitos a fadiga de decisao nas reunioes, nunca os clientes que eles atendem e assessoram","Clientes mais jovens e inexperientes sofrem invariavelmente mais de fadiga de decisao do que clientes mais velhos e experientes"],"ans":0,"exp":"Decidir bem e um recurso que se esgota ao longo do dia e da reuniao. Reunioes muito longas levam o cliente a deferir decisoes ou fazer escolhas impulsivas. Planejadores devem abordar as decisoes mais importantes no inicio das reunioes."},{"id":17,"tp":"Vieses cognitivos","c":"#10b981","text":"Um investidor compra acoes de empresa que 'parece solida', sem analisar fundamentos. Depois que a empresa vai bem, diz 'Eu sempre soube que seria assim'. Quais dois vieses coexistem?","opts":["Representatividade (julgou a empresa pela aparencia) e hindsight bias (acredita retroativamente que sempre soube)","Efeito manada (seguiu o que outros faziam) e ancoragem no preco historico da acao quando comprou","Overconfidence (acreditava na propria analise) e vies de confirmacao sobre os setores que preferia","Disponibilidade (noticias recentes influenciaram) e efeito dotacao sobre a posicao existente na carteira"],"ans":0,"exp":"Representatividade: julgou a empresa por esteriotipo superficial. Hindsight bias: apos o bom resultado, reescreve a historia como se sempre tivesse sido obvio. Esses dois vieses frequentemente coexistem e se reforcam mutuamente."},{"id":18,"tp":"Vieses cognitivos","c":"#10b981","text":"O 'vies de self-attribution' (atribuicao egoista) manifesta-se quando o investidor:","opts":["Atribui os ganhos a propria habilidade e competencia, e os prejuizos a fatores externos como o mercado ou o governo","Busca ativamente informacoes que confirmem suas crencas previas sobre determinado ativo ou setor de mercado","Superestima consistentemente a propria capacidade de prever movimentos de curto prazo do mercado financeiro","Mantem posicoes perdedoras por tempo muito excessivo para evitar o desconforto de realizar a perda definitivamente"],"ans":0,"exp":"O self-attribution bias alimenta o overconfidence: o investidor aprende que e 'bom' porque atribui os acertos a si mesmo e os erros ao mercado. Isso impede o aprendizado genuino e leva a assuncao de riscos crescentes."},{"id":19,"tp":"Vieses cognitivos","c":"#10b981","text":"O 'vies de familiaridade' (familiarity bias) leva o investidor a:","opts":["Preferir ativos que conhece — acoes da propria empresa empregadora, marcas que consome — resultando em diversificacao inadequada","Rejeitar qualquer ativo financeiro que nao tenha pelo menos cinco anos de historico documentado e verificavel","Confiar mais em recomendacoes de amigos e familiares do que nas de especialistas financeiros certificados","Ignorar ativos estrangeiros por desconhecer as regulacoes, idioma e dinamicas dos mercados internacionais"],"ans":0,"exp":"O vies de familiaridade e uma das causas mais comuns de concentracao de risco. Funcionarios que investem excessivamente em acoes da propria empresa ou investidores que ignoram diversificacao internacional sao exemplos classicos."},{"id":20,"tp":"Vieses cognitivos","c":"#10b981","text":"O fenomeno de 'narrow framing' (enquadramento estreito) ocorre quando o investidor:","opts":["Avalia cada investimento isoladamente em vez de como parte de um portfolio integrado, levando a decisoes subotimas de risco","Foca exclusivamente nos retornos de curto prazo sem considerar os objetivos financeiros de longo prazo estabelecidos","Compara seus retornos apenas com o benchmark mais proximo, ignorando o risco efetivamente assumido na carteira","Rejeita categoricamente opcoes de investimento que nao compreende completamente antes de qualquer analise inicial"],"ans":0,"exp":"O narrow framing leva a avaliar o risco de cada ativo de forma isolada, e nao no contexto do portfolio completo. Isso faz o investidor rejeitar ativos com volatilidade individual alta mesmo quando eles reduzem o risco total da carteira por baixa correlacao."},{"id":21,"tp":"Teoria da Perspectiva","c":"#8b5cf6","text":"Na Teoria da Perspectiva, o 'ponto de referencia' e central porque:","opts":["Determina se uma situacao e percebida como ganho ou perda — e essa percepcao, nao o valor absoluto, e o que orienta a decisao","Define objetivamente o valor absoluto de um ativo com base no preco de mercado justo calculado pelo analista","Estabelece o benchmark de retorno minimo que o investidor exige para aceitar qualquer tipo de ativo em carteira","Representa o valor patrimonial inicial do cliente antes de qualquer investimento ou contribuicao ser realizada"],"ans":0,"exp":"Tudo e relativo ao ponto de referencia. O mesmo resultado pode ser percebido como ganho ou perda dependendo do referencial adotado. O preco de compra, o valor maximo ja atingido ou uma expectativa podem funcionar como referencia."},{"id":22,"tp":"Teoria da Perspectiva","c":"#8b5cf6","text":"A funcao valor da Teoria da Perspectiva e concava para ganhos e convexa para perdas. Qual e a implicacao pratica?","opts":["Para ganhos, o investidor tende a preferir ganho certo menor; para perdas, tende a arriscar a aceitar uma perda certa","O investidor e igualmente avesso ao risco para ganhos e para perdas, independentemente da magnitude dos valores","Perdas e ganhos geram a mesma intensidade emocional no investidor, sendo percebidos de forma absolutamente simetrica","O investidor e totalmente neutro ao risco para valores pequenos e se torna avesso apenas para grandes montantes"],"ans":0,"exp":"A assimetria da funcao valor e central na Teoria da Perspectiva. Para ganhos: preferimos R$500 garantidos a 50% de chance de R$1.000. Para perdas: preferimos arriscar 50% de chance de perder R$1.000 a aceitar perder R$500 com certeza."},{"id":23,"tp":"Teoria da Perspectiva","c":"#8b5cf6","text":"O 'efeito certeza' (certainty effect) da Teoria da Perspectiva demonstra que as pessoas tendem a:","opts":["Supervalorizar resultados certos em relacao a resultados provaveis, mesmo quando a matematica favorece a aposta probabilistica","Sempre preferir a opcao de maior valor esperado matematico, independentemente de qualquer certeza ou probabilidade envolvida","Ser completamente indiferentes entre certeza e probabilidade quando os valores esperados matematicos sao exatamente iguais","Tomar decisoes invariavelmente mais racionais quando os resultados sao certos do que quando sao probabilisticos"],"ans":0,"exp":"O efeito certeza explica a preferencia por ganhos garantidos mesmo quando o valor esperado da aposta e maior. Exemplo: preferir R$900 certos a 90% de chance de R$1.000 (mesmo valor esperado). Tambem explica a popularidade de produtos com capital garantido."},{"id":24,"tp":"Teoria da Perspectiva","c":"#8b5cf6","text":"Para maximizar o bem-estar percebido do cliente ao comunicar resultados financeiros, o planejador deve:","opts":["Segregar perdas em eventos menores e combinar multiplos ganhos em um resultado unico para maximizar o prazer percebido","Sempre apresentar todos os resultados de forma integrada em um unico numero para simplificar a analise do cliente","Integrar perdas e ganhos automaticamente sempre que o resultado liquido final for positivo para o cliente","Apresentar resultados de forma completamente neutra e objetiva, sem nenhuma consideracao de aspectos psicologicos"],"ans":0,"exp":"Thaler demonstrou: (1) Integrar perdas — uma perda unica de R$2.000 doi menos que duas de R$1.000; (2) Segregar ganhos — dois ganhos de R$1.000 geram mais prazer que um unico de R$2.000. Conhecer isso ajuda a comunicar resultados de forma mais eficaz."},{"id":25,"tp":"Teoria da Perspectiva","c":"#8b5cf6","text":"Um cliente tem ganho de R$8.000 em uma conta e perda de R$8.000 em outra, ficando muito mais angustiado com a perda. Qual principio explica diretamente essa assimetria?","opts":["Aversao a perda — perdas pesam emocionalmente de 1,5 a 2,5 vezes mais do que ganhos equivalentes em magnitude","Efeito certeza — o ganho e percebido como mais incerto e fragil do que a perda ja consolidada na conta","Efeito disposicao — o cliente deseja instintivamente realizar o ganho e manter indefinidamente a posicao perdedora","Contabilidade mental — o cliente contabiliza mentalmente as duas contas de forma completamente separada e independente"],"ans":0,"exp":"A aversao a perda (loss aversion) e o principio central da Teoria da Perspectiva. A dor de uma perda e 1,5 a 2,5x mais intensa que o prazer de um ganho equivalente. Clientes que perdem o sono com perdas nominais estao manifestando aversao a perda intensa."},{"id":26,"tp":"Teoria da Perspectiva","c":"#8b5cf6","text":"O 'efeito disposicao' e definido como a tendencia sistematica do investidor de:","opts":["Vender ativos com ganho rapidamente para 'garantir' o lucro e manter ativos com perda por tempo excessivo esperando recuperacao","Diversificar excessivamente a carteira para reduzir ao maximo o risco especifico de cada ativo individual","Concentrar todos os investimentos em ativos de renda fixa sempre apos qualquer experiencia de perda no mercado","Rebalancear automaticamente a carteira a cada trimestre independentemente das condicoes e tendencias de mercado"],"ans":0,"exp":"O efeito disposicao e uma das consequencias mais estudadas da aversao a perda. O investidor 'realiza' ganhos cedo para sentir o prazer, e mantem perdedores indefinidamente para nao confirmar a perda. Isso sistematicamente prejudica os retornos de longo prazo."},{"id":27,"tp":"Teoria da Perspectiva","c":"#8b5cf6","text":"A 'contabilidade mental' gera erros financeiros porque o investidor passa a:","opts":["Tratar recursos de diferentes origens (salario, bonus, heranca) de formas distintas, ignorando que seu valor real e equivalente","Calcular mentalmente o rendimento real de investimentos descontando a inflacao de forma equivocada e imprecisa","Registrar mentalmente todas as despesas para controle orcamentario informal, sem nenhum impacto nas decisoes reais","Avaliar os investimentos considerando apenas o retorno absoluto sem incorporar o nivel de risco efetivamente assumido"],"ans":0,"exp":"Na contabilidade mental, o dinheiro 'ganho facil' (como um bonus ou premio de loteria) costuma ser tratado com menos cuidado do que o salario mensal, embora os valores sejam financeiramente equivalentes. Isso pode levar a gastos irracionais e estrategias de investimento incoerentes."},{"id":28,"tp":"Emocoes e decisao","c":"#f59e0b","text":"O modelo de 'inteligencia emocional' aplicado ao planejamento financeiro sugere que o planejador mais eficaz:","opts":["Reconhece e regula suas proprias emocoes, identifica as emocoes do cliente e usa esse entendimento para guiar o planejamento de forma construtiva","Consegue suprimir completamente suas proprias emocoes durante o atendimento para manter objetividade tecnica absoluta","Expressa abertamente suas proprias opinioes emocionais sobre as decisoes do cliente para criar empatia e conexao","Foca exclusivamente nas emocoes do cliente, deixando completamente de lado todos os aspectos tecnicos do planejamento"],"ans":0,"exp":"A inteligencia emocional (Goleman) envolve autoconsciencia (reconhecer os proprios vieses), autorregulacao, empatia (identificar o estado emocional do cliente) e habilidade social. Nao e suprimir emocoes, mas usa-las com inteligencia."},{"id":29,"tp":"Emocoes e decisao","c":"#f59e0b","text":"Pesquisas em neurociencia (Damasio) mostram que pacientes com dano nas regioes cerebrais responsaveis pelas emocoes:","opts":["Paradoxalmente, tem dificuldade em tomar boas decisoes, pois emocoes fornecem 'marcadores somaticos' essenciais para orientar escolhas","Tomam decisoes financeiras superiores por serem puramente racionais, sem interferencias emocionais de qualquer tipo","Demonstram na pratica o modelo ideal do homo economicus racional — o decisor perfeito da teoria economica classica","Tomam decisoes significativamente mais rapidas em tempo, embora com qualidade e consistencia sensivelmente menores"],"ans":0,"exp":"Damasio mostrou que a ausencia de resposta emocional nao torna as pessoas mais racionais — as paralisa. Emocoes funcionam como 'marcadores somaticos' que sinalizam opcoes boas e ruins com base em experiencias passadas."},{"id":30,"tp":"Emocoes e decisao","c":"#f59e0b","text":"Durante forte queda de mercado, varios clientes ligam em panico. Qual e a sequencia correta de resposta do planejador?","opts":["Primeiro validar emocionalmente o medo do cliente, depois contextualizar no plano de longo prazo, e so entao discutir possiveis ajustes","Apresentar imediatamente dados historicos e graficos mostrando que o mercado sempre se recuperou ao longo do tempo","Transferir imediatamente toda a carteira para renda fixa para acalmar o cliente e depois readequar gradualmente","Lembrar o cliente das clausulas contratuais assinadas e da politica de investimentos acordada no inicio do relacionamento"],"ans":0,"exp":"Sequencia correta: (1) Validacao emocional — 'Entendo que isso e preocupante'; (2) Contextualizacao — 'Veja como seu plano foi estruturado para momentos assim'; (3) Analise conjunta se necessario. Comecar com dados quando o cliente esta em panico aumenta a resistencia."},{"id":31,"tp":"Emocoes e decisao","c":"#f59e0b","text":"A 'fadiga de decisao' implica que o planejador deve estruturar suas reunioes de qual forma?","opts":["Abordar as decisoes mais importantes e dificeis no inicio da reuniao, quando a capacidade decisoria do cliente esta mais alta","Abordar os assuntos mais simples e faceis primeiro para criar momentum positivo antes das decisoes dificeis","Distribuir igualmente todos os temas e decisoes ao longo de toda a reuniao para manter um ritmo uniforme","Fazer reunioes o mais longas e completas possivel para aproveitar ao maximo o tempo disponivel com o cliente"],"ans":0,"exp":"A fadiga de decisao (Baumeister) mostra que decidir bem e um recurso que se esgota ao longo do dia e da reuniao. As decisoes mais importantes devem ser tomadas com o cliente 'descansado' cognitivamente — portanto no inicio, nao ao final."},{"id":32,"tp":"Emocoes e decisao","c":"#f59e0b","text":"O 'vies de afeto' aplicado a decisoes de investimento pode levar o cliente a qual erro especifico?","opts":["Perceber alto retorno E baixo risco em ativos de que gosta emocionalmente, violando a relacao fundamental risco-retorno","Ser mais disciplinado e criterioso nos ativos de que gosta, pois os monitora com mais atencao e frequencia","Diversificar mais amplamente ao investir em multiplos setores que admira e conhece profundamente no mercado","Ser mais conservador nos setores de que gosta para proteger e nao perder as posicoes que aprecia mais"],"ans":0,"exp":"A affect heuristic cria a ilusao de que ativos emocionalmente atraentes sao simultaneamente seguros e rentaveis — violando a relacao risco-retorno. Investidores sobrealocam em empresas que 'amam', concentrando risco sem perceber."},{"id":33,"tp":"Emocoes e decisao","c":"#f59e0b","text":"Qual e a sequencia correta do ciclo emocional classico do investidor, a partir do pico do mercado?","opts":["Euforia → Complacencia → Ansiedade → Negacao → Panico → Depressao → Esperanca → Otimismo crescente","Otimismo → Euforia → Panico imediato → Recuperacao rapida → Novo otimismo sem fases intermediarias","Medo inicial → Cautela → Otimismo gradual → Euforia → Panico → Recuperacao direta e rapida sem depressao","Complacencia → Euforia crescente → Ansiedade → Otimismo renovado → Panico → Depressao → Recuperacao"],"ans":0,"exp":"O ciclo emocional do investidor segue: otimismo (antes do pico) → euforia (no pico) → complacencia → ansiedade → negacao → panico (no fundo) → depressao → esperanca → otimismo. O planejador deve identificar em qual fase o cliente se encontra para calibrar a comunicacao."},{"id":34,"tp":"Emocoes e decisao","c":"#f59e0b","text":"A teoria do arrependimento (regret theory) explica por que muitos investidores evitam agir ou decidir porque:","opts":["Temem sentir arrependimento caso a decisao tomada resulte em desfecho negativo, levando a inacao ou escolhas excessivamente conservadoras","Desejam maximizar o retorno esperado e aguardam pacientemente a oportunidade matematicamente mais favoravel","Preferem delegar todas as decisoes financeiras ao planejador para evitar qualquer responsabilidade pessoal pelo resultado","Aguardam sempre o momento tecnicamente ideal do mercado para entrar ou sair de posicoes de investimento"],"ans":0,"exp":"A regret theory mostra que o medo do arrependimento futuro — 'e se eu fizer isso e der errado?' — leva muitos investidores a inacao ou escolhas excessivamente conservadoras. O planejador pode atenuar isso enquadrando a decisao de nao agir tambem como sujeita a arrependimento."},{"id":35,"tp":"Scripts financeiros","c":"#06b6d4","text":"O conceito de 'transmissao intergeracional de comportamentos financeiros' sugere que:","opts":["Padroes de comportamento financeiro — saudaveis e disfuncionais — tendem a ser transmitidos por observacao, modelagem e mensagens da familia","Filhos de pais financeiramente bem-sucedidos sempre se tornam igualmente bem-sucedidos por heranca e exemplo positivo","A educacao financeira formal e sistematica e suficiente para quebrar completamente quaisquer padroes herdados da familia","Apenas traumas financeiros severos como falencia ou pobreza extrema sao efetivamente transmitidos entre geracoes"],"ans":0,"exp":"A transmissao intergeracional ocorre por multiplos canais: observacao direta dos pais, mensagens explicitas e implicitas sobre dinheiro, experiencias familiares coletivas. O planejador que entende esse contexto pode trabalhar padroes que de outra forma pareceriam irracionais."},{"id":36,"tp":"Scripts financeiros","c":"#06b6d4","text":"Uma cliente bem-sucedida sistematicamente faz aportes e depois resgata para gastos desnecessarios, em ciclo repetitivo. O pai dizia: 'Dinheiro nao e para gente como a gente.' O diagnostico mais provavel e:","opts":["Autossabotagem financeira enraizada em script de indignidade — crenca inconsciente de que nao merece acumular riqueza","Vies do presente intenso combinado com ausencia de planejamento financeiro estruturado e metas definidas","Efeito disposicao aplicado a poupanca — 'realiza' os aportes acumulados antes que o saldo cresza significativamente","Overconfidence financeiro — acredita firmemente que sempre conseguira recompor rapidamente o que resgatou"],"ans":0,"exp":"Autossabotagem financeira frequentemente tem raizes em scripts de indignidade. Frases ouvidas na infancia ('dinheiro nao e pra gente', 'rico e ladrao') podem criar padroes que persistem na vida adulta como sabotagem repetitiva de objetivos financeiros."},{"id":37,"tp":"Scripts financeiros","c":"#06b6d4","text":"Um jovem Millennial prioriza experiencias sobre acumulacao patrimonial e tem menor apego a propriedade imobiliaria. O planejador deve:","opts":["Respeitar os valores geracionais e construir um plano que alinhe experiencias com metas de longo prazo adaptadas ao estilo de vida","Convencer o cliente de que a abordagem Millennial e financeiramente irresponsavel e que deve adotar padroes das geracoes anteriores","Ignorar as preferencias geracionais do cliente e focar exclusivamente nos dados tecnicos de acumulacao otima de patrimonio","Classificar o cliente como impulsivo e recomendar perfil mais conservador para protege-lo de suas proprias escolhas"],"ans":0,"exp":"Cada geracao tem relacao distinta com dinheiro e propriedade. O planejamento centrado no cliente exige respeitar e incorporar esses valores. Um plano que ignora os valores do cliente raramente e seguido, independentemente de sua qualidade tecnica."},{"id":38,"tp":"Scripts financeiros","c":"#06b6d4","text":"O 'dinheiro como tabu social' — dificuldade de falar abertamente sobre financas — impacta o planejamento de qual forma?","opts":["Negativamente — impede o planejamento sucessorio, dificulta decisoes em casal e retarda a busca por ajuda profissional","Positivamente — o sigilo protege o patrimonio de influencias externas negativas, inveja e interferencias familiares","Neutro — o comportamento financeiro real e completamente independente da disposicao de conversar sobre dinheiro","Positivamente apenas em familias de alta renda e negativamente apenas em familias de renda mais baixa e limitada"],"ans":0,"exp":"O tabu sobre dinheiro tem consequencias praticas serias: casais nao discutem metas e descobrem incompatibilidades em crises; pais nao conversam sobre heranca com filhos, gerando conflitos sucessorios; pessoas evitam buscar ajuda profissional por vergonha."},{"id":39,"tp":"Scripts financeiros","c":"#06b6d4","text":"O script de 'adoracao do dinheiro' (money worship) inclui, paradoxalmente, qual combinacao de crencas?","opts":["A crenca de que mais dinheiro resolve todos os problemas E que dinheiro deve ser gasto para gerar prazer imediato","A crenca de que dinheiro e importante E a crenca contraditoria de que dinheiro corromperia o carater pessoal","A crenca de que poupar e virtuoso e correto E que investir e arriscado e moralmente questionavel ao mesmo tempo","A crenca de que o dinheiro e algo sujo e perigoso E absolutamente necessario para sobreviver no mundo atual"],"ans":0,"exp":"O script de adoracao do dinheiro contem duas crencas contraditorias: (1) mais dinheiro resolveria todos os problemas; (2) dinheiro existe para ser gasto e desfrutado. Essa tensao cria ciclos de perseguicao por mais dinheiro seguidos de gastos que dissipam o acumulado."},{"id":40,"tp":"Scripts financeiros","c":"#06b6d4","text":"O script de 'Status Financeiro' no Money Script Inventory (MSI) de Klontz caracteriza-se por:","opts":["Atrelar o valor pessoal e social do individuo ao seu patrimonio e ao nivel de consumo que consegue demonstrar publicamente","Crer que dinheiro e algo intrinsecamente negativo e moralmente problematico, levando a evitar pensar sobre financas","Acreditar que mais dinheiro automaticamente traria plena felicidade e resolucao de todos os problemas de vida","Manter as financas em absoluto sigilo e nunca discuti-las com nenhum familiar, amigo ou profissional de confianca"],"ans":0,"exp":"O script de status financeiro associa o valor pessoal ao patrimonio e ao consumo visivel. Isso pode levar a gastos excessivos para 'manter as aparencias', endividamento para financiar um estilo de vida incompativel com a renda e dificuldade de reduzir o padrao de vida mesmo quando necessario."},{"id":41,"tp":"Nudges","c":"#f97316","text":"Qual das seguintes intervencoes NAO e um nudge segundo a definicao de Thaler e Sunstein?","opts":["Proibir resgate de previdencia antes de 60 anos sob pena de tributacao severa e multas contratuais significativas","Posicionar frutas na altura dos olhos em cantina enquanto itens menos saudaveis ficam em posicao menos acessivel","Enviar lembretes automaticos de pagamento de fatura do cartao para evitar multas por atraso desnecessario","Mostrar ao cliente quanto pagou em taxas no ultimo ano antes de ele assinar a renovacao do contrato vigente"],"ans":0,"exp":"Nudges influenciam sem restringir. A tributacao severa por resgate antecipado nao e um nudge — e um desincentivo economico real que altera as opcoes disponiveis. As demais alternativas sao nudges classicos: mudanca de contexto, lembrete oportuno e informacao saliente."},{"id":42,"tp":"Nudges","c":"#f97316","text":"O conceito de 'default inteligente' no planejamento financeiro refere-se especificamente a:","opts":["Definir a opcao padrao do sistema como a escolha mais alinhada ao bem-estar de longo prazo do cliente","Fundos de investimento com gestao passiva que seguem indices de referencia como padrao pre-definido","Software de planejamento financeiro que usa inteligencia artificial para rebalancear carteiras automaticamente","Manter os investimentos do cliente completamente inalterados em qualquer periodo de alta volatilidade de mercado"],"ans":0,"exp":"O default e a opcao que prevalece quando o usuario nao age. Como a maioria aceita o default por inercia, definir o default correto e uma das ferramentas mais poderosas: adesao automatica a previdencia, rebalanceamento automatico, renovacao automatica de seguros."},{"id":43,"tp":"Nudges","c":"#f97316","text":"A estrategia de 'compromisso antecipado' (pre-commitment device) funciona porque:","opts":["Usa a tendencia de valorizar mais o presente para comprometer recursos futuros agora, quando a tentacao e menor","Cria obrigacao legal que impede o cliente de fazer escolhas impulsivas ou prejudiciais no futuro proximo","Aumenta a responsabilidade juridica do planejador financeiro em relacao a todas as decisoes tomadas pelo cliente","Elimina completamente o vies do presente ao tornar as escolhas futuras irreversiveis e definitivas para o cliente"],"ans":0,"exp":"Dispositivos de pre-compromisso permitem que o 'eu presente' proteja o 'eu futuro' de impulsos previsiveis. Funcionam porque o momento do compromisso (quando a tentacao e baixa) e separado do momento da tentacao. Exemplos: debito automatico em investimentos, fundos com carencia."},{"id":44,"tp":"Nudges","c":"#f97316","text":"A estrategia 'Save More Tomorrow' (SMarT) de Thaler e Benartzi neutraliza simultaneamente quais dois vieses?","opts":["Vies do presente (o aumento e adiado para o futuro) e aversao a perda (o aumento e sobre o reajuste salarial, entao a renda nunca diminui)","Aversao ao risco de mercado e o efeito manada em momentos de alta volatilidade dos ativos de risco","Ancoragem no preco historico dos ativos e o efeito de enquadramento na apresentacao de retornos e rentabilidades","Overconfidence nos retornos esperados e o vies de confirmacao sobre os produtos de investimento selecionados"],"ans":0,"exp":"O SMarT e elegante por neutralizar dois vieses ao mesmo tempo: o vies do presente (sacrificio adiado) e a aversao a perda (o aumento ocorre sobre o reajuste salarial — a renda liquida nunca diminui). Resultou em aumento dramatico das taxas de poupanca nos estudos originais."},{"id":45,"tp":"Nudges","c":"#f97316","text":"A 'escassez de atencao' como principio de nudge sugere que:","opts":["Informacoes apresentadas de forma saliente e oportuna tem impacto comportamental muito maior do que as mesmas informacoes enterradas em relatorios","Clientes com menos recursos financeiros disponiveis prestam menos atencao e dedicacao a seus investimentos e decisoes financeiras de longo prazo","Nudges comportamentais so sao plenamente eficazes quando o cliente esta com atencao plena e completamente focado durante toda a reuniao de planejamento","A quantidade de informacao disponibilizada ao cliente deve ser sempre maximizada e ampliada para que ele tome as melhores decisoes financeiras possiveis"],"ans":0,"exp":"A escassez de atencao sustenta a saliencia como nudge: a mesma informacao tem impacto radicalmente diferente dependendo de como e quando e apresentada. Mostrar a taxa real paga antes de renovar um contrato, ou o saldo projetado na aposentadoria antes de um resgate, sao exemplos de nudges por saliencia oportuna."},{"id":46,"tp":"Nudges","c":"#f97316","text":"O conceito de 'arquitetura de escolhas' implica que o planejador financeiro:","opts":["Sempre atua como arquiteto de escolhas — consciente ou nao — e portanto deve faze-lo conscientemente a favor do cliente","Deve apresentar todas as opcoes disponiveis sem nenhuma ordem ou destaque para preservar plena neutralidade","Pode manipular livremente as escolhas do cliente desde que o resultado final seja financeiramente otimo para ele","Deve transferir toda a responsabilidade de escolha para o cliente, sem nenhuma orientacao ou influencia do profissional"],"ans":0,"exp":"Thaler e Sunstein argumentam que qualquer apresentacao de opcoes e uma forma de arquitetura de escolhas — nao existe 'neutralidade'. Portanto, o planejador deve projetar essa arquitetura conscientemente para favorecer as escolhas que servem melhor ao cliente."},{"id":47,"tp":"Bem-estar financeiro","c":"#84cc16","text":"A pesquisa de Killingsworth, Kahneman e Mellers (2023) sobre renda e felicidade concluiu que:","opts":["Para a maioria, a felicidade cresce com a renda alem de US$75.000, mas pessoas ja infelizes por outras razoes nao se tornam mais felizes com renda alta","A felicidade nao tem nenhuma relacao mensuravel com renda acima de US$75.000 para qualquer grupo demografico ou faixa etaria estudada","O efeito da renda sobre a felicidade e completamente explicado pelo status social relativo e comparacao com pares, nao pela renda absoluta","Felicidade e renda tem correlacao negativa acima de US$100.000 anuais em todas as demografias e grupos etarios pesquisados e analisados"],"ans":0,"exp":"A sintese de 2023 reconciliou estudos anteriores. A relacao renda-felicidade e positiva e continua para a maioria, mas com heterogeneidade importante: para pessoas infelizes por razoes alem das financeiras, mais dinheiro nao resolve. Isso reforca a abordagem holistica do planejamento financeiro."},{"id":48,"tp":"Bem-estar financeiro","c":"#84cc16","text":"No modelo de bem-estar financeiro do CFPB, qual e um fator CONTEXTUAL (nao comportamental)?","opts":["Acesso a produtos e servicos financeiros adequados e as condicoes estruturais do mercado de trabalho","Autocontrole financeiro e a capacidade individual de resistir a impulsos de consumo imediato","Conhecimento e habilidades financeiras adquiridas pelo individuo ao longo de sua vida e formacao","Capacidade de planejamento e definicao de metas financeiras de curto, medio e longo prazo"],"ans":0,"exp":"O CFPB distingue fatores que o individuo controla (comportamentais: autocontrole, conhecimento, planejamento) dos contextuais (condicoes do mercado de trabalho, acesso a credito adequado, sistemas de protecao social). O planejador eficaz reconhece barreiras contextuais e adapta as recomendacoes."},{"id":49,"tp":"Bem-estar financeiro","c":"#84cc16","text":"Evidencias sobre divida e bem-estar psicologico mostram que:","opts":["Dividas problematicas estao associadas a maiores indices de ansiedade, depressao e conflitos conjugais, independentemente do valor absoluto","Apenas dividas de alto valor (acima de R$100 mil) afetam significativamente o bem-estar psicologico dos individuos","Dividas de consumo sao psicologicamente neutras desde que as parcelas mensais caibam confortavelmente no orcamento","O impacto psicologico da divida e exclusivamente financeiro, sem nenhuma consequencia mensuravel para saude mental"],"ans":0,"exp":"Pesquisas de saude publica mostram associacoes robustas entre endividamento problematico e deterioracao da saude mental. O estresse financeiro cronico afeta o sono, os relacionamentos e a capacidade de tomar boas decisoes — criando um ciclo vicioso que o planejador deve abordar holisticamente."},{"id":50,"tp":"Bem-estar financeiro","c":"#84cc16","text":"A 'prosperidade subjetiva' (subjective financial wellbeing) e importante para o planejamento porque:","opts":["A percepcao que o cliente tem de sua situacao financeira influencia seu comportamento, saude mental e disposicao de seguir o plano","Substitui completamente as metricas objetivas como patrimonio e renda, sendo o unico indicador verdadeiramente relevante","E facilmente mensuravel por questionarios padronizados e completamente objetivos e universalmente aplicaveis","Tem alta correlacao com o patrimonio liquido, sendo portanto redundante com as metricas objetivas ja coletadas"],"ans":0,"exp":"A prosperidade subjetiva nao e redundante com dados objetivos: clientes com boa situacao tecnica podem sentir-se financeiramente inseguros, e vice-versa. Essa percepcao afeta diretamente comportamentos (propensao a investir, a buscar seguros) e bem-estar geral."},{"id":51,"tp":"Relacionamento","c":"#ec4899","text":"A tecnica de 'perguntas abertas' e valorizada no planejamento financeiro porque:","opts":["Estimula o cliente a elaborar, refletir e revelar informacoes, valores e emocoes que perguntas fechadas nao alcancariam","Permite ao planejador controlar melhor o tempo e a direcao da reuniao de forma mais eficiente e objetiva","Facilita o preenchimento padronizado de questionarios de suitability de forma mais objetiva e regulatoriamente adequada","E obrigatoriamente exigida pela regulacao da CVM para coleta de informacoes de perfil de investidor e suitability"],"ans":0,"exp":"Perguntas abertas ('O que o dinheiro significa para voce?', 'Como se sentiria se nao conseguisse se aposentar quando planejou?') revelam o que questionarios fechados escondem: valores, medos, sonhos, crencas sobre dinheiro. Sao a base da coleta qualitativa essencial para o planejamento centrado no cliente."},{"id":52,"tp":"Relacionamento","c":"#ec4899","text":"A tecnica de 'reflective listening' (escuta reflexiva) no atendimento ao cliente consiste em:","opts":["Repetir ou parafrasear o que o cliente disse para demonstrar compreensao e verificar se o entendimento esta correto","Mostrar ao cliente graficos e tabelas que refletem a performance historica de toda a sua carteira de investimentos","Refletir sobre as decisoes do cliente depois da reuniao para preparar relatorios mais precisos e completos posteriormente","Mostrar ao cliente como suas decisoes financeiras se refletem concretamente em seu orcamento mensal e anual"],"ans":0,"exp":"O reflective listening e central na entrevista motivacional. Ao parafrasear o que o cliente disse, o planejador demonstra escuta ativa, verifica o entendimento e abre espaco para o cliente aprofundar ou corrigir. Isso constroi confianca e revela informacoes mais profundas."},{"id":53,"tp":"Relacionamento","c":"#ec4899","text":"O 'efeito de atribuicao fundamental' no atendimento ao cliente significa que o planejador pode cometer o erro de:","opts":["Atribuir os problemas financeiros do cliente exclusivamente a falhas de carater, ignorando fatores contextuais como crises e desemprego","Atribuir os problemas financeiros do cliente apenas a fatores externos quando na verdade sao completamente comportamentais","Atribuir seus proprios sucessos profissionais a sorte em vez de a propria competencia, experiencia e dedicacao","Atribuir ao cliente a responsabilidade por escolhas de investimento que foram especificamente recomendadas pelo proprio planejador"],"ans":0,"exp":"O fundamental attribution error leva a julgar o comportamento dos outros como reflexo de seu carater. Um planejador que ve o cliente endividado como 'irresponsavel' sem investigar o contexto comete esse erro. A abordagem empatica exige considerar fatores comportamentais E contextuais."},{"id":54,"tp":"Relacionamento","c":"#ec4899","text":"A 'alianca de trabalho' (working alliance) entre planejador e cliente prediz a adesao ao plano porque:","opts":["A qualidade do vinculo colaborativo — acordo sobre objetivos, sobre metodos e a qualidade do relacionamento — prediz os resultados independentemente da tecnica","O contrato formal assinado entre planejador e cliente cria obrigacao legal vinculante que garante o cumprimento de todas as metas estabelecidas","A parceria entre o planejador financeiro e a instituicao financeira parceira garante sempre o acesso aos melhores produtos para cada perfil","O alinhamento tecnico rigoroso entre o plano financeiro elaborado e as expectativas regulatorias dos orgaos competentes garante o resultado otimo"],"ans":0,"exp":"Adaptado da psicologia clinica, o conceito de alianca de trabalho mostra que a qualidade do relacionamento planejador-cliente prediz a adesao ao plano, a abertura para discutir problemas e a disposicao para implementar mudancas dificeis. Um plano tecnicamente perfeito mal implementado e inferior a um bom plano bem implementado."},{"id":55,"tp":"Relacionamento","c":"#ec4899","text":"Quando um casal apresenta visoes opostas sobre objetivos financeiros, o planejador deve:","opts":["Mediar o dialogo, identificar os valores e objetivos de cada conjuge e buscar um plano consensual que respeite ambos","Adotar automaticamente a posicao do conjuge com maior renda, pois e quem tem mais capacidade de influenciar o plano","Elaborar planos financeiros completamente separados para cada conjuge, sem nenhuma integracao ou pontos em comum","Priorizar exclusivamente os objetivos de investimento tecnicos e ignorar completamente os aspectos relacionais do casal"],"ans":0,"exp":"Conflitos sobre dinheiro em casal sao comuns e frequentemente refletem diferencas em valores e scripts financeiros. O planejador deve atuar como mediador, facilitando o dialogo e a construcao de um plano que respeite ambos os conjuges."},{"id":56,"tp":"Etica","c":"#ef4444","text":"O 'conflito de interesses cognitivo' no planejamento financeiro ocorre quando:","opts":["O planejador, sem perceber, favorece recomendacoes que inconscientemente servem a seus proprios interesses, sem intencao consciente","O planejador tem conflito financeiro obvio e declarado, como comissao por venda de produtos especificos de parceiros","O planejador atende simultaneamente clientes com objetivos financeiros completamente conflitantes entre si","O planejador discorda eticamente dos objetivos de vida do cliente e nao consegue representa-lo adequadamente"],"ans":0,"exp":"O conflito cognitivo e mais sutil que o financeiro explicito porque e involuntario. O planejador pode acreditar genuinamente que age no melhor interesse do cliente enquanto vieses inconscientes distorcem suas recomendacoes. Reconhecer essa possibilidade e parte da competencia etica."},{"id":57,"tp":"Etica","c":"#ef4444","text":"O conceito de 'fiduciario comportamental' vai alem do fiduciario regulatorio porque:","opts":["Reconhece que agir no melhor interesse do cliente exige tambem mitigar os vieses que levam o cliente a agir contra seus proprios objetivos","Exige que o planejador gerencie diretamente os recursos do cliente, sem nenhuma intermediacao ou delegacao financeira","E apenas um conceito academico teorico sem nenhuma aplicacao pratica concreta no planejamento financeiro real","Representa uma certificacao adicional que pode ser obtida pelos planejadores depois de ja terem a certificacao CFP"],"ans":0,"exp":"O fiduciario regulatorio estabelece obrigacao de agir no melhor interesse financeiro. O fiduciario comportamental vai alem: quando o cliente, sob influencia de vieses e emocoes, pede acoes que prejudicam seus objetivos (como vender tudo no panico), o planejador tem o dever de ser honesto sobre esses riscos."},{"id":58,"tp":"Etica","c":"#ef4444","text":"A pratica de 'supervisao reflexiva' para planejadores financeiros consiste em:","opts":["Um processo regular de reflexao sobre o proprio atendimento — identificando padroes, vieses pessoais e reacoes emocionais a clientes","Revisar tecnicamente os portfolios dos clientes a cada trimestre para garantir plena aderencia ao plano definido","Submeter todas as recomendacoes financeiras a revisao de um supervisor antes de apresenta-las formalmente ao cliente","Gravar e arquivar as reunioes com clientes para analise posterior de conformidade regulatoria e compliance obrigatorio"],"ans":0,"exp":"A supervisao reflexiva e adaptada da psicologia clinica. Para planejadores envolve refletir: 'Como me sinto em relacao a este cliente? Estou evitando algum assunto dificil? Meus vieses estao influenciando minhas recomendacoes?' Essa pratica aumenta a autoconsciencia e a qualidade do atendimento."},{"id":59,"tp":"Etica","c":"#ef4444","text":"A 'suitability comportamental' vai alem da suitability regulatoria porque:","opts":["Considera nao apenas a tolerancia ao risco declarada, mas tambem o comportamento emocional real do cliente diante de perdas","Exige a aplicacao de questionarios muito mais longos e detalhados antes de qualquer recomendacao ao cliente","Substitui completamente a analise tecnica por uma avaliacao psicologica exclusiva do perfil emocional do cliente","E exigida apenas para clientes com patrimonio acima de R$1 milhao pelos orgaos reguladores do mercado financeiro"],"ans":0,"exp":"A suitability regulatoria captura a tolerancia ao risco em condicoes neutras, mas o comportamento real em momentos de crise frequentemente difere do perfil declarado. A suitability comportamental busca antecipar como o cliente se comportara emocionalmente sob estresse de mercado."},{"id":60,"tp":"Etica","c":"#ef4444","text":"Sobre os limites eticos do uso de nudges no aconselhamento financeiro, e correto afirmar que:","opts":["O uso de nudges pode ser antietico quando manipula o cliente em beneficio do planejador ou da instituicao, em vez do proprio cliente","Nudges sao sempre automaticamente eticos, pois por definicao preservam integralmente a liberdade de escolha do cliente","Nudges so sao eticos quando previamente aprovados pelos orgaos reguladores competentes como a CVM e o Banco Central","O planejador nunca deve usar nudges, pois qualquer forma de influencia interfere inaceitavelmente na autonomia do cliente"],"ans":0,"exp":"Nudges preservam a liberdade de escolha, mas isso nao os torna automaticamente eticos. Quando usados para direcionar o cliente a produtos que beneficiam o planejador, tornam-se manipulacao. O padrao etico exige que o nudge esteja alinhado ao bem-estar do cliente e seja transparente."},{"id":61,"tp":"Motivacao e mudanca","c":"#a78bfa","text":"Os quatro principios da entrevista motivacional (Parceria, Aceitacao, Compaixao, Evocacao) implicam que o planejador deve:","opts":["Trabalhar em parceria, aceitar a autonomia do cliente, demonstrar compaixao genuina e evocar a motivacao interna do cliente","Estabelecer metas financeiras especificas para o cliente antes da primeira reuniao de diagnostico e conhecimento","Usar dados e argumentos racionais para convencer o cliente da melhor escolha financeira tecnicamente fundamentada","Aceitar incondicionalmente todas as decisoes financeiras do cliente, mesmo as claramente prejudiciais ao seu bem-estar"],"ans":0,"exp":"Os quatro principios da IM garantem que a mudanca comportamental parta do cliente. Parceria: colaborador, nao especialista autoritario. Aceitacao: respeito pela autonomia. Compaixao: priorizar o bem-estar do cliente. Evocacao: evocar motivacao ja presente — nao criar artificialmente."},{"id":62,"tp":"Motivacao e mudanca","c":"#a78bfa","text":"Para um cliente em estagio de 'contemplacao' (reconhece o problema mas ainda nao agiu), a intervencao mais eficaz e:","opts":["Explorar a ambivalencia ('quero mudar, mas...'), fortalecer os pros da mudanca e abordar barreiras — sem pressionar para acao imediata","Apresentar um plano financeiro detalhado com metas e prazos especificos para implementacao e execucao imediata","Ignorar completamente a ambivalencia do cliente e focar diretamente nos aspectos tecnicos do planejamento financeiro","Encaminhar o cliente para terapia psicologica antes de iniciar qualquer tipo de planejamento financeiro formal"],"ans":0,"exp":"O modelo transteorico identifica: Pre-contemplacao, Contemplacao, Preparacao, Acao, Manutencao. Na contemplacao, pressionar para acao prematura aumenta a resistencia. Explorar a ambivalencia com empatia e o caminho mais eficaz — nao o plano tecnico imediato."},{"id":63,"tp":"Motivacao e mudanca","c":"#a78bfa","text":"Em situacoes de viuvez recente, o planejador deve EVITAR especificamente:","opts":["Pressionar o cliente a reorganizar imediatamente toda a carteira e o planejamento sucessorio enquanto esta emocionalmente abalado","Dar tempo adequado ao cliente para processar o luto antes de tomar decisoes financeiras irreversiveis e complexas","Identificar as urgencias financeiras imediatas separando-as claramente das decisoes de longo prazo nao urgentes","Oferecer suporte empatico e, se necessario, envolver outros familiares ou profissionais de saude mental no processo"],"ans":0,"exp":"Decisoes financeiras tomadas nos primeiros meses apos viuvez sao frequentemente arrependidas. O planejador etico deve: priorizar o bem-estar emocional, cuidar apenas das urgencias imediatas, criar um periodo de estabilizacao antes de grandes decisoes e coordenar com outros profissionais quando necessario."},{"id":64,"tp":"Motivacao e mudanca","c":"#a78bfa","text":"O comprometimento publico (public commitment) aumenta a probabilidade de o cliente seguir o plano financeiro porque:","opts":["Ativa o desejo de consistencia entre o que se diz e o que se faz, reduzindo a dissonancia cognitiva entre o compromisso e o comportamento","Cria uma obrigacao legal formal entre cliente e planejador que garante juridicamente o cumprimento das metas","Aumenta o retorno esperado da carteira por meio da pressao positiva exercida pelo grupo social de referencia do cliente","Elimina completamente o vies do presente ao tornar o futuro imediato e altamente relevante emocionalmente para o cliente"],"ans":0,"exp":"Pesquisas de Cialdini mostram que as pessoas tem forte impulso de agir de forma consistente com compromissos que fizeram publicamente. Quando o cliente verbaliza suas metas para o planejador (ou para familiares), a dissonancia entre o compromisso assumido e o comportamento desviante funciona como freio natural."},{"id":65,"tp":"Motivacao e mudanca","c":"#a78bfa","text":"Em qual situacao o planejador financeiro estaria EXTRAPOLANDO sua funcao, exigindo encaminhamento a saude mental?","opts":["Identificar que o cliente usa gastos compulsivos como enfrentamento de ansiedade severa — sintoma de transtorno nao tratado","Explorar as crencas e scripts financeiros do cliente herdados da familia de origem ao longo das reunioes de diagnostico","Validar as emocoes do cliente durante uma crise de mercado e oferecer suporte empatico e contextualizacao do plano","Usar tecnicas de escuta ativa e entrevista motivacional para ajudar o cliente a identificar suas metas e valores"],"ans":0,"exp":"O planejador esta equipado para trabalhar crencas sobre dinheiro, emocoes relacionadas a financas e motivacao para mudanca. Mas quando os sintomas apontam para um transtorno mental nao tratado (ansiedade generalizada, depressao, TOC, jogo patologico), o encaminhamento a profissional de saude mental e necessario e etico."},{"id":66,"tp":"Aplicacao integrada","c":"#fb7185","text":"Uma cliente de 58 anos, esgotada profissionalmente, quer aposentar ja mas teme ficar sem dinheiro. Tem recursos suficientes mas com margem menor. Qual abordagem integra melhor os aspectos tecnicos e psicologicos?","opts":["Validar o esgotamento e o medo, apresentar cenarios com trade-offs claros e co-construir a decisao alinhada aos seus valores e tolerancia ao risco","Dizer imediatamente que ela pode se aposentar sem restricoes, pois os recursos sao suficientes, e apresentar detalhadamente o plano tecnico elaborado","Dizer que nao pode se aposentar ainda em hipotese alguma e propor que trabalhe mais tres anos completos para atingir a margem de seguranca ideal","Encaminhar a cliente para terapia psicologica especializada antes de retomar qualquer tipo de planejamento financeiro formal com ela"],"ans":0,"exp":"O caso integra: burnout (emocional), recursos suficientes mas com margem menor (tecnico), medo de outliving assets (psicologico), qualidade de vida vs. seguranca (valores). A abordagem ideal valida emocionalmente, apresenta cenarios concretos com trade-offs e envolve a cliente na decisao."},{"id":67,"tp":"Aplicacao integrada","c":"#fb7185","text":"Um jovem de 28 anos quer 'investir melhor', mas tem R$40 mil em dividas de cartao a 18% ao mes. O principal desafio do planejador e:","opts":["Identificar o vies que faz o cliente nao perceber que pagar divida a 18% ao mes e matematicamente superior a qualquer investimento","Calcular a melhor carteira de renda variavel para maximizar o retorno dos aportes mensais disponiveis do cliente","Recusar o atendimento ate que o cliente quite todas as dividas e tenha situacao financeira minimamente organizada","Focar exclusivamente no financiamento do carro novo, pois e a decisao mais urgente e com maior impacto imediato"],"ans":0,"exp":"O cliente apresenta contabilidade mental (trata 'investimentos' e 'dividas' como categorias separadas) e possivelmente vies do presente. O planejador deve apresentar a matematica sem julgamento moral: 'Quitar essa divida e equivalente a um investimento com retorno garantido de 18% ao mes.'"},{"id":68,"tp":"Aplicacao integrada","c":"#fb7185","text":"Um cliente recem-divorciado busca reorganizar suas financas. Qual dimensao psicologica o planejador deve considerar prioritariamente?","opts":["Reconhecer que o cliente pode estar em luto e que o processo emocional afeta sua capacidade de tomar boas decisoes financeiras agora","Pressionar pela resolucao rapida dos aspectos tecnicos para minimizar as perdas financeiras durante o processo de divorcio","Recomendar imediatamente um portfolio mais conservador, pois clientes divorciados tem sempre menor tolerancia ao risco","Evitar tocar em qualquer assunto emocional para manter o profissionalismo e a objetividade tecnica da relacao"],"ans":0,"exp":"Transicoes de vida (divorcio, viuvez, aposentadoria, demissao) sao periodos de alta vulnerabilidade emocional que comprometem a capacidade decisoria. O planejador deve reconhecer o estado emocional do cliente, priorizar acoes urgentes e respeitar o tempo de processamento emocional."},{"id":69,"tp":"Aplicacao integrada","c":"#fb7185","text":"Qual sequencia correta o planejador deve seguir ao identificar um cliente com script de 'status financeiro' que se endivida para manter aparencias?","opts":["Explorar empaticamente a origem do script, mostrar as consequencias objetivas do padrao atual e co-construir alternativas que preservem a identidade","Confrontar diretamente o cliente sobre o comportamento irresponsavel para gerar consciencia e urgencia imediata do problema","Apresentar imediatamente um plano detalhado de corte de gastos para equilibrar rapidamente o orcamento e eliminar a divida","Encaminhar para terapia psicologica pois o problema e exclusivamente emocional e esta completamente fora do escopo do planejamento"],"ans":0,"exp":"Scripts financeiros nao se mudam por confrontacao direta — isso tende a aumentar a resistencia. A abordagem empatica (explorar a origem), informativa (mostrar consequencias objetivas) e colaborativa (co-construir alternativas) e muito mais eficaz e etica."},{"id":70,"tp":"Aplicacao integrada","c":"#fb7185","text":"Um investidor vende vencedores rapidamente, mantem perdedores por anos, atribui ganhos a habilidade e perdas ao mercado, e busca apenas noticias positivas sobre suas posicoes. Quantos vieses distintos estao presentes?","opts":["Quatro: efeito disposicao, self-attribution bias, vies de confirmacao e overconfidence como base de todos os demais","Apenas um: o overconfidence explica todos esses comportamentos de forma unificada e suficiente sem necessidade de outros","Dois: aversao a perda e vies de confirmacao, sendo os demais apenas manifestacoes secundarias desses dois fundamentais","Tres: efeito disposicao, vies de confirmacao e efeito manada sao os unicos determinantes principais do padrao observado"],"ans":0,"exp":"O cenario apresenta: (1) Efeito disposicao — vende vencedores cedo e mantem perdedores; (2) Self-attribution bias — atribui ganhos a habilidade e perdas ao mercado; (3) Vies de confirmacao — busca apenas noticias positivas; (4) Overconfidence — base que sustenta os outros tres. O planejador deve abordar cada vies especificamente."},{"id":71,"tp":"Fundamentos","c":"#3b82f6","text":"O modelo do 'homo economicus' e criticado pelas financas comportamentais principalmente porque:","opts":["Pressupoe racionalidade plena, preferencias estaveis e maximizacao da utilidade — premissas que experimentos empiricos sistematicamente refutam","Ignora completamente o papel dos mercados financeiros organizados nas decisoes individuais e familiares de poupanca e investimento","Superestima de forma sistematica e exagerada o impacto das emocoes e dos vieses nas decisoes financeiras de longo prazo dos individuos","Assume que todos os individuos tem acesso perfeitamente igual a informacao atualizada, tecnologia e ferramentas no mercado financeiro"],"ans":0,"exp":"O homo economicus e um agente hipoteticamente racional, mas Kahneman e Tversky demonstraram experimentalmente que decisoes reais violam sistematicamente os axiomas da teoria da utilidade esperada. Essa evidencia empirica e o fundamento das financas comportamentais como campo cientifico."},{"id":72,"tp":"Vieses cognitivos","c":"#10b981","text":"O 'vies de ancoragem' no planejamento financeiro ocorre quando o cliente:","opts":["Supervaloriza a primeira informacao recebida — como o preco de compra original de um ativo — ao tomar decisoes subsequentes","Busca exclusivamente informacoes que confirmem sua visao inicial sobre determinado produto ou setor financeiro","Segue o comportamento de outros investidores do mercado sem realizar analise independente e critica dos fundamentos","Prefere manter a carteira atual sem mudancas por medo de errar em qualquer nova decisao ou investimento"],"ans":0,"exp":"A ancoragem faz o investidor usar o preco de compra (ou qualquer outra ancora) como referencia inapropriada para decisoes futuras. O planejador deve ajudar o cliente a avaliar o ativo pelo seu valor atual e perspectivas, nao pelo preco historico de aquisicao."},{"id":73,"tp":"Vieses cognitivos","c":"#10b981","text":"O 'vies de disponibilidade' leva o investidor a qual tipo especifico de erro?","opts":["Superestimar a probabilidade de eventos facilmente recordados por serem recentes, intensos ou amplamente noticiados","Subestimar eventos raros e improvisiveis por nao ter exemplos imediatamente disponiveis na memoria recente","Ignorar completamente eventos que ocorreram ha mais de um ano por considera-los nao mais relevantes para o futuro","Preferir investimentos com historico de retorno de pelo menos dez anos documentado, auditado e acessivel"],"ans":0,"exp":"O vies de disponibilidade faz com que eventos facilmente recordaveis — como uma queda recente de mercado amplamente noticiada — sejam superestimados em termos de probabilidade. O cerebro usa a facilidade de lembrar como proxy equivocado de frequencia real."},{"id":74,"tp":"Vieses cognitivos","c":"#10b981","text":"O 'vies de status quo' no planejamento financeiro manifesta-se quando o cliente:","opts":["Resiste a mudancas na carteira mesmo quando ha evidencia clara de que a mudanca seria benifica ao perfil e objetivos","Prefere sempre manter o nivel maximo de risco possivel na carteira para maximizar os retornos de longo prazo","Busca constantemente novas oportunidades de investimento sem primeiro analisar adequadamente o portfolio existente","Questiona cuidadosamente cada recomendacao do planejador antes de implementar qualquer alteracao na estrategia"],"ans":0,"exp":"O vies do status quo e a resistencia a mudancas por medo do desconhecido ou por inercia. O custo emocional de agir parece maior do que o custo de manter a situacao atual, mesmo que a inacao seja objetivamente prejudicial aos objetivos do cliente."},{"id":75,"tp":"Vieses cognitivos","c":"#10b981","text":"O fenomeno do 'overtrading' frequentemente observado em investidores com overconfidence resulta em:","opts":["Maiores custos de transacao e piores retornos liquidos, pois a negociacao frequente gera friccao sem adicionar alfa suficiente","Retornos superiores por melhor aproveitamento das oportunidades de curto prazo identificadas pelo investidor confiante","Carteiras mais diversificadas e robustas por expor o investidor a um maior numero de ativos e setores distintos","Reducao significativa do risco total da carteira por meio de rebalanceamentos mais frequentes, precisos e oportunos"],"ans":0,"exp":"Pesquisas de Barber e Odean (2000) demonstraram que investidores que negociam mais frequentemente obtem retornos significativamente piores. O excesso de confianca gera atividade excessiva que erode os retornos por custos de transacao e decisoes subotimas de timing."},{"id":76,"tp":"Teoria da Perspectiva","c":"#8b5cf6","text":"A 'ponderacao de probabilidades' na Teoria da Perspectiva mostra que as pessoas tendem a:","opts":["Superestimar probabilidades muito baixas (como ganhar na loteria) e subestimar probabilidades moderadas e altas","Avaliar todas as probabilidades de forma linear e proporcional ao seu valor matematico objetivo e real","Ignorar eventos com probabilidade abaixo de 5% por considera-los improvisivelmente raros e sem relevancia pratica","Tomar decisoes exclusivamente com base nas probabilidades objetivas, sem nenhuma distorcao perceptual ou emocional"],"ans":0,"exp":"A funcao de ponderacao de probabilidades da Teoria da Perspectiva e nao-linear: superestimamos eventos raros (o que explica a popularidade de loterias e seguros de baixa probabilidade) e subestimamos eventos de probabilidade media-alta. Isso tem implicacoes diretas para decisoes de seguro e gestao de riscos."},{"id":77,"tp":"Teoria da Perspectiva","c":"#8b5cf6","text":"O conceito de 'hedonic adaptation' (adaptacao hedonica) e relevante para o planejamento financeiro porque:","opts":["Mostra que o bem-estar proporcionado por conquistas financeiras tende a ser temporario, pois as pessoas se adaptam ao novo nivel e retornam ao nivel basal","Demonstra que ganhos financeiros substanciais sempre geram bem-estar permanente e completamente duradouro ao longo de toda a vida adulta","Indica que o investidor nao sente mais absolutamente nenhuma emocao financeira apos viver experiencias de ganho ou perda muito intensas","Sugere que clientes com maior patrimonio acumulado sao automaticamente mais felizes por terem superado definitivamente a adaptacao hedonica"],"ans":0,"exp":"A adaptacao hedonica (Brickman e Campbell) explica por que a 'corrida dos ratos' financeira nao gera felicidade duradoura. Conquistas financeiras geram prazer, mas o individuo se adapta ao novo nivel. O planejador deve ajudar o cliente a definir objetivos alem de numeros — conectados a experiencias e relacionamentos."},{"id":78,"tp":"Emocoes e decisao","c":"#f59e0b","text":"O 'vies de arrependimento antecipado' (anticipated regret) difere da aversao a perda principalmente porque:","opts":["Envolve uma comparacao contrafactual — 'o que poderia ter sido se eu tivesse agido diferente' — enquanto a aversao a perda foca na magnitude absoluta da perda","A aversao a perda e mais intensa do que o arrependimento antecipado em todos os cenarios e contextos estudados na literatura","O arrependimento antecipado afeta exclusivamente decisoes de compra de seguros, nao sendo relevante para decisoes de investimento","Sao sinonimos perfeitos na literatura de financas comportamentais, sem nenhuma distincao pratica ou teorica relevante entre eles"],"ans":0,"exp":"O arrependimento antecipado e fundamentalmente comparativo e contrafactual: o investidor sofre pela diferenca entre o que ocorreu e o que poderia ter ocorrido. A aversao a perda foca na magnitude absoluta da perda. Ambos coexistem e se reforcam mutuamente nas decisoes financeiras reais."},{"id":79,"tp":"Emocoes e decisao","c":"#f59e0b","text":"Em momentos de bom humor, pesquisas mostram que a tendencia do investidor e:","opts":["Aumentar a disposicao para assumir riscos e subestimar probabilidades de eventos negativos no futuro proximo","Aumentar consistentemente a aversao ao risco e buscar mais protecao e seguranca para a carteira existente","Manter a tolerancia ao risco exatamente no nivel do perfil declarado no questionario formal de suitability","Reduzir a atividade de negociacao por maior satisfacao e conforto com o status quo da carteira atual"],"ans":0,"exp":"Estados de animo positivos tendem a aumentar o otimismo e a disposicao para assumir riscos, enquanto estados negativos aumentam a cautela. Isso reforca a importancia do planejador nao basear decisoes importantes apenas em reunioes pontuais — o humor do dia pode distorcer o perfil real do cliente."},{"id":80,"tp":"Emocoes e decisao","c":"#f59e0b","text":"O conceito de 'ansiedade financeira' no contexto do planejamento comportamental refere-se a:","opts":["Estado emocional cronico de preocupacao com financas que pode comprometer qualidade de vida e sono, mesmo em clientes tecnicamente bem estruturados","Reacao normal e completamente temporaria a eventos financeiros negativos especificos como demissao ou queda de mercado","Transtorno clinico exclusivo que deve ser tratado somente por psicologos e psiquiatras especializados em financas","Preocupacao excessiva exclusivamente com dividas de alto valor, tipicamente acima de R$100 mil em valor total"],"ans":0,"exp":"A ansiedade financeira pode afetar clientes independentemente da situacao objetiva. Clientes com script de vigilancia financeira frequentemente experimentam ansiedade cronica mesmo com patrimonio solido. O planejador que identifica esse padrao deve aborda-lo com empatia antes de qualquer intervencao tecnica."},{"id":81,"tp":"Scripts financeiros","c":"#06b6d4","text":"Um cliente nunca fala sobre financas, guarda extratos sem abrir e evita qualquer conversa sobre investimentos com a familia. Segundo o MSI de Klontz, o script mais provavel e:","opts":["Vigilancia financeira — crenca de que financas devem ser mantidas em absoluto sigilo e nunca discutidas com ninguem","Adoracao do dinheiro — acredita que dinheiro deve ser acumulado silenciosamente e sem nenhuma ostentacao externa","Evitacao financeira — sente ansiedade e vergonha profunda ao lidar com qualquer assunto ou decisao financeira","Status financeiro — prefere nao revelar sua situacao real para nao ser julgado negativamente pelos outros"],"ans":0,"exp":"A vigilancia financeira e caracterizada pelo sigilo excessivo sobre financas e pela crenca de que dinheiro nao deve ser discutido abertamente. Embora inclua comportamentos prudentes como poupar, o sigilo extremo pode dificultar o planejamento familiar e a busca por ajuda profissional qualificada."},{"id":82,"tp":"Scripts financeiros","c":"#06b6d4","text":"O conceito de 'trauma financeiro' refere-se a:","opts":["Experiencias de perda financeira severa — falencia, pobreza extrema, roubos — que deixam marcas psicologicas duradouras e moldam comportamentos defensivos","Qualquer experiencia negativa relacionada a dinheiro ao longo da vida adulta, independentemente de sua intensidade ou magnitude emocional","Exclusivamente a experiencia formal de falencia de uma empresa ou pessoa fisica devidamente declarada e registrada em juizo competente","O impacto psicologico de grandes perdas no mercado financeiro superiores a cinquenta por cento do patrimonio total do investidor"],"ans":0,"exp":"Traumas financeiros sao experiencias que excedem a capacidade de adaptacao e deixam marcas psicologicas persistentes. Um cliente que cresceu em pobreza extrema, viveu uma falencia familiar ou foi vitima de fraude pode desenvolver padroes de hipercautela, evitacao ou autossabotagem persistentes."},{"id":83,"tp":"Scripts financeiros","c":"#06b6d4","text":"A educacao financeira tradicional, focada apenas em conteudo tecnico, frequentemente falha porque:","opts":["Ignora os scripts financeiros, crencas e padroes comportamentais que determinam se o individuo realmente aplica o conhecimento","E muito complexa e tecnica para a maioria das pessoas absorver sem formacao previa em matematica avancada","Nao considera as diferencas entre os produtos financeiros disponiveis nos diferentes momentos e fases da vida","E baseada em modelos internacionais que nao refletem adequadamente a realidade e especificidades do mercado brasileiro"],"ans":0,"exp":"O 'knowledge-intention-behavior gap' mostra que saber o que e certo financeiramente nao e suficiente para agir de forma correta. Scripts, emocoes e vieses determinam o comportamento real. O planejamento comportamental integra conteudo tecnico COM trabalho nas crencas e padroes que bloqueiam a aplicacao do conhecimento."},{"id":84,"tp":"Scripts financeiros","c":"#06b6d4","text":"Um cliente de 40 anos tem excelente renda, mas nunca consegue acumular patrimonio, sempre encontrando uma 'emergencia' para gastar. O pai dizia: 'Rico e ladrao.' O diagnostico mais provavel e:","opts":["Script de evitacao combinado com autossabotagem — crenca inconsciente de que acumular riqueza seria moralmente errado ou perigoso","Vies do presente particularmente intenso combinado com ausencia total de disciplina e autocontrole financeiro","Overconfidence — acredita que sempre conseguira gerar renda suficiente no futuro para compensar os gastos atuais","Efeito dotacao invertido — nao sente nenhum apego ou vinculo emoci
