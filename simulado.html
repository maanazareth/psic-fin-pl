<script>
const QS=[
  {id:1,tp:"Fundamentos",c:"#3b82f6",text:"Richard Thaler, Prêmio Nobel de 2017, é mais associado à contribuição de:",opts:["Desenvolver a Teoria da Perspectiva com Kahneman","Criar o conceito de contabilidade mental e popularizar a economia comportamental com aplicações práticas","Propor o conceito de mercados eficientes em versão comportamental","Desenvolver o modelo CAPM ajustado por fatores comportamentais"],ans:1,exp:"Thaler é o grande nome da economia comportamental aplicada. Suas contribuições incluem a contabilidade mental, o efeito dotação, o conceito de nudge (com Sunstein) e o programa SMarT."},
  {id:2,tp:"Fundamentos",c:"#3b82f6",text:"O conceito de 'racionalidade limitada' (bounded rationality), proposto por Herbert Simon, sugere que os indivíduos:",opts:["São completamente irracionais","Tomam decisões que satisfazem um critério mínimo aceitável ('satisficing') em vez de otimizar, devido a limitações cognitivas","São racionais apenas em decisões de alto valor","Tomam decisões mais racionais quando têm mais opções disponíveis"],ans:1,exp:"Simon cunhou 'bounded rationality': agentes decidem com informação incompleta e capacidade cognitiva finita. Em vez de otimizar, buscam soluções 'suficientemente boas' (satisficing). Base das finanças comportamentais."},
  {id:3,tp:"Fundamentos",c:"#3b82f6",text:"A distinção entre 'Econs' e 'Humanos' usada por Thaler e Sunstein refere-se a:",opts:["Economistas profissionais versus leigos em finanças","O agente econômico racional idealizado versus o ser humano real, com vieses e racionalidade limitada","Investidores institucionais versus investidores individuais","Profissionais quantitativos versus analistas qualitativos"],ans:1,exp:"'Econs' são perfeitamente racionais — agentes hipotéticos da teoria clássica. 'Humanos' são como realmente somos: impulsivos, influenciáveis pelo contexto e propensos a vieses. O planejamento eficaz deve ser desenhado para humanos."},
  {id:4,tp:"Fundamentos",c:"#3b82f6",text:"O campo das finanças comportamentais é interdisciplinar porque integra:",opts:["Apenas economia e matemática","Economia, psicologia cognitiva, neurociência, sociologia e antropologia","Exclusivamente psicologia clínica e psicanálise","Direito financeiro, contabilidade e psicologia organizacional"],ans:1,exp:"Finanças comportamentais integram: psicologia cognitiva (vieses e heurísticas), neurociência (bases cerebrais da decisão), sociologia (influências sociais) e antropologia (crenças culturais sobre dinheiro)."},
  {id:5,tp:"Fundamentos",c:"#3b82f6",text:"O princípio do 'paternalismo libertário', base filosófica dos nudges, sustenta que:",opts:["O Estado deve determinar as melhores escolhas para os cidadãos","É possível influenciar comportamentos em direção a melhores resultados sem eliminar a liberdade de escolha","A liberdade de escolha deve ser absoluta e qualquer influência é antiética","Incentivos financeiros são sempre mais eficazes do que nudges"],ans:1,exp:"'Libertarian paternalism': paternalista porque orienta para melhores escolhas; libertário porque preserva a liberdade de escolher diferente. O design de opções sempre influencia — melhor fazê-lo conscientemente."},
  {id:6,tp:"Vieses cognitivos",c:"#10b981",text:"O 'efeito dotação' (endowment effect), demonstrado por Thaler, mostra que:",opts:["Investidores superalocam em ativos de maior dividend yield","As pessoas atribuem mais valor a um objeto pelo simples fato de possuí-lo","Carteiras herdadas têm retornos superiores","Clientes valorizam mais produtos recomendados pelo planejador"],ans:1,exp:"O efeito dotação cria apego irracional pela posse. Explica a relutância em vender ações herdadas inadequadas ao perfil ou reorganizar carteiras que fazem sentido técnico."},
  {id:7,tp:"Vieses cognitivos",c:"#10b981",text:"O 'viés de retrospectiva' (hindsight bias) é perigoso porque:",opts:["Faz subestimar retornos futuros com base em retornos passados","Leva a acreditar que eventos passados eram previsíveis, criando falsa capacidade preditiva e comprometendo a avaliação honesta de decisões anteriores","Faz o cliente superestimar perdas passadas","É o único viés que afeta exclusivamente profissionais"],ans:1,exp:"O hindsight bias ('eu sabia que isso ia acontecer') impede o aprendizado genuíno com erros. Decisões devem ser avaliadas com base nas informações disponíveis no momento — não com benefício do retrospecto."},
  {id:8,tp:"Vieses cognitivos",c:"#10b981",text:"A 'paralisia por excesso de opções' (choice overload) implica que:",opts:["Clientes com mais opções tomam decisões mais qualificadas","Oferecer muitas opções pode levar à procrastinação e à inação — como a queda na adesão a planos de previdência com muitos fundos","Clientes sempre preferem o máximo de opções","O paradoxo da escolha afeta apenas decisões de consumo"],ans:1,exp:"Em planos de previdência, a taxa de adesão cai à medida que o número de fundos aumenta. O planejador pode usar arquitetura de escolhas para reduzir a complexidade, apresentando no máximo 3-5 opções curadas ao cliente."},
  {id:9,tp:"Vieses cognitivos",c:"#10b981",text:"O 'viés de projeção' (projection bias) leva o investidor a:",opts:["Projetar retornos futuros apenas com base em retornos passados recentes","Assumir que suas preferências e tolerância ao risco atuais permanecerão iguais no futuro, subestimando como elas mudarão","Atribuir ao mercado suas próprias expectativas","Superestimar crescimento de investimentos em setores que pessoalmente conhece"],ans:1,exp:"O projection bias faz o investidor montar a carteira assumindo que vai sentir no futuro o que sente hoje. Quem monta a carteira num momento de bonança subestima como reagirá emocionalmente a uma queda de 30%."},
  {id:10,tp:"Vieses cognitivos",c:"#10b981",text:"O fenômeno do 'money illusion' (ilusão monetária) descreve a tendência de:",opts:["Confundir valores em moedas estrangeiras","Pensar em termos nominais em vez de reais, ignorando o efeito da inflação — como celebrar aumento salarial de 5% quando a inflação é 8%","Superestimar o valor de dinheiro físico em relação a saldos digitais","Subestimar o custo de oportunidade de manter dinheiro parado"],ans:1,exp:"A ilusão monetária leva a decisões equivocadas por desconsiderar a inflação. Exemplos: celebrar 'ganho' de 8% ao ano quando a inflação é 9%, ou sentir que o salário aumentou quando o reajuste foi abaixo da inflação."},
  {id:11,tp:"Vieses cognitivos",c:"#10b981",text:"O 'base rate neglect' (negligência da taxa base) ocorre quando:",opts:["O investidor ignora completamente dados históricos","O investidor dá peso excessivo a informações específicas e vividas, ignorando probabilidades estatísticas gerais — como ignorar que 90% das startups fracassam ao se empolgar com uma história específica","O investidor aplica a mesma taxa histórica para projetar resultados futuros","O investidor negligencia a taxa de administração de fundos"],ans:1,exp:"A negligência da taxa base é manifestação do viés de representatividade. O caso específico e vívido domina a informação estatística geral. O planejador deve ajudar o cliente a calibrar probabilidades reais, não apenas histórias."},
  {id:12,tp:"Vieses cognitivos",c:"#10b981",text:"O 'excesso de otimismo' se diferencia do overconfidence porque:",opts:["São sinônimos","O excesso de otimismo é a crença de que eventos positivos são mais prováveis para si do que para outros; o overconfidence é a superestimação da própria competência em tarefas específicas","O excesso de otimismo é exclusivo de novatos","O excesso de otimismo leva à inação; o overconfidence leva à negociação excessiva"],ans:1,exp:"São vieses relacionados mas distintos. O optimism bias: 'coisas ruins acontecem com os outros, não comigo'. O overconfidence: superestimação da própria habilidade em tarefas específicas. Ambos podem coexistir e têm implicações distintas para o planejamento."},
  {id:13,tp:"Vieses cognitivos",c:"#10b981",text:"O 'viés de afeto' (affect heuristic) ocorre quando:",opts:["O investidor decide apenas por análise quantitativa","A reação emocional a uma empresa influencia a avaliação de risco e retorno — quem gosta percebe alto retorno E baixo risco simultaneamente, violando a relação risco-retorno","Emoções positivas sempre levam a melhores decisões","O planejador usa emoções estrategicamente para vender produtos"],ans:1,exp:"A affect heuristic cria inconsistência lógica: quem ama uma marca tende a percebê-la como de alto retorno e baixo risco ao mesmo tempo. Investidores sobrealocam em ativos de que 'gostam', sem análise objetiva."},
  {id:14,tp:"Vieses cognitivos",c:"#10b981",text:"A 'fadiga de decisão' é relevante para o planejamento porque:",opts:["Clientes com mais dinheiro tomam decisões piores","A qualidade das decisões se deteriora ao longo de reuniões longas, tornando o cliente mais impulsivo ou avesso ao risco por exaustão","Apenas planejadores estão sujeitos à fadiga de decisão","Clientes mais jovens sofrem mais do que os mais velhos"],ans:1,exp:"Decidir bem é um recurso que se esgota. Reuniões muito longas levam o cliente a deferir decisões ou fazer escolhas impulsivas. Planejadores devem abordar as decisões mais importantes no início das reuniões."},
  {id:15,tp:"Vieses cognitivos",c:"#10b981",text:"Um investidor compra ações de empresa que 'parece sólida', sem analisar fundamentos. Depois que a empresa vai bem, diz: 'Eu sempre soube que seria assim.' Quais dois vieses estão presentes?",opts:["Efeito manada e ancoragem","Representatividade (julgou pela aparência) e hindsight bias (acredita que sempre soube)","Overconfidence e viés de confirmação","Disponibilidade e efeito dotação"],ans:1,exp:"Representatividade: julgou a empresa por estereótipo superficial. Hindsight bias: após o bom resultado, reescreve a história como se sempre tivesse sido óbvio. Esses dois vieses frequentemente coexistem e se reforçam."},
  {id:16,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"Na Teoria da Perspectiva, o 'ponto de referência' é central porque:",opts:["Define o valor absoluto de um ativo com base no preço de mercado justo","Determina se uma situação é percebida como ganho ou perda — e essa percepção, não o valor absoluto, orienta a decisão","Estabelece o benchmark de retorno mínimo exigido","Representa o valor patrimonial inicial antes de qualquer investimento"],ans:1,exp:"Tudo é relativo ao ponto de referência. O mesmo resultado pode ser percebido como ganho ou perda dependendo do referencial adotado. O preço de compra, o valor máximo já atingido ou uma expectativa podem funcionar como referência."},
  {id:17,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"A função valor da Teoria da Perspectiva é côncava para ganhos e convexa para perdas. Isso implica que:",opts:["O investidor é sempre avesso ao risco","Para ganhos, tende à aversão ao risco (prefere ganho certo menor); para perdas, tende à propensão ao risco (prefere arriscar a aceitar perda certa)","Perdas e ganhos são percebidos com a mesma intensidade","O investidor é neutro ao risco para pequenos valores"],ans:1,exp:"A assimetria da função valor é central na Teoria da Perspectiva. Para ganhos: preferimos R$500 garantidos a 50% de chance de R$1.000. Para perdas: preferimos arriscar 50% de chance de perder R$1.000 a aceitar perder R$500 com certeza. Isso explica o efeito disposição."},
  {id:18,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"O 'efeito certeza' (certainty effect) mostra que as pessoas:",opts:["Sempre preferem a opção de maior retorno esperado","Supervalorizam resultados certos em relação a resultados prováveis, mesmo quando a matemática favorece a aposta probabilística","São indiferentes entre certeza e probabilidade quando os valores esperados são iguais","Tomam decisões mais racionais quando os resultados são certos"],ans:1,exp:"O efeito certeza explica a preferência por ganhos garantidos mesmo quando o valor esperado da aposta é maior. Exemplo: preferir R$900 certos a 90% de chance de R$1.000 (mesmo valor esperado). Também explica a popularidade de produtos com capital garantido."},
  {id:19,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"Para maximizar o bem-estar percebido do cliente na comunicação de resultados, o planejador deve:",opts:["Sempre apresentar resultados de forma integrada para simplificar","Segregar perdas em parcelas menores e combinar múltiplos ganhos em um único resultado","Integrar perdas e ganhos quando o resultado líquido for positivo","Apresentar resultados de forma neutra sem considerar psicologia"],ans:1,exp:"Thaler demonstrou: (1) Integrar perdas — uma perda única de R$2.000 dói menos que duas de R$1.000; (2) Segregar ganhos — dois ganhos de R$1.000 geram mais prazer que um único de R$2.000. Conhecer isso ajuda a comunicar resultados de forma mais eficaz."},
  {id:20,tp:"Teoria da Perspectiva",c:"#8b5cf6",text:"Um cliente tem ganho de R$8.000 em uma conta e perda de R$8.000 em outra. Está muito mais angustiado com a perda do que satisfeito com o ganho. Qual princípio explica isso?",opts:["Efeito certeza — o ganho parece mais incerto","Aversão à perda — perdas pesam emocionalmente 1,5 a 2,5 vezes mais do que ganhos equivalentes","Efeito disposição — quer realizar o ganho e manter a perda","Contabilidade mental — contabiliza as contas separadamente"],ans:1,exp:"A aversão à perda (loss aversion) é o princípio central da Teoria da Perspectiva. A dor de uma perda é 1,5 a 2,5x mais intensa que o prazer de um ganho equivalente. Clientes que perdem o sono com perdas nominais estão manifestando aversão à perda intensa."},
  {id:21,tp:"Emoções e decisão",c:"#f59e0b",text:"O modelo de 'inteligência emocional' aplicado ao planejamento financeiro sugere que o planejador mais eficaz:",opts:["Suprime completamente suas emoções durante o atendimento","Reconhece e regula suas próprias emoções, identifica as emoções do cliente e usa esse entendimento para guiar o planejamento de forma construtiva","Expressa abertamente suas opiniões emocionais sobre as decisões do cliente","Foca exclusivamente nas emoções do cliente, ignorando aspectos técnicos"],ans:1,exp:"A inteligência emocional (Goleman) envolve autoconsciência (reconhecer os próprios vieses), autorregulação, empatia (identificar o estado emocional do cliente) e habilidade social. Não é suprimir emoções, mas usá-las com inteligência."},
  {id:22,tp:"Emoções e decisão",c:"#f59e0b",text:"Pesquisas em neurociência (Damasio) mostram que pacientes com dano nas regiões cerebrais responsáveis pelas emoções:",opts:["Tomam decisões financeiras superiores por serem puramente racionais","Têm dificuldade em tomar boas decisões, pois emoções fornecem 'marcadores somáticos' essenciais para orientar escolhas","Demonstram o modelo ideal de decisor econômico","Tomam decisões mais rápidas com mesma qualidade"],ans:1,exp:"Damasio mostrou que a ausência de resposta emocional não torna as pessoas mais racionais — as paralisa. Emoções funcionam como 'marcadores somáticos' que sinalizam opções boas e ruins com base em experiências passadas."},
  {id:23,tp:"Emoções e decisão",c:"#f59e0b",text:"Durante forte queda de mercado, vários clientes ligam em pânico. A sequência correta de resposta é:",opts:["Apresentar imediatamente dados históricos mostrando recuperação do mercado","Primeiro validar emocionalmente (acolher o medo), contextualizar no plano de longo prazo, e só então discutir ajustes — se necessário","Transferir a carteira para renda fixa imediatamente para acalmar","Lembrar o cliente das cláusulas contratuais assinadas"],ans:1,exp:"Sequência correta: (1) Validação emocional — 'Entendo que isso é preocupante'; (2) Contextualização — 'Veja como seu plano foi estruturado para momentos assim'; (3) Análise conjunta apenas se necessário. Começar com dados quando o cliente está em pânico aumenta a resistência."},
  {id:24,tp:"Emoções e decisão",c:"#f59e0b",text:"O conceito de 'fadiga de decisão' implica que o planejador deve:",opts:["Abordar os assuntos mais fáceis primeiro para criar momentum positivo","Abordar as decisões mais importantes e difíceis no início da reunião, quando a capacidade decisória está mais alta","Distribuir igualmente os temas ao longo da reunião","Fazer reuniões o mais longas possível para aproveitar o tempo do cliente"],ans:1,exp:"A fadiga de decisão (Baumeister) mostra que decidir bem é um recurso que se esgota ao longo do dia e da reunião. As decisões mais importantes devem ser tomadas com o cliente 'descansado' cognitivamente — portanto no início, não ao final."},
  {id:25,tp:"Emoções e decisão",c:"#f59e0b",text:"O 'viés de afeto' aplicado a decisões de investimento pode levar o cliente a:",opts:["Perceber alto retorno E baixo risco em ativos de que gosta emocionalmente, violando a relação fundamental risco-retorno","Ser mais disciplinado em ativos de que gosta, pois os monitora com mais atenção","Diversificar mais ao investir em setores que admira","Ser mais conservador em setores de que gosta para preservar o que tem"],ans:0,exp:"A affect heuristic cria a ilusão de que ativos emocionalmente atraentes são simultaneamente seguros e rentáveis — violando a relação risco-retorno. Investidores sobrealocam em empresas que 'amam', concentrando risco sem perceber."},
  {id:26,tp:"Scripts financeiros",c:"#06b6d4",text:"O conceito de 'transmissão intergeracional de comportamentos financeiros' sugere que:",opts:["Filhos de pais ricos sempre se tornam financeiramente bem-sucedidos","Padrões de comportamento financeiro — saudáveis e disfuncionais — tendem a ser transmitidos por observação, modelagem e mensagens explícitas e implícitas da família","A educação financeira formal quebra completamente os padrões herdados","Apenas traumas severos como falência são transmitidos entre gerações"],ans:1,exp:"A transmissão intergeracional ocorre por múltiplos canais: observação direta dos pais, mensagens explícitas e implícitas sobre dinheiro, experiências familiares coletivas. O planejador que entende esse contexto pode trabalhar padrões que de outra forma pareceriam irracionais."},
  {id:27,tp:"Scripts financeiros",c:"#06b6d4",text:"Uma cliente bem-sucedida sistematicamente faz aportes e depois resgata para gastos desnecessários, em ciclo repetitivo. O pai dizia: 'Dinheiro não é para gente como a gente.' Esse padrão é mais consistente com:",opts:["Viés do presente combinado com falta de planejamento","Autossabotagem financeira enraizada em script de indignidade — crença inconsciente de que não merece acumular riqueza","Efeito disposição aplicado à poupança","Overconfidence — acredita que sempre recomporá o que resgatou"],ans:1,exp:"Autossabotagem financeira frequentemente tem raízes em scripts de indignidade. Frases ouvidas na infância ('dinheiro não é pra gente', 'rico é ladrão') podem criar padrões que persistem na vida adulta como sabotagem repetitiva de objetivos financeiros."},
  {id:28,tp:"Scripts financeiros",c:"#06b6d4",text:"Um jovem Millennial prioriza experiências sobre acumulação patrimonial e tem menor apego à propriedade imobiliária. O planejador deve:",opts:["Convencer o cliente de que a abordagem é irresponsável","Respeitar os valores geracionais e construir um plano que alinhe experiências com metas de longo prazo adaptadas ao estilo de vida","Ignorar as preferências e focar exclusivamente em dados técnicos de acumulação","Classificar o cliente como impulsivo e recomendar perfil conservador"],ans:1,exp:"Cada geração tem relação distinta com dinheiro e propriedade. O planejamento centrado no cliente exige respeitar e incorporar esses valores. Um plano que ignora os valores do cliente raramente é seguido, independentemente de sua qualidade técnica."},
  {id:29,tp:"Scripts financeiros",c:"#06b6d4",text:"O 'dinheiro como tabu social' — dificuldade de falar abertamente sobre finanças — impacta o planejamento de qual forma?",opts:["Positivamente — o sigilo protege o patrimônio","Negativamente — impede o planejamento sucessório, dificulta decisões financeiras em casal e retarda a busca por ajuda profissional","Neutro — o comportamento financeiro independe da disposição de falar sobre dinheiro","Positivamente em famílias de alta renda e negativamente nas de baixa renda"],ans:1,exp:"O tabu sobre dinheiro tem consequências práticas sérias: casais não discutem metas e descobrem incompatibilidades em crises; pais não conversam sobre herança com filhos, gerando conflitos sucessórios; pessoas evitam buscar ajuda profissional por vergonha. O planejador deve criar um espaço seguro para o cliente falar sobre dinheiro."},
  {id:30,tp:"Scripts financeiros",c:"#06b6d4",text:"O script de 'adoração do dinheiro' (money worship) inclui paradoxalmente:",opts:["A crença de que dinheiro é importante E a crença de que dinheiro corromperia o caráter","A crença de que mais dinheiro resolve todos os problemas E que dinheiro deve ser gasto para gerar prazer imediato — gerando ciclos de ganho e consumo","A crença de que poupar é virtuoso mas que investir é arriscado","A crença de que o dinheiro é sujo mas necessário para sobreviver"],ans:1,exp:"O script de adoração do dinheiro contém duas crenças aparentemente contraditórias: (1) mais dinheiro resolveria todos os problemas; (2) dinheiro existe para ser gasto e desfrutado. Essa tensão cria ciclos de perseguição por mais dinheiro seguidos de gastos que dissipam o acumulado."},
  {id:31,tp:"Nudges",c:"#f97316",text:"Qual das seguintes intervenções NÃO é um nudge segundo Thaler e Sunstein?",opts:["Posicionar frutas na altura dos olhos em uma cantina","Enviar lembretes automáticos de pagamento de fatura","Proibir resgate de previdência antes de 60 anos sob pena de tributação severa","Mostrar ao cliente quanto pagou de taxas no último ano antes de renovar contrato"],ans:2,exp:"Nudges influenciam sem restringir. A tributação severa por resgate antecipado não é um nudge — é um desincentivo econômico real. As demais alternativas são nudges clássicos: mudança de contexto, lembrete oportuno e informação saliente."},
  {id:32,tp:"Nudges",c:"#f97316",text:"O conceito de 'default inteligente' no planejamento financeiro refere-se a:",opts:["Fundos de gestão passiva que seguem índices de referência","Definir a opção padrão como a escolha mais alinhada ao bem-estar de longo prazo do cliente — explorando o status quo bias a favor do cliente","Software que usa IA para rebalancear carteiras automaticamente","Manter investimentos inalterados em períodos de volatilidade"],ans:1,exp:"O default é a opção que prevalece quando o usuário não age. Como a maioria aceita o default por inércia, definir o default correto é uma das ferramentas mais poderosas: adesão automática a previdência, rebalanceamento automático, renovação automática de seguros."},
  {id:33,tp:"Nudges",c:"#f97316",text:"A estratégia de 'compromisso antecipado' (pre-commitment device) funciona porque:",opts:["Cria obrigação legal que impede escolhas erradas no futuro","Usa a tendência de valorizar mais o presente para comprometer recursos futuros agora, quando a tentação é menor — reduzindo o conflito com o 'eu futuro'","Aumenta a responsabilidade do planejador pelas decisões do cliente","Elimina completamente o viés do presente tornando as escolhas futuras irreversíveis"],ans:1,exp:"Dispositivos de pré-compromisso permitem que o 'eu presente' proteja o 'eu futuro' de impulsos previsíveis. Funcionam porque o momento do compromisso (quando a tentação é baixa) é separado do momento da tentação. Exemplos: débito automático em investimentos, fundos com carência."},
  {id:34,tp:"Nudges",c:"#f97316",text:"A estratégia 'Save More Tomorrow' (SMarT) de Thaler e Benartzi neutraliza simultaneamente:",opts:["Aversão ao risco e efeito manada","Viés do presente (o aumento é adiado para o futuro) e aversão à perda (o aumento é sobre o reajuste salarial, então a renda líquida nunca diminui)","Ancoragem e enquadramento","Overconfidence e viés de confirmação"],ans:1,exp:"O SMarT é elegante por neutralizar dois vieses ao mesmo tempo: o viés do presente (sacrifício adiado) e a aversão à perda (o aumento ocorre sobre o reajuste salarial — a renda líquida nunca diminui, apenas cresce menos). Resultou em aumento dramático das taxas de poupança nos estudos originais."},
  {id:35,tp:"Nudges",c:"#f97316",text:"A 'escassez de atenção' como princípio de nudge sugere que:",opts:["Clientes com menos recursos prestam menos atenção a investimentos","Informações apresentadas de forma saliente e oportuna têm impacto comportamental muito maior do que as mesmas informações enterradas em relatórios longos","Nudges só são eficazes quando o cliente está com atenção plena durante a reunião","A quantidade de informação deve ser maximizada para que o cliente tome melhores decisões"],ans:1,exp:"A escassez de atenção sustenta a saliência como nudge: a mesma informação tem impacto radicalmente diferente dependendo de como e quando é apresentada. Mostrar a taxa real paga antes de renovar um contrato, ou o saldo projetado na aposentadoria antes de um resgate, são exemplos de nudges por saliência oportuna."},
  {id:36,tp:"Bem-estar financeiro",c:"#84cc16",text:"A pesquisa de Killingsworth, Kahneman e Mellers (2023) sobre renda e felicidade concluiu que:",opts:["A felicidade não tem relação com renda acima de US$75.000 para nenhum grupo","Para a maioria, a felicidade continua crescendo com a renda além de US$75.000, mas pessoas já infelizes por outras razões não se tornam significativamente mais felizes com renda alta","O efeito da renda é completamente explicado pelo status social relativo","Felicidade e renda têm correlação negativa acima de US$100.000"],ans:1,exp:"A síntese de 2023 reconciliou estudos anteriores. A relação renda-felicidade é positiva e contínua para a maioria, mas com heterogeneidade: para pessoas infelizes por razões além das financeiras, mais dinheiro não resolve. Isso reforça a abordagem holística do planejamento."},
  {id:37,tp:"Bem-estar financeiro",c:"#84cc16",text:"No modelo do CFPB, qual é um fator CONTEXTUAL (não comportamental) do bem-estar financeiro?",opts:["Autocontrole financeiro do indivíduo","Conhecimento e habilidades financeiras","Acesso a produtos e serviços financeiros adequados e condições do mercado de trabalho","Planejamento e metas financeiras de longo prazo"],ans:2,exp:"O CFPB distingue fatores que o indivíduo controla (comportamentais: autocontrole, conhecimento, planejamento) dos contextuais (condições do mercado de trabalho, acesso a crédito adequado, sistemas de proteção social). O planejador reconhece barreiras contextuais e adapta as recomendações."},
  {id:38,tp:"Bem-estar financeiro",c:"#84cc16",text:"Evidências sobre dívida e bem-estar psicológico mostram que:",opts:["Apenas dívidas acima de R$100 mil afetam o bem-estar","A presença de dívidas problemáticas está associada a maiores índices de ansiedade, depressão e conflitos conjugais, independentemente do valor absoluto","Dívidas de consumo são psicologicamente neutras desde que as parcelas caibam no orçamento","O impacto psicológico da dívida é exclusivamente financeiro"],ans:1,exp:"Pesquisas de saúde pública mostram associações robustas entre endividamento problemático e deterioração da saúde mental. O estresse financeiro crônico afeta o sono, os relacionamentos e a capacidade de tomar boas decisões — criando um ciclo vicioso."},
  {id:39,tp:"Bem-estar financeiro",c:"#84cc16",text:"A 'prosperidade subjetiva' (subjective financial wellbeing) é importante porque:",opts:["Substitui métricas objetivas como patrimônio e renda","A percepção que o cliente tem de sua situação financeira — independentemente dos dados objetivos — influencia seu comportamento, saúde mental e disposição de seguir o plano","É facilmente mensurável por questionários padronizados","Tem alta correlação com o patrimônio líquido, sendo portanto redundante"],ans:1,exp:"A prosperidade subjetiva não é redundante com dados objetivos: clientes com boa situação técnica podem sentir-se financeiramente inseguros, e vice-versa. Essa percepção afeta diretamente comportamentos (propensão a investir, buscar seguros) e bem-estar geral."},
  {id:40,tp:"Relacionamento",c:"#ec4899",text:"A técnica de 'perguntas abertas' é valorizada no planejamento financeiro porque:",opts:["Permite ao planejador controlar melhor o tempo e a direção da reunião","Estimula o cliente a elaborar, refletir e revelar informações, valores e emoções que perguntas de 'sim/não' não alcançariam","Facilita o preenchimento de questionários de suitability de forma mais objetiva","É exigida pela regulação da CVM para coleta de perfil de investidor"],ans:1,exp:"Perguntas abertas ('O que o dinheiro significa para você?') revelam o que questionários fechados escondem: valores, medos, sonhos, crenças sobre dinheiro. São a base da coleta de informações qualitativas essencial para o planejamento centrado no cliente."},
  {id:41,tp:"Relacionamento",c:"#ec4899",text:"A técnica de 'reflective listening' (escuta reflexiva) no atendimento consiste em:",opts:["Mostrar ao cliente gráficos que refletem a performance histórica","Repetir ou parafrasear o que o cliente disse para demonstrar compreensão e verificar se o entendimento está correto, criando espaço para aprofundamento","Refletir sobre as decisões do cliente após a reunião para preparar relatórios","Mostrar ao cliente como suas decisões se refletem no orçamento mensal"],ans:1,exp:"O reflective listening é central na entrevista motivacional. Ao parafrasear o que o cliente disse, o planejador demonstra escuta ativa, verifica o entendimento e abre espaço para o cliente aprofundar ou corrigir. Isso constrói confiança e revela informações mais profundas."},
  {id:42,tp:"Relacionamento",c:"#ec4899",text:"O 'efeito de atribuição fundamental' no contexto do atendimento significa que o planejador pode incorrer no erro de:",opts:["Atribuir os problemas financeiros do cliente a fatores externos quando são comportamentais","Atribuir os problemas financeiros do cliente exclusivamente a falhas de caráter, ignorando fatores contextuais como crises, doenças ou desemprego","Atribuir seus próprios sucessos à sorte em vez de competência","Atribuir ao cliente a responsabilidade por escolhas recomendadas pelo próprio planejador"],ans:1,exp:"O fundamental attribution error leva a julgar o comportamento dos outros como reflexo de seu caráter. Um planejador que vê o cliente endividado como 'irresponsável' sem investigar o contexto comete esse erro. A abordagem empática exige considerar fatores comportamentais E contextuais."},
  {id:43,tp:"Ética",c:"#ef4444",text:"O 'conflito de interesses cognitivo' no planejamento financeiro ocorre quando:",opts:["O planejador tem conflito financeiro óbvio como comissão por venda de produtos","O planejador, sem perceber, favorece recomendações que inconscientemente servem a seus próprios interesses, mesmo sem intenção consciente de prejudicar o cliente","O planejador atende clientes com objetivos conflitantes entre si","O planejador discorda eticamente dos objetivos do cliente"],ans:1,exp:"O conflito cognitivo é mais sutil que o financeiro explícito porque é involuntário. O planejador pode acreditar genuinamente que age no melhor interesse do cliente enquanto vieses inconscientes distorcem suas recomendações. Reconhecer essa possibilidade é parte da competência ética."},
  {id:44,tp:"Ética",c:"#ef4444",text:"O conceito de 'fiduciário comportamental' vai além do fiduciário regulatório porque:",opts:["Exige que o planejador gerenha recursos do cliente diretamente","O fiduciário comportamental reconhece que agir no melhor interesse do cliente exige também mitigar ativamente os vieses que levam o cliente a agir contra seus próprios objetivos de longo prazo","É apenas acadêmico e sem aplicação prática","É uma certificação adicional após o CFP"],ans:1,exp:"O fiduciário regulatório estabelece obrigação de agir no melhor interesse financeiro. O fiduciário comportamental vai além: quando o cliente, sob influência de vieses e emoções, pede ações que prejudicam seus objetivos (como vender tudo no pânico), o planejador tem o dever de ser honesto sobre esses riscos."},
  {id:45,tp:"Ética",c:"#ef4444",text:"A prática de 'supervisão reflexiva' para planejadores financeiros consiste em:",opts:["Revisar tecnicamente os portfólios a cada trimestre","Um processo regular de reflexão sobre o próprio atendimento — identificando padrões, vieses pessoais e reações emocionais a clientes — para melhorar continuamente a qualidade do serviço","Submeter as recomendações à revisão de um supervisor antes de apresentar ao cliente","Gravar reuniões com clientes para análise de conformidade regulatória"],ans:1,exp:"A supervisão reflexiva é adaptada da psicologia clínica. Para planejadores envolve refletir: 'Como me sinto em relação a este cliente? Estou evitando algum assunto difícil? Meus vieses estão influenciando minhas recomendações?' Essa prática aumenta a autoconsciência e a qualidade do atendimento."},
  {id:46,tp:"Motivação e mudança",c:"#a78bfa",text:"Os quatro princípios da entrevista motivacional (Parceria, Aceitação, Compaixão, Evocação) implicam que o planejador deve:",opts:["Estabelecer metas para o cliente antes da primeira reunião","Trabalhar em parceria, aceitando a autonomia do cliente, demonstrando compaixão genuína e evocando a motivação interna do cliente — em vez de impor soluções","Usar dados racionais para convencer o cliente da melhor escolha","Aceitar incondicionalmente todas as decisões do cliente, mesmo as prejudiciais"],ans:1,exp:"Os quatro princípios da IM garantem que a mudança comportamental parta do cliente. Parceria: colaborador, não especialista autoritário. Aceitação: respeito pela autonomia. Compaixão: priorizar o bem-estar do cliente. Evocação: evocar motivação já presente. Especialmente eficaz com clientes ambivalentes."},
  {id:47,tp:"Motivação e mudança",c:"#a78bfa",text:"Para um cliente em estágio de 'contemplação' (reconhece o problema mas não agiu), a intervenção mais eficaz é:",opts:["Apresentar plano financeiro detalhado com metas e prazos para implementação imediata","Explorar a ambivalência ('quero mudar, mas...'), fortalecer os prós da mudança e abordar barreiras percebidas — sem pressionar para ação imediata","Ignorar a ambivalência e focar nos aspectos técnicos","Encaminhar para terapia psicológica antes de iniciar o planejamento"],ans:1,exp:"O modelo transteórico identifica: Pré-contemplação, Contemplação, Preparação, Ação, Manutenção. Na contemplação, pressionar para ação prematura aumenta a resistência. Explorar a ambivalência com empatia é o caminho mais eficaz — não o plano técnico imediato."},
  {id:48,tp:"Motivação e mudança",c:"#a78bfa",text:"Em situações de viuvez recente, o planejador deve EVITAR:",opts:["Dar tempo ao cliente para processar o luto antes de decisões irreversíveis","Identificar urgências financeiras imediatas separando-as de decisões de longo prazo","Pressionar o cliente a reorganizar imediatamente toda a carteira e o planejamento sucessório enquanto está emocionalmente abalado","Oferecer suporte empático e envolver outros profissionais quando necessário"],ans:2,exp:"Decisões financeiras tomadas nos primeiros meses após viuvez são frequentemente arrependidas. O planejador ético deve: priorizar o bem-estar emocional, cuidar apenas das urgências imediatas, criar um período de estabilização antes de grandes decisões. Pressionar por reorganização imediata é antiético."},
  {id:49,tp:"Aplicação integrada",c:"#fb7185",text:"Uma cliente de 58 anos, esgotada, quer se aposentar já mas teme ficar sem dinheiro. O planejador identifica que ela tem recursos suficientes, mas com margem menor do que o ideal. Qual abordagem integra melhor os aspectos técnicos e psicológicos?",opts:["Dizer imediatamente que pode se aposentar e apresentar o plano técnico","Dizer que não pode se aposentar ainda e propor que trabalhe mais 3 anos para atingir a margem ideal","Validar o esgotamento e o medo, apresentar cenários com trade-offs claros e co-construir a decisão alinhada aos valores e tolerância ao risco real da cliente","Encaminhar para terapia antes de retomar o planejamento"],ans:2,exp:"O caso integra: burnout (emocional), recursos suficientes mas com margem menor (técnico), medo de outliving assets (psicológico), qualidade de vida vs. segurança (valores). A abordagem ideal valida emocionalmente, apresenta cenários concretos e envolve a cliente na decisão — respeitando dados técnicos E valores."},
  {id:50,tp:"Aplicação integrada",c:"#fb7185",text:"Em qual situação o planejador EXTRAPOLA sua função e deve encaminhar a profissional de saúde mental?",opts:["Explorar crenças e scripts financeiros herdados da família","Validar emoções do cliente durante crise de mercado","Identificar que o cliente usa gastos compulsivos como mecanismo de enfrentamento de ansiedade severa — sintoma de transtorno de ansiedade generalizada não tratado","Usar escuta ativa e entrevista motivacional para ajudar o cliente a identificar metas financeiras"],ans:2,exp:"O planejador está equipado para trabalhar crenças sobre dinheiro, emoções relacionadas a finanças e motivação para mudança. Mas quando os sintomas apontam para um transtorno mental não tratado (ansiedade generalizada, depressão, TOC, jogo patológico), o encaminhamento a profissional de saúde mental é necessário e ético."}
];

let state={};
let curView=‘all’, curTopic=’’;

const topics=[…new Set(QS.map(q=>q.tp))];
const tsel=document.getElementById(‘tsel’);
topics.forEach(t=>{const o=document.createElement(‘option’);o.value=t;o.textContent=t;tsel.appendChild(o);});

function updateStats(){
const n=Object.keys(state).length;
const c=Object.values(state).filter(a=>a.ok).length;
const p=n>0?Math.round(c/n*100):0;
document.getElementById(‘na’).textContent=n;
document.getElementById(‘nc’).textContent=c;
document.getElementById(‘ne’).textContent=n-c;
const pe=document.getElementById(‘np’);
pe.textContent=n>0?p+’%’:’—’;
pe.style.color=p>=70?’#10b981’:p>=50?’#f59e0b’:’#3b82f6’;
document.getElementById(‘pb’).style.width=Math.round(n/50*100)+’%’;
}

function getVisible(){
return QS.filter(q=>{
const a=state[q.id];
const tok=!curTopic||q.tp===curTopic;
if(curView===‘pend’) return !a&&tok;
if(curView===‘err’) return a&&!a.ok&&tok;
return tok;
});
}

function render(){
const ql=document.getElementById(‘ql’);
ql.innerHTML=’’;
const vis=getVisible();
if(!vis.length){
ql.innerHTML=’<p style="color:#475569;font-size:14px;text-align:center;padding:2rem 0">Nenhuma questão nesta categoria.</p>’;
return;
}
vis.forEach(q=>{
const a=state[q.id];
const done=!!a;
const d=document.createElement(‘div’);
d.className=‘qc’;
d.innerHTML=`<div class="qm"><span class="bdg" style="background:${q.c}22;color:${q.c}">${q.tp}</span><span class="qn">Q${q.id}/50</span></div>

<p class="qt">${q.text}</p>
<div class="os" id="O${q.id}">${q.opts.map((o,i)=>{
  let cl='op';
  if(done){cl=i===q.ans?'op ok':i===a.sel?'op no':'op dm';}
  return `<button class="${cl}" onclick="pick(${q.id},${i})" ${done?'disabled':''}><span class="lt">${'ABCD'[i]}</span>${o}</button>`;
}).join('')}</div>
<div class="fb ${done?(a.ok?'fbok':'fbno'):''}" id="F${q.id}" style="display:${done?'block':'none'}">${done?`<strong>${a.ok?'Correto!':'Incorreto.'}</strong> ${q.exp}`:''}</div>`;
    ql.appendChild(d);
  });
}

function pick(qid,sel){
if(state[qid]) return;
const q=QS.find(x=>x.id===qid);
const ok=sel===q.ans;
state[qid]={sel,ok};
document.querySelectorAll(`#O${qid} .op`).forEach((b,i)=>{
b.disabled=true;
b.className=‘op’+(i===q.ans?’ ok’:i===sel&&!ok?’ no’:’ dm’);
});
const fb=document.getElementById(‘F’+qid);
fb.className=’fb ’+(ok?‘fbok’:‘fbno’);
fb.innerHTML=`<strong>${ok?'Correto!':'Incorreto.'}</strong> ${q.exp}`;
fb.style.display=‘block’;
updateStats();
}

function setView(v,btn){
curView=v; curTopic=’’;
document.querySelectorAll(’.tb’).forEach(b=>b.classList.remove(‘on’));
btn.classList.add(‘on’);
tsel.value=’’;
render();
}

function setTopic(v){
curTopic=v; curView=‘all’;
document.querySelectorAll(’.tb’).forEach(b=>b.classList.remove(‘on’));
document.querySelector(’.tb’).classList.add(‘on’);
render();
}

render();
</script>
